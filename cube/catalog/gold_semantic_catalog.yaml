- id: gold.dim_ad_neurohack_map
  cube: gold_dim_ad_neurohack_map
  domain: creative_taxonomy
  grain:
  - brand_id
  - ad_key
  - tag_code
  - tag_position
  timezone: Asia/Kolkata
  description: Maps Meta ads to Neurohack tag codes extracted from ad names. Grain
    brand_id × ad_key × tag_code × tag_position. One ad may have multiple tags — join
    to meta ads fans out spend across tags.
  measures:
  - name: tag_mappings
    type: count
    format: number
    description: null
    sql: null
  - name: tagged_ads
    type: count_distinct
    format: number
    description: null
    sql: ad_key
  - name: distinct_tags
    type: count_distinct
    format: number
    description: null
    sql: tag_code
  dimensions:
