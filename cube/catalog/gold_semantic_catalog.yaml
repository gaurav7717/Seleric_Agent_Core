- id: gold.fct_orders
  cube: gold_fct_orders
  domain: shopify
  grain:
  - brand_id
  - order_id
  timezone: Asia/Kolkata
  description: Canonical order fact from dbt gold.fct_orders. Filter is_test = false
    for KPIs. Use commerce_orders view. For company P&L use canonical_pnl / gold_fct_daily_pnl.
  measures:
  - name: orders
    type: count
    format: number
    description: null
    sql: null
  - name: gross_revenue
    type: sum
    format: currency
    description: null
    sql: null
  - name: net_revenue
    type: sum
    format: currency
    description: null
    sql: null
  - name: gross_revenue_excl_tax
    type: sum
    format: currency
    description: null
    sql: null
  - name: net_revenue_excl_tax
    type: sum
    format: currency
    description: null
    sql: null
  - name: total_refund_amount
    type: sum
    format: currency
    description: null
    sql: null
  - name: total_discounts
    type: sum
    format: currency
    description: null
    sql: null
  - name: total_tax
    type: sum
    format: currency
    description: null
    sql: null
  - name: total_shipping_charged
    type: sum
    format: currency
    description: null
    sql: null
  - name: shipping_revenue
    type: sum
    format: currency
    description: null
    sql: total_shipping_charged
  - name: net_sales_ex_gst
    type: sum
    format: currency
    description: null
    sql: net_revenue_excl_tax
  - name: active_orders
    type: count_distinct
    format: number
    description: null
    sql: CASE WHEN {CUBE}.order_status IN ('active', 'payment_pending') AND {CUBE}.is_revenue_adjustment
      = 0 AND {CUBE}.is_test = 0 THEN {CUBE}.order_id END
  - name: cancelled_orders
    type: count_distinct
    format: number
    description: null
    sql: CASE WHEN {CUBE}.order_status = 'cancelled' AND {CUBE}.is_test = 0 THEN {CUBE}.order_id
      END
  - name: refunded_orders
    type: count_distinct
    format: number
    description: null
    sql: CASE WHEN {CUBE}.order_status IN ('refunded', 'partially_refunded') AND {CUBE}.order_status
      != 'cancelled' AND {CUBE}.is_test = 0 THEN {CUBE}.order_id END
  - name: returned_orders
    type: count_distinct
    format: number
    description: RETURNED + IN_PROGRESS only — time-axis returned_at_ist; do not use
      IS NOT NULL on return_status.
    sql: CASE WHEN {CUBE}.return_status IN ('RETURNED', 'IN_PROGRESS') AND {CUBE}.is_test
      = 0 AND {CUBE}.returned_at IS NOT NULL THEN {CUBE}.order_id END
  - name: net_orders
    type: count_distinct
    format: number
    description: null
    sql: CASE WHEN {CUBE}.order_status != 'cancelled' AND {CUBE}.is_test = 0 THEN
      {CUBE}.order_id END
  - name: return_rate
