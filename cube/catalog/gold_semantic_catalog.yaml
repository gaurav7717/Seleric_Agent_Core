- name: daily_pnl
  title: Daily P&L (Gold)
  description: 'Canonical company P&L (rebuilt: int_finance_daily_rollups + line-item
    cost split + platform ad spend; reconciles with historical + P&L dashboards).
    total_cogs = net_cogs (lifecycle net COGS incl Amazon). gross_profit = total_sales_ex_gst
    − net_cogs (contribution before marketing). net_profit = total_sales_ex_gst −
    net_cogs − total_ad_spend. MCP: cube_daily_pnl, cube_pnl_waterfall, cube_pnl_today_yesterday.'
  mcp_tools:
  - cube_daily_pnl
  - cube_pnl_waterfall
