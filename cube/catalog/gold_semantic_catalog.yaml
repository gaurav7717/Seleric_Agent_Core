- id: gold.fct_amazon_sp_order_pnl
  cube: gold_fct_amazon_sp_order_pnl
  domain: general
  grain:
  - brand_id
  timezone: Asia/Kolkata
  description: 'Amazon Seller-Partner P&L at brand × amazon_order_id grain from settlement
    + estimated data. gross_revenue/net_payout/refunds resolve effective ?? estimated.
    amazon_fees is the component sum (|commission|+|closing|+|shipping|+|other|+ |TCS/TDS|)
    so tax-withheld is always included. Pending refunds / label fees (accrual) live
    in amazon_return_reconciliation. Serve view: amazon_sp_order_pnl. Currency: INR.'
  measures:
  - name: order_count
    type: count_distinct
    format: number
    description: null
    sql: amazon_order_id
  - name: gross_revenue
    type: sum
    format: currency
    description: Gross Sales card = SUM(effective_gross_revenue ?? estimated_gross_revenue).
      Raw gross_revenue omitted (0 for ESTIMATED orders).
    sql: coalesce(effective_gross_revenue, estimated_gross_revenue, 0)
  - name: net_payout
    type: sum
    format: currency
    description: Settlement net payout after fees and refunds (effective ?? estimated
      ?? 0).
    sql: coalesce(effective_net_payout, estimated_net_payout, 0)
  - name: refunds
    type: sum
    format: currency
    description: Settled refund deduction (negative in CH). effective ?? estimated
      ?? 0.
    sql: coalesce(effective_refunds, estimated_refunds, 0)
  - name: settled_refunds
    type: sum
    format: currency
    description: abs(refunds) — refunds already in settlement, shown positive.
    sql: abs(coalesce(effective_refunds, estimated_refunds, 0))
  - name: amazon_fees
    type: sum
    format: currency
    description: Component-based fee sum (commission + closing + shipping + other
      + TCS/TDS). Primary formula — always includes tax withheld. Never Math.abs(SUM(total_amazon_fees)).
    sql: 'abs(coalesce(effective_commission, 0)) + abs(coalesce(effective_closing,
      0)) + abs(coalesce(effective_shipping, 0)) + abs(coalesce(effective_other_service_fees,
      0)) + abs(coalesce(effective_tax_withheld, 0))

      '
  - name: tax_withheld
    type: sum
    format: currency
    description: TCS/TDS withheld by Amazon (inside amazon_fees, not customer GST).
    sql: abs(coalesce(effective_tax_withheld, 0))
  - name: product_cost
    type: sum
    format: currency
    description: Product COGS = cogs_product (seller unit cost × qty). NOT the total_cogs
      column.
    sql: cogs_product
  - name: total_cogs
    type: sum
    format: currency
    description: Total cost of selling on Amazon = amazon_fees + product_cost.
    sql: 'abs(coalesce(effective_commission, 0)) + abs(coalesce(effective_closing,
      0)) + abs(coalesce(effective_shipping, 0)) + abs(coalesce(effective_other_service_fees,
      0)) + abs(coalesce(effective_tax_withheld, 0)) + coalesce(cogs_product, 0)

      '
  - name: gross_profit
    type: sum
    format: currency
    description: net_payout − product_cost (deduct cogs_product, not total_cogs).
    sql: coalesce(effective_net_payout, estimated_net_payout, 0) - coalesce(cogs_product,
      0)
  - name: items_settled
    type: sum
    format: number
    description: null
    sql: null
  - name: items_fully_refunded
    type: sum
    format: number
    description: null
    sql: null
  - name: cogs_items_matched
    type: sum
    format: number
    description: null
    sql: null
  - name: cogs_items_unmatched
    type: sum
    format: number
    description: null
    sql: null
  - name: cogs_coverage_pct
    type: number
    format: percent
    description: null
    sql: 100.0 * sum({CUBE}.cogs_items_matched) / nullIf(sum({CUBE}.cogs_items_matched)
      + sum({CUBE}.cogs_items_unmatched), 0)
  dimensions:
  - name: brand_id
    type: string
    title: Brand ID
    description: null
  - name: amazon_order_id
    type: string
    title: null
    description: null
  - name: company_id
    type: string
    title: null
    description: null
  - name: purchase_date
    type: time
    title: Purchase Date
    description: null
  - name: order_status
    type: string
    title: null
    description: null
  - name: pnl_status
    type: string
    title: null
    description: Settlement P&L status (settled / estimated / none).
  - name: payout_basis
    type: string
    title: null
    description: NONE / ESTIMATED / settled basis for effective vs estimated resolution.
  - name: fulfillment_channel
    type: string
    title: null
    description: null
  - name: marketplace_id
    type: string
    title: null
    description: null
  - name: settlement_currency_code
    type: string
    title: null
    description: null
  views:
  - amazon_sp_order_pnl
  mcp_tools:
  - cube_query
  anti_patterns: []
