- id: gold.int_amazon_return_reconciliation
  cube: gold_int_amazon_return_reconciliation
  domain: general
  grain:
  - brand_id
  timezone: Asia/Kolkata
  description: 'Amazon return/refund reconciliation at record_id grain. Source of
    accrual pending_refunds (REPORT_REFUND_PENDING_FINANCE) and pending_label_fees
    (REPORT_REFUND_PENDING_FINANCE + LABEL_PENDING_FINANCE) deducted from Amazon net
    profit. Operational / drill-down — not a revenue table. Serve view: amazon_return_reconciliation.'
  measures:
  - name: record_count
    type: count_distinct
    format: number
    description: null
    sql: record_id
  - name: return_orders
    type: count_distinct
    format: number
    description: null
    sql: amazon_order_id
  - name: report_refunded_amount
    type: sum
    format: currency
    description: null
    sql: null
  - name: pending_refunds
    type: sum
    format: currency
    description: Customer refunds processed but not yet in Amazon settlement payout.
    sql: CASE WHEN {CUBE}.reconciliation_status = 'REPORT_REFUND_PENDING_FINANCE'
      THEN {CUBE}.report_refunded_amount ELSE 0 END
  - name: pending_label_fees
    type: sum
    format: currency
    description: Return-label costs not yet in settlement (both pending statuses).
    sql: CASE WHEN {CUBE}.reconciliation_status IN ('REPORT_REFUND_PENDING_FINANCE',
      'LABEL_PENDING_FINANCE') THEN abs({CUBE}.report_return_label_cost) ELSE 0 END
  - name: approved_returns
    type: count_distinct
    format: number
    description: null
    sql: CASE WHEN {CUBE}.is_return_approved = 1 THEN {CUBE}.record_id END
  - name: rejected_returns
    type: count_distinct
    format: number
    description: null
    sql: CASE WHEN {CUBE}.is_return_rejected = 1 THEN {CUBE}.record_id END
  dimensions:
  - name: brand_id
    type: string
    title: Brand ID
    description: null
  - name: record_id
    type: string
    title: null
    description: null
  - name: amazon_order_id
    type: string
    title: null
    description: null
  - name: amazon_rma_id
    type: string
    title: null
    description: null
  - name: order_item_id
    type: string
    title: null
    description: null
  - name: reconciliation_status
    type: string
    title: null
    description: Drives P&L treatment — REPORT_REFUND_PENDING_FINANCE, LABEL_PENDING_FINANCE,
      SETTLED, OPEN, REJECTED_*, etc. (Reference §17.2).
  - name: return_request_status
    type: string
    title: null
    description: null
  - name: return_type
    type: string
    title: null
    description: null
  - name: resolution
    type: string
    title: null
    description: null
  - name: return_request_date
    type: time
    title: null
    description: null
  views:
  - amazon_return_reconciliation
  mcp_tools:
  - cube_query
  anti_patterns: []
