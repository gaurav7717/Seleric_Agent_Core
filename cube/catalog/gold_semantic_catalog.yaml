- id: gold.fct_amazon_ads_campaigns_daily
  cube: gold_fct_amazon_ads_campaigns_daily
  domain: general
  grain:
  - brand_id
  timezone: Asia/Kolkata
  description: 'Amazon Ads (SP/SB/SD) performance at brand × campaign × report_date.
    Date axis is report_date. spend = coalesce(spend, cost). sales/orders are Amazon-attributed
    (platform-reported), not Shopify truth. Ratios recomputed from numerator/ denominator.
    Serve view: amazon_ad_performance.'
  measures:
  - name: spend
    type: sum
    format: currency
    description: Ad cost = coalesce(spend, cost).
    sql: coalesce(spend, cost)
  - name: impressions
    type: sum
    format: number
    description: null
    sql: null
  - name: clicks
    type: sum
    format: number
    description: null
    sql: null
  - name: attributed_orders
    type: sum
    format: number
    description: Amazon-attributed orders (platform-reported).
    sql: orders
  - name: attributed_sales
    type: sum
    format: currency
    description: Amazon-attributed sales (platform-reported) — not Shopify truth.
    sql: sales
  - name: matched_order_count
    type: sum
    format: number
    description: null
    sql: null
  - name: purchases_7d
    type: sum
    format: number
    description: null
    sql: null
  - name: sales_7d
    type: sum
    format: currency
    description: null
    sql: null
  - name: ctr
    type: number
    format: percent
    description: Click-through rate, recomputed from clicks / impressions.
    sql: 100.0 * sum({CUBE}.clicks) / nullIf(sum({CUBE}.impressions), 0)
  - name: cpc
    type: number
    format: currency
    description: Cost per click, recomputed from spend / clicks.
    sql: sum(coalesce({CUBE}.spend, {CUBE}.cost)) / nullIf(sum({CUBE}.clicks), 0)
  - name: cpm
    type: number
    format: currency
    description: null
    sql: 1000.0 * sum(coalesce({CUBE}.spend, {CUBE}.cost)) / nullIf(sum({CUBE}.impressions),
      0)
  - name: ads_roas
    type: number
    format: null
    description: Attributed sales / spend (ad-linked orders only). Recomputed.
    sql: sum({CUBE}.sales) / nullIf(sum(coalesce({CUBE}.spend, {CUBE}.cost)), 0)
  - name: ads_acos
    type: number
    format: percent
    description: null
    sql: 100.0 * sum(coalesce({CUBE}.spend, {CUBE}.cost)) / nullIf(sum({CUBE}.sales),
      0)
  dimensions:
  - name: brand_id
    type: string
    title: Brand ID
    description: null
  - name: campaign_id
    type: string
    title: null
    description: null
  - name: report_date
    type: time
    title: Report Date
    description: Date the ad ran (NOT the order date).
  - name: campaign_name
    type: string
    title: null
    description: null
  - name: campaign_type
    type: string
    title: null
    description: SP (Sponsored Products), SB (Brands), SD (Display).
  - name: campaign_status
    type: string
    title: null
    description: null
  views:
  - amazon_ad_performance
  mcp_tools:
  - cube_query
  anti_patterns: []
