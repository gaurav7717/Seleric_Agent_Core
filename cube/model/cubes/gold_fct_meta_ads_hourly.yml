# gold.fct_meta_ads_hourly — brand × date × hour × account × campaign × adset × ad.
cubes:
- name: gold_fct_meta_ads_hourly
  sql_table: gold.fct_meta_ads_hourly
  title: Gold Meta Ads Hourly
  description: Meta ad hourly performance from gold.fct_meta_ads_hourly. Use meta_ad_hourly
    view.
  measures:
  - name: spend
    sql: spend
    type: sum
    format: currency
  - name: ad_spend
    sql: spend
    type: sum
    format: currency
  - name: impressions
    sql: impressions
    type: sum
    format: number
  - name: reach
    sql: reach
    type: sum
    format: number
  - name: frequency
    sql: avg(frequency)
    type: number
  - name: clicks
    sql: clicks
    type: sum
    format: number
  - name: ctr
    sql: 100.0 * sum(clicks) / nullIf(sum(impressions), 0)
    type: number
    format: percent
  - name: cpm
    sql: sum(spend) * 1000 / nullIf(sum(impressions), 0)
    type: number
    format: currency
  - name: cpc
    sql: sum(spend) / nullIf(sum(clicks), 0)
    type: number
    format: currency
