# Daily P&L split by payment method (COD vs prepaid).
cubes:
- name: gold_payment_method_pnl
  title: Payment Method P&L (Gold)
  description: >
    Daily order revenue, COGS, and operating costs by normalized payment method.
    net_profit = net_revenue_excl_tax − COGS − shipping − packaging − gateway − RTO.
  sql: |
    SELECT
      o.brand_id AS brand_id,
      o.order_date AS report_date,
      CASE
        WHEN o.is_cod = 1 THEN 'cod'
        WHEN lower(coalesce(o.payment_gateway, '')) LIKE '%upi%' THEN 'upi'
        WHEN lower(coalesce(o.payment_gateway, '')) IN ('shopify_payments', 'shopify payments') THEN 'shopify_payments'
        WHEN lower(coalesce(o.payment_gateway, '')) IN ('razorpay', 'phonepe', 'paytm') THEN lower(o.payment_gateway)
        ELSE coalesce(nullIf(o.payment_gateway, ''), 'other')
      END AS payment_method,
      countDistinct(CASE WHEN o.order_status != 'cancelled' THEN o.order_id END) AS orders,
      sum(CASE WHEN o.order_status IN ('active', 'partially_refunded') THEN o.gross_revenue_excl_tax ELSE 0 END) AS gross_revenue_excl_tax,
      sum(CASE WHEN o.order_status IN ('active', 'partially_refunded') THEN o.net_revenue_excl_tax ELSE 0 END) AS net_revenue_excl_tax,
      sum(CASE
        WHEN o.order_status IN ('active', 'partially_refunded') AND i.included_in_pnl_cogs = 1
        THEN i.total_cost ELSE 0 END) AS attributed_cogs,
      sum(CASE
        WHEN o.order_status IN ('active', 'partially_refunded')
        THEN coalesce(i.shipping_cost, 0) + coalesce(i.packaging_cost, 0)
           + coalesce(i.gateway_fee, 0) + coalesce(i.rto_cost, 0)
        ELSE 0 END) AS total_operating_cost
    FROM gold.fct_orders o
    LEFT JOIN gold.fct_order_items i
      ON i.brand_id = o.brand_id AND i.order_id = o.order_id
    WHERE o.is_test = 0
    GROUP BY o.brand_id, o.order_date, payment_method
  measures:
  - name: orders
    sql: orders
    type: sum
    format: number
  - name: gross_revenue_excl_tax
    sql: gross_revenue_excl_tax
    type: sum
    format: currency
  - name: net_revenue_excl_tax
    sql: net_revenue_excl_tax
    type: sum
    format: currency
  - name: attributed_cogs
    sql: attributed_cogs
    type: sum
    format: currency
  - name: total_operating_cost
    sql: total_operating_cost
    type: sum
    format: currency
  - name: gross_profit
    sql: net_revenue_excl_tax - attributed_cogs
    type: sum
    format: currency
  - name: net_profit
    sql: net_revenue_excl_tax - attributed_cogs - total_operating_cost
    type: sum
    format: currency
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
  - name: report_date
    sql: report_date
    type: time
  - name: payment_method
    sql: payment_method
    type: string
