# gold.dim_ad_neurohack_map — brand × ad × tag_code (parsed from ad naming convention).
cubes:
- name: gold_dim_ad_neurohack_map
  sql_table: gold.dim_ad_neurohack_map
  title: Ad Neurohack Tag Map
  description: 'Maps Meta ads to Neurohack tag codes extracted from ad names. Grain
    brand_id × ad_key × tag_code × tag_position. One ad may have multiple tags — join
    to meta ads fans out spend across tags.

    '
  joins:
  - name: gold_dim_neurohack
    sql: '{gold_dim_ad_neurohack_map}.tag_code = {gold_dim_neurohack}.tag_code'
    relationship: many_to_one
  measures:
  - name: tag_mappings
    type: count
    format: number
  - name: tagged_ads
    sql: ad_key
    type: count_distinct
    format: number
  - name: distinct_tags
    sql: tag_code
    type: count_distinct
    format: number
  dimensions:
  - name: brand_id
    sql: toString(brand_id)
    type: string
    primary_key: true
  - name: ad_key
    sql: ad_key
    type: string
    primary_key: true
  - name: ad_id
    sql: ad_id
    type: string
  - name: ad_name
    sql: ad_name
    type: string
  - name: tag_code
    sql: tag_code
    type: string
    primary_key: true
  - name: tag_position
    sql: tag_position
    type: number
  - name: category_name
    sql: category_name
    type: string
  - name: hack_name
    sql: hack_name
    type: string
  - name: _loaded_at
    sql: _loaded_at
    type: time
