# gold.mart_meta_ad_neurotag_daily — ad × tag daily with full-credit and split-credit metrics.
cubes:
- name: gold_mart_meta_ad_neurotag_daily
  public: false
  sql_table: gold.mart_meta_ad_neurotag_daily
  title: Meta Ad Neurohack Tag Analysis (Daily)
  description: 'Ad × Neurohack tag daily analytical surface with performance + attribution.
    Full-credit (*_fc) preserves ad-level totals; split-credit (*_sc) divides by tag_count.
    Use spend_sc / net_revenue_sc for tag-level rollups; spend_fc only when filtering
    to one tag per ad.

    '
  measures:
  - name: spend_fc
    sql: spend_fc
    type: sum
    format: currency
  - name: impressions_fc
    sql: impressions_fc
    type: sum
    format: number
  - name: clicks_fc
    sql: clicks_fc
    type: sum
    format: number
  - name: gross_revenue_fc
    sql: gross_revenue_fc
    type: sum
    format: currency
