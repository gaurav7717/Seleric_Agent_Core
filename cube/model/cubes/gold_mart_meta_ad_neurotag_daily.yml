    sql: new_customer_revenue_fc
    type: sum
    format: currency
  - name: spend_sc
    sql: spend_sc
    type: sum
    format: currency
  - name: impressions_sc
    sql: impressions_sc
    type: sum
    format: number
  - name: clicks_sc
    sql: clicks_sc
    type: sum
    format: number
  - name: gross_revenue_sc
    sql: gross_revenue_sc
    type: sum
    format: currency
