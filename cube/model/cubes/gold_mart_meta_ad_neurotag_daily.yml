    format: currency
  - name: roas_fc
    sql: sum(net_revenue_fc) / nullIf(sum(spend_fc), 0)
    type: number
  - name: roas_sc
    sql: sum(net_revenue_sc) / nullIf(sum(spend_sc), 0)
    type: number
  - name: ctr
    sql: sum(clicks_fc) / nullIf(sum(impressions_fc), 0)
    type: number
    format: percent
  - name: cpc
    sql: sum(spend_fc) / nullIf(sum(clicks_fc), 0)
    type: number
    format: currency
  - name: cpm
