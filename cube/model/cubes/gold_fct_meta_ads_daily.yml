# gold.fct_meta_ads_daily — brand × date × account × campaign × adset × ad.
cubes:
- name: gold_fct_meta_ads_daily
  public: false
  sql_table: gold.fct_meta_ads_daily
  title: Gold Meta Ads Daily
  description: Meta ad performance from gold.fct_meta_ads_daily. Use meta_ad_performance
    view.
  joins:
  - name: gold_dim_campaign
    sql: '{gold_fct_meta_ads_daily.brand_id} = {gold_dim_campaign.brand_id} AND {gold_fct_meta_ads_daily.campaign_id}
      = {gold_dim_campaign.campaign_id} AND {gold_dim_campaign.platform} = ''meta'''
    relationship: many_to_one
  - name: gold_dim_adset
    sql: '{gold_fct_meta_ads_daily.brand_id} = {gold_dim_adset.brand_id} AND {gold_fct_meta_ads_daily.adset_id}
      = {gold_dim_adset.adset_id} AND {gold_dim_adset.platform} = ''meta'''
    relationship: many_to_one
  - name: gold_dim_ad
    sql: '{gold_fct_meta_ads_daily.brand_id} = {gold_dim_ad.brand_id} AND {gold_fct_meta_ads_daily.ad_id}
      = {gold_dim_ad.ad_id} AND {gold_dim_ad.platform} = ''meta'''
    relationship: many_to_one
  measures:
  - name: spend
    sql: spend
    type: sum
    format: currency
  - name: ad_spend
    sql: spend
    type: sum
    format: currency
