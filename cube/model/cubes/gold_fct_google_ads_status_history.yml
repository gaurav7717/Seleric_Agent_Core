# gold.fct_google_ads_status_history — entity change audit.
cubes:
- name: gold_fct_google_ads_status_history
  public: false
  sql_table: gold.fct_google_ads_status_history
  title: Gold Google Ads Status History
  description: Google campaign/adgroup/ad status and budget change events. Use ad_status_changes
    view.
  measures:
  - name: change_events
    type: count
    format: number
  - name: status_changes
    sql: CASE WHEN {CUBE}.is_status_change = 1 THEN {CUBE}.entity_id END
    type: count_distinct
    format: number
  - name: budget_changes
    sql: CASE WHEN {CUBE}.is_budget_change = 1 THEN {CUBE}.entity_id END
    type: count_distinct
    format: number
  - name: daily_budget_amount
    sql: daily_budget_amount
    type: sum
    format: currency
  - name: company_id
    sql: company_id
    type: sum
    format: number
  - name: is_first_seen
    sql: is_first_seen
    type: sum
    format: number
  - name: is_bid_strategy_change
    sql: is_bid_strategy_change
    type: sum
    format: number
  - name: cpc_bid_amount
    sql: cpc_bid_amount
    type: sum
    format: number
  - name: cpm_bid_amount
    sql: cpm_bid_amount
    type: sum
    format: number
  - name: cpv_bid_amount
    sql: cpv_bid_amount
    type: sum
    format: number
  - name: prev_daily_budget_amount
    sql: prev_daily_budget_amount
    type: sum
    format: number
  - name: prev_cpc_bid_amount
    sql: prev_cpc_bid_amount
    type: sum
    format: number
  - name: prev_cpm_bid_amount
    sql: prev_cpm_bid_amount
    type: sum
    format: number
  - name: prev_cpv_bid_amount
    sql: prev_cpv_bid_amount
    type: sum
    format: number
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
    primary_key: true
  - name: entity_type
    sql: entity_type
    type: string
    primary_key: true
  - name: entity_id
    sql: entity_id
    type: string
    primary_key: true
  - name: changed_at
    sql: changed_at
    type: time
    primary_key: true
  - name: entity_name
    sql: entity_name
    type: string
  - name: status
    sql: status
    type: string
  - name: is_status_change
    sql: is_status_change
    type: boolean
  - name: is_budget_change
    sql: is_budget_change
    type: boolean
  - name: campaign_id
