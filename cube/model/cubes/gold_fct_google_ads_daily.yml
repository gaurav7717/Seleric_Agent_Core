# gold.fct_google_ads_daily — brand × date × campaign × adset × ad × device × network.
cubes:
- name: gold_fct_google_ads_daily
  sql_table: gold.fct_google_ads_daily
  title: Gold Google Ads Daily
  description: Google ad performance from gold.fct_google_ads_daily. Use google_ad_performance
    view.
  joins:
  - name: gold_dim_campaign
    sql: '{gold_fct_google_ads_daily.brand_id} = {gold_dim_campaign.brand_id} AND
      {gold_fct_google_ads_daily.campaign_id} = {gold_dim_campaign.campaign_id} AND
      {gold_dim_campaign.platform} = ''google'''
    relationship: many_to_one
  measures:
  - name: spend
    sql: spend
    type: sum
    format: currency
  - name: impressions
    sql: impressions
    type: sum
    format: number
  - name: clicks
    sql: clicks
    type: sum
    format: number
  - name: conversions
    sql: conversions
    type: sum
    format: number
  - name: conversion_value
    sql: conversion_value
    type: sum
    format: currency
  - name: all_conversions
    sql: all_conversions
    type: sum
    format: number
  - name: all_conversion_value
    sql: all_conversion_value
    type: sum
    format: currency
  - name: view_through_conversions
    sql: view_through_conversions
    type: sum
    format: number
  - name: roas
    sql: sum(conversion_value) / nullIf(sum(spend), 0)
    type: number
  - name: ctr
    sql: sum(clicks) / nullIf(sum(impressions), 0)
    type: number
    format: percent
  - name: cpc
    sql: sum(spend) / nullIf(sum(clicks), 0)
    type: number
    format: currency
  - name: cpm
    sql: 1000.0 * sum(spend) / nullIf(sum(impressions), 0)
    type: number
    format: currency
  - name: cost_per_conversion
    sql: sum(spend) / nullIf(sum(conversions), 0)
    type: number
    format: currency
  - name: average_cpc
    sql: average_cpc
    type: sum
    format: number
  - name: search_impression_share
    sql: search_impression_share
    type: sum
    format: number
  - name: search_top_impression_share
    sql: search_top_impression_share
    type: sum
    format: number
  - name: search_abs_top_impression_share
    sql: search_abs_top_impression_share
    type: sum
    format: number
  - name: search_budget_lost_is
    sql: search_budget_lost_is
    type: sum
    format: number
  - name: search_rank_lost_is
    sql: search_rank_lost_is
    type: sum
    format: number
  - name: video_views
    sql: video_views
    type: sum
    format: number
  - name: view_rate
    sql: avg(view_rate)
    type: number
    format: percent
  - name: average_cpv
    sql: average_cpv
    type: sum
    format: number
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
    primary_key: true
  - name: report_date
    sql: report_date
    type: time
    primary_key: true
  - name: campaign_id
    sql: campaign_id
    type: string
  - name: campaign_name
    sql: campaign_name
    type: string
  - name: campaign_type
    sql: campaign_type
    type: string
  - name: adset_id
    sql: adset_id
    type: string
  - name: adset_name
    sql: adset_name
    type: string
  - name: ad_id
    sql: ad_id
    type: string
  - name: ad_name
    sql: ad_name
    type: string
  - name: segment_device
    sql: segment_device
    type: string
  - name: segment_ad_network_type
    sql: segment_ad_network_type
    type: string
  - name: google_daily_key
    sql: google_daily_key
    type: string
  - name: customer_id
    sql: customer_id
    type: string
  - name: account_name
    sql: account_name
    type: string
  - name: campaign_key
    sql: campaign_key
    type: string
  - name: adset_key
    sql: adset_key
    type: string
  - name: ad_key
    sql: ad_key
    type: string
  - name: ad_type
    sql: ad_type
    type: string
  - name: _loaded_at
    sql: _loaded_at
    type: time
  - name: dt
    sql: dt
    type: time
