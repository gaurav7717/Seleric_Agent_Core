# gold.dim_neurohack — creative taxonomy / behavioral hack tag catalog (550 tags).
cubes:
- name: gold_dim_neurohack
  sql_table: gold.dim_neurohack
  title: Neurohack Tag Catalog
  description: 'Master catalog of Neurohack creative tags (tag_code → category, hack_name).
    Grain tag_code. Join to dim_ad_neurohack_map on tag_code for ad-level analysis.

    '
  measures:
  - name: tags
    type: count
    format: number
  - name: categories
    sql: category_code
    type: count_distinct
    format: number
  - name: hacks
    sql: hack_number
    type: count_distinct
    format: number
  dimensions:
  - name: tag_code
    sql: tag_code
    type: string
    primary_key: true
    title: Tag Code
  - name: hack_number
    sql: hack_number
    type: number
  - name: category_code
    sql: category_code
    type: string
  - name: category_name
    sql: category_name
    type: string
  - name: hack_name
    sql: hack_name
    type: string
  - name: category_order
    sql: category_order
    type: number
  - name: _loaded_at
    sql: _loaded_at
    type: time
