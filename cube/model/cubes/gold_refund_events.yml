# Refund events from line items — cash-at-risk and refund timing analysis.
cubes:
- name: gold_refund_events
  public: false
  title: Refund Events (Gold)
  description: >
    Per-refund-event line items with refund processed date. Grain brand_id × refund_line_item_id.
    Use refund_date (axis D) for refund timing — not returned_at (return lifecycle axis B).
  sql: |
    SELECT
      brand_id,
      order_id,
      line_item_id,
      sku,
      product_title,
      return_status,
      refund_date,
      refund_total_amount AS refund_amount,
      returns_excl_tax AS refund_amount_ex_gst,
      refunded_quantity AS refunded_units
    FROM gold.fct_refund_line_items
    WHERE refunded_quantity > 0
      AND refund_date IS NOT NULL
  measures:
  - name: refund_lines
    type: count
    format: number
  - name: refund_amount
    sql: refund_amount
    type: sum
    format: currency
  - name: refund_amount_ex_gst
    sql: refund_amount_ex_gst
    type: sum
    format: currency
  - name: refunded_units
    sql: refunded_units
    type: sum
    format: number
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
    primary_key: true
  - name: order_id
    sql: order_id
    type: string
    primary_key: true
  - name: line_item_id
    sql: line_item_id
    type: string
    primary_key: true
    description: >
      Was selected in this cube's SQL but never exposed as a dimension nor
      part of a declared key (found 2026-07-11 via a full primary-key sweep
      across every cube — see CUBE_SEMANTIC_AUDIT.md §2). Natural composite
      key brand_id x order_id x line_item_id, matching the same grain the
      cube's own header comment always claimed but never enforced.
  - name: refund_processed_date
    sql: refund_date
    type: time
    title: Refund Processed Date (IST)
  - name: return_status
    sql: return_status
    type: string
  - name: sku
    sql: sku
    type: string
  - name: product_title
    sql: product_title
    type: string
