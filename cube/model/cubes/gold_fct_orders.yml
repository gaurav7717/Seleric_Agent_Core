# gold.fct_orders — brand × order grain (IST order_date).
cubes:
- name: gold_fct_orders
  public: false
  sql_table: gold.fct_orders
  title: Gold Shopify Orders
  description: 'Canonical order fact from dbt gold.fct_orders. Filter is_test = false
    for KPIs. Use commerce_orders view. For company P&L use canonical_pnl / gold_fct_daily_pnl.

    '
  joins:
  - name: gold_fct_order_items
    sql: '{gold_fct_orders.brand_id} = {gold_fct_order_items.brand_id} AND {gold_fct_orders.order_id}
      = {gold_fct_order_items.order_id}'
    relationship: one_to_many
  - name: gold_fct_order_attribution
    sql: '{gold_fct_orders.brand_id} = {gold_fct_order_attribution.brand_id} AND {gold_fct_orders.order_id}
      = {gold_fct_order_attribution.order_id}'
    relationship: one_to_one
  - name: gold_dim_customers
    sql: '{gold_fct_orders.brand_id} = {gold_dim_customers.brand_id} AND {gold_fct_orders.customer_id}
      = {gold_dim_customers.customer_id}'
    relationship: many_to_one
  measures:
  # count_distinct on order_id — plain type:count on composite string PKs makes
  # Cube emit CAST(..., 'STRING') which ClickHouse rejects (wants String).
  - name: orders
    sql: CASE WHEN {CUBE}.is_test = 0 THEN {CUBE}.order_id END
    type: count_distinct
    format: number
  - name: gross_revenue
    sql: gross_revenue
    type: sum
    format: currency
    filters:
    - sql: '{CUBE}.is_test = 0'
  - name: net_revenue
    sql: net_revenue
    type: sum
    format: currency
    filters:
    - sql: '{CUBE}.is_test = 0'
  - name: gross_revenue_excl_tax
    sql: gross_revenue_excl_tax
    type: sum
    format: currency
    filters:
    - sql: '{CUBE}.is_test = 0'
  - name: net_revenue_excl_tax
    sql: net_revenue_excl_tax
    type: sum
    format: currency
    filters:
    - sql: '{CUBE}.is_test = 0'
  - name: total_refund_amount
    sql: total_refund_amount
    type: sum
    format: currency
    filters:
    - sql: '{CUBE}.is_test = 0'
  - name: total_discounts
    sql: total_discounts
    type: sum
    format: currency
    filters:
    - sql: '{CUBE}.is_test = 0'
  - name: total_tax
    sql: total_tax
    type: sum
    format: currency
    filters:
    - sql: '{CUBE}.is_test = 0'
  - name: total_shipping_charged
    sql: total_shipping_charged
    type: sum
    format: currency
    filters:
    - sql: '{CUBE}.is_test = 0'
  - name: shipping_revenue
    sql: total_shipping_charged
    type: sum
    format: currency
    filters:
    - sql: '{CUBE}.is_test = 0'
  - name: net_sales_ex_gst
    sql: net_revenue_excl_tax
    type: sum
    format: currency
    filters:
    - sql: '{CUBE}.is_test = 0'
  - name: active_orders
    sql: CASE WHEN {CUBE}.order_status IN ('active', 'payment_pending') AND {CUBE}.is_revenue_adjustment
      = 0 AND {CUBE}.is_test = 0 THEN {CUBE}.order_id END
    type: count_distinct
    format: number
  - name: cancelled_orders
    sql: CASE WHEN {CUBE}.order_status = 'cancelled' AND {CUBE}.is_test = 0 THEN {CUBE}.order_id
      END
    type: count_distinct
    format: number
  - name: refunded_orders
    sql: CASE WHEN {CUBE}.order_status IN ('refunded', 'partially_refunded') AND {CUBE}.order_status
      != 'cancelled' AND {CUBE}.is_test = 0 THEN {CUBE}.order_id END
    type: count_distinct
    format: number
  - name: returned_orders
    sql: CASE WHEN {CUBE}.return_status IN ('RETURNED', 'IN_PROGRESS') AND {CUBE}.is_test
      = 0 AND {CUBE}.returned_at IS NOT NULL THEN {CUBE}.order_id END
    type: count_distinct
    format: number
    description: RETURNED + IN_PROGRESS only — time-axis returned_at_ist; do not use
      IS NOT NULL on return_status.
  - name: net_orders
    sql: CASE WHEN {CUBE}.order_status != 'cancelled' AND {CUBE}.is_test = 0 THEN
      {CUBE}.order_id END
    type: count_distinct
    format: number
  - name: return_rate
    sql: "100.0 * countDistinct(CASE WHEN {CUBE}.return_status IN ('RETURNED', 'IN_PROGRESS')\n\
      \  AND {CUBE}.is_test = 0 THEN {CUBE}.order_id END)\n/ nullIf(countDistinct(CASE\
      \ WHEN {CUBE}.order_status != 'cancelled'\n  AND {CUBE}.is_test = 0 THEN {CUBE}.order_id\
      \ END), 0)\n"
    type: number
    format: percent
  - name: orders_with_shipping
    sql: CASE WHEN {CUBE}.total_shipping_charged > 0 AND {CUBE}.is_test = 0 THEN {CUBE}.order_id
      END
    type: count_distinct
    format: number
  - name: cod_orders
    sql: CASE WHEN {CUBE}.is_cod = 1 AND {CUBE}.is_test = 0 THEN {CUBE}.order_id END
    type: count_distinct
    format: number
  - name: prepaid_orders
    sql: CASE WHEN {CUBE}.is_cod = 0 AND {CUBE}.is_test = 0 AND {CUBE}.order_status
      != 'cancelled' THEN {CUBE}.order_id END
    type: count_distinct
    format: number
  - name: prepaid_pct
    sql: "100.0 * countDistinct(CASE WHEN {CUBE}.is_cod = 0 AND {CUBE}.is_test = 0\n\
      \  AND {CUBE}.order_status != 'cancelled' THEN {CUBE}.order_id END)\n/ nullIf(countDistinct(CASE\
      \ WHEN {CUBE}.order_status != 'cancelled'\n  AND {CUBE}.is_test = 0 THEN {CUBE}.order_id\
      \ END), 0)\n"
    type: number
    format: percent
  - name: new_customer_orders
    sql: CASE WHEN {CUBE}.is_new_customer = 1 AND {CUBE}.is_test = 0 THEN {CUBE}.order_id
      END
    type: count_distinct
    format: number
  - name: aov
    sql: sum({CUBE}.net_revenue) / nullIf(count(CASE WHEN {CUBE}.is_test = 0 THEN
      {CUBE}.order_id END), 0)
    type: number
    format: currency
  - name: aov_excl_tax
    sql: sum({CUBE}.net_revenue_excl_tax) / nullIf(count(CASE WHEN {CUBE}.is_test
      = 0 THEN {CUBE}.order_id END), 0)
    type: number
    format: currency
  - name: subtotal_price
    sql: subtotal_price
    type: sum
    format: currency
  - name: item_count
    sql: item_count
    type: sum
    format: number
  - name: total_weight_grams
    sql: total_weight_grams
    type: sum
    format: number
  - name: is_draft_order
    sql: is_draft_order
    type: sum
    format: number
  - name: product_gross_revenue
    sql: product_gross_revenue
    type: sum
    format: currency
  - name: over_refund_flag
    sql: over_refund_flag
    type: sum
    format: number
  - name: revenue_eligible
    sql: revenue_eligible
    type: sum
    format: number
  - name: cogs_eligible
    sql: cogs_eligible
    type: sum
    format: number
  - name: ops_eligible
    sql: ops_eligible
    type: sum
    format: number
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
    primary_key: true
  - name: order_id
    sql: order_id
    type: string
    primary_key: true
  - name: order_date
    sql: order_date
    type: time
    title: Order Date (IST)
  - name: created_at_ist
    sql: order_date
    type: time
    title: Order Date (IST)
    description: Alias for order_date — always use IST, never UTC created_at.
  - name: customer_id
    sql: customer_id
    type: string
  - name: order_status
    sql: order_status
    type: string
  - name: return_status
    sql: return_status
    type: string
  - name: payment_gateway
    sql: payment_gateway
    type: string
  - name: payment_method
    sql: payment_method
    type: string
  - name: is_cod
    sql: is_cod
    type: boolean
  - name: is_new_customer
    sql: is_new_customer
    type: boolean
  - name: is_guest_checkout
    sql: is_guest_checkout
    type: boolean
  - name: is_revenue_adjustment
    sql: is_revenue_adjustment
    type: boolean
  - name: is_test
    sql: is_test
    type: boolean
  - name: utm_source
    sql: utm_source
    type: string
  - name: utm_medium
    sql: utm_medium
    type: string
  - name: utm_campaign
    sql: utm_campaign
    type: string
  - name: source_name
    sql: source_name
    type: string
  - name: fulfillment_status
    sql: fulfillment_status
    type: string
  - name: ship_country
    sql: '{gold_dim_customers.default_country}'
    type: string
    title: Ship Country
  - name: ship_province
    sql: '{gold_dim_customers.default_province}'
    type: string
    title: Ship Province
  - name: ship_city
    sql: shipping_city
    type: string
    title: Ship City
  - name: order_key
    sql: order_key
    type: string
  - name: order_name
    sql: order_name
    type: string
  - name: order_created_at
    sql: order_created_at
    type: time
  - name: order_updated_at
    sql: order_updated_at
    type: time
  - name: cancelled_at
    sql: cancelled_at
    type: time
  - name: closed_at
    sql: closed_at
    type: time
  - name: customer_email
    sql: customer_email
    type: string
  - name: financial_status
    sql: financial_status
    type: string
  - name: cancel_reason
    sql: cancel_reason
    type: string
  - name: utm_content
    sql: utm_content
    type: string
  - name: utm_term
    sql: utm_term
    type: string
  - name: referring_site
    sql: referring_site
    type: string
  - name: landing_site
    sql: landing_site
    type: string
  - name: processing_method
    sql: processing_method
    type: string
  - name: tags
    sql: tags
    type: string
  - name: note
    sql: note
    type: string
  - name: _loaded_at
    sql: _loaded_at
    type: time
  - name: dt
    sql: dt
    type: time
  - name: created_at
    sql: created_at
    type: time
  - name: updated_at
    sql: updated_at
    type: time
  - name: returned_at
    sql: returned_at
    type: time
  - name: returned_at_ist
    sql: cast(toTimeZone(returned_at, 'Asia/Kolkata') AS date)
    type: time
    title: Return Date (IST)
    description: Use for return-status time series — not order_date or updated_at.
  - name: primary_return_status
    sql: primary_return_status
    type: string
  - name: shopify_return_status
    sql: shopify_return_status
    type: string
  - name: cancelled_date
    sql: cancelled_date
    type: time
  - name: returned_date
    sql: returned_date
    type: time
  - name: refunded_at
    sql: refunded_at
    type: time
  - name: refunded_date
    sql: refunded_date
    type: time
  - name: voided_at
    sql: voided_at
    type: time
  - name: voided_date
    sql: voided_date
    type: time
  - name: pnl_refund_class
    sql: pnl_refund_class
    type: string
  - name: shipping_country
    sql: shipping_country
    type: string
  - name: shipping_country_code
    sql: shipping_country_code
    type: string
  - name: shipping_region
    sql: shipping_region
    type: string
  - name: shipping_state_code
    sql: shipping_state_code
    type: string
  - name: shipping_city
    sql: shipping_city
    type: string
  - name: shipping_pincode
    sql: shipping_pincode
    type: string
  - name: shipping_address1
    sql: shipping_address1
    type: string
  - name: shipping_address2
    sql: shipping_address2
    type: string
  - name: shipping_address
    sql: shipping_address
    type: string
  - name: order_created_at_ist
    sql: order_created_at_ist
    type: time
  - name: order_updated_at_ist
    sql: order_updated_at_ist
    type: time
