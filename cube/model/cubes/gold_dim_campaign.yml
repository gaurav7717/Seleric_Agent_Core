# gold.dim_campaign — cross-platform campaign dimension.
cubes:
- name: gold_dim_campaign
  sql_table: gold.dim_campaign
  title: Gold Campaign Dimension
  description: Unified Meta + Google campaigns. Join to ad facts via campaign_id +
    platform.
  joins:
  - name: gold_dim_adset
    sql: '{gold_dim_campaign.brand_id} = {gold_dim_adset.brand_id} AND {gold_dim_campaign.campaign_key}
      = {gold_dim_adset.campaign_key}'
    relationship: one_to_many
  measures:
  - name: campaigns
    type: count
    format: number
  - name: active_campaigns
    sql: CASE WHEN {CUBE}.is_active = 1 THEN {CUBE}.campaign_key END
    type: count_distinct
    format: number
  - name: daily_budget_amount
    sql: daily_budget_amount
    type: sum
    format: currency
  - name: lifetime_budget_amount
    sql: lifetime_budget_amount
    type: sum
    format: currency
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
    primary_key: true
  - name: campaign_key
    sql: campaign_key
    type: string
    primary_key: true
  - name: campaign_id
    sql: campaign_id
    type: string
  - name: platform
    sql: platform
    type: string
  - name: campaign_name
    sql: campaign_name
    type: string
  - name: campaign_status
    sql: campaign_status
    type: string
  - name: is_active
    sql: is_active
    type: boolean
  - name: campaign_objective
    sql: campaign_objective
    type: string
  - name: campaign_type
    sql: campaign_type
    type: string
  - name: buying_type
    sql: buying_type
    type: string
  - name: bid_strategy
    sql: bid_strategy
    type: string
  - name: start_date
    sql: start_date
    type: time
  - name: end_date
    sql: end_date
    type: time
  - name: platform_created_at
    sql: platform_created_at
    type: time
  - name: platform_updated_at
    sql: platform_updated_at
    type: time
  - name: _loaded_at
    sql: _loaded_at
    type: time
