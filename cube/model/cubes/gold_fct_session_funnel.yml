# gold.fct_session_funnel — brand × session grain. Do NOT sum purchase_revenue for P&L.
cubes:
- name: gold_fct_session_funnel
  public: false
  sql_table: gold.fct_session_funnel
  title: Gold Session Funnel
  description: 'Session-level Snowplow funnel from gold.fct_session_funnel. Use session_funnel
    view. Count sessions and conversion rates only — do NOT sum purchase_revenue for
    P&L (use fct_order_attribution).

    '
  measures:
  # count_distinct on session_id — plain type:count on composite string PKs makes
  # Cube emit CAST(..., 'STRING') which ClickHouse rejects (wants String).
  - name: sessions
    sql: "{CUBE}.session_id"
    type: count_distinct
    format: number
  - name: converted_sessions
    sql: CASE WHEN {CUBE}.converted = 1 THEN {CUBE}.session_id END
    type: count_distinct
    format: number
  - name: purchases
    sql: CASE WHEN {CUBE}.stage_purchased = 1 THEN {CUBE}.session_id END
    type: count_distinct
    format: number
  - name: product_view_sessions
    sql: CASE WHEN {CUBE}.stage_product_view = 1 THEN {CUBE}.session_id END
    type: count_distinct
    format: number
  - name: add_to_cart_sessions
    sql: CASE WHEN {CUBE}.stage_add_to_cart = 1 THEN {CUBE}.session_id END
    type: count_distinct
    format: number
  - name: checkout_sessions
    sql: CASE WHEN {CUBE}.stage_reached_checkout = 1 THEN {CUBE}.session_id END
    type: count_distinct
    format: number
  - name: total_events
    sql: total_events
    type: sum
    format: number
  - name: page_views
    sql: page_view_count
    type: sum
    format: number
  - name: product_views
    sql: product_view_count
    type: sum
    format: number
  - name: add_to_cart_events
    sql: add_to_cart_count
    type: sum
    format: number
  - name: avg_session_duration
    sql: avg(session_duration_seconds)
    type: number
  - name: session_to_pdp_rate
    sql: 100.0 * count(CASE WHEN {CUBE}.stage_product_view = 1 THEN {CUBE}.session_id
      END) / nullIf(count(*), 0)
    type: number
    format: percent
  - name: pdp_to_atc_rate
    sql: 100.0 * count(CASE WHEN {CUBE}.stage_add_to_cart = 1 THEN {CUBE}.session_id
      END) / nullIf(count(CASE WHEN {CUBE}.stage_product_view = 1 THEN {CUBE}.session_id
      END), 0)
    type: number
    format: percent
  - name: atc_to_checkout_rate
    sql: 100.0 * count(CASE WHEN {CUBE}.stage_reached_checkout = 1 THEN {CUBE}.session_id
      END) / nullIf(count(CASE WHEN {CUBE}.stage_add_to_cart = 1 THEN {CUBE}.session_id
      END), 0)
    type: number
    format: percent
  - name: overall_conversion_rate
    sql: 100.0 * count(CASE WHEN {CUBE}.converted = 1 THEN {CUBE}.session_id END)
      / nullIf(count(*), 0)
    type: number
    format: percent
  - name: session_duration_seconds
    sql: session_duration_seconds
    type: sum
    format: number
  - name: best_fingerprint_confidence
    sql: best_fingerprint_confidence
    type: sum
    format: number
  - name: page_view_count
    sql: page_view_count
    type: sum
    format: number
  - name: product_view_count
    sql: product_view_count
    type: sum
    format: number
  - name: collection_view_count
    sql: collection_view_count
    type: sum
    format: number
  - name: add_to_cart_count
    sql: add_to_cart_count
    type: sum
    format: number
  - name: remove_from_cart_count
    sql: remove_from_cart_count
    type: sum
    format: number
  - name: checkout_step_count
    sql: checkout_step_count
    type: sum
    format: number
  - name: site_search_count
    sql: site_search_count
    type: sum
    format: number
  - name: stage_browse
    sql: stage_browse
    type: sum
    format: number
  - name: stage_product_view
    sql: stage_product_view
    type: sum
    format: number
  - name: stage_add_to_cart
    sql: stage_add_to_cart
    type: sum
    format: number
  - name: stage_reached_checkout
    sql: stage_reached_checkout
    type: sum
    format: number
  - name: stage_purchased
    sql: stage_purchased
    type: sum
    format: number
  - name: shopify_order_id
    sql: shopify_order_id
    type: sum
    format: number
  - name: purchase_revenue
    sql: purchase_revenue
    type: sum
    format: currency
  - name: cart_abandonment_rate
    sql: 100.0 * (count(CASE WHEN {CUBE}.stage_add_to_cart = 1 THEN {CUBE}.session_id
      END) - count(CASE WHEN {CUBE}.stage_reached_checkout = 1 THEN {CUBE}.session_id
      END)) / nullIf(count(CASE WHEN {CUBE}.stage_add_to_cart = 1 THEN {CUBE}.session_id
      END), 0)
    type: number
    format: percent
  - name: checkout_abandonment_rate
    sql: 100.0 * (count(CASE WHEN {CUBE}.stage_reached_checkout = 1 THEN {CUBE}.session_id
      END) - count(CASE WHEN {CUBE}.converted = 1 THEN {CUBE}.session_id END)) / nullIf(count(CASE
      WHEN {CUBE}.stage_reached_checkout = 1 THEN {CUBE}.session_id END), 0)
    type: number
    format: percent
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
    primary_key: true
  - name: session_id
    sql: session_id
    type: string
    primary_key: true
  - name: session_date
    sql: session_date
    type: time
    title: Session Date (IST)
  - name: platform
    sql: platform
    type: string
  - name: channel
    sql: channel
    type: string
  - name: funnel_stage
    sql: funnel_stage
    type: string
  - name: converted
    sql: converted
    type: boolean
  - name: campaign_id
    sql: campaign_id
    type: string
  - name: campaign_name
    sql: campaign_name
    type: string
  - name: utm_source
    sql: utm_source
    type: string
  - name: utm_medium
    sql: utm_medium
    type: string
  - name: identity_resolution_method
    sql: identity_resolution_method
    type: string
  - name: session_funnel_key
    sql: session_funnel_key
    type: string
  - name: session_start
    sql: session_start
    type: time
  - name: session_end
    sql: session_end
    type: time
  - name: person_id
    sql: person_id
    type: string
  - name: fingerprint_visitor_id
    sql: fingerprint_visitor_id
    type: string
  - name: domain_userid
    sql: domain_userid
    type: string
  - name: first_cart_token
    sql: first_cart_token
    type: string
  - name: utm_campaign
    sql: utm_campaign
    type: string
  - name: utm_content
    sql: utm_content
    type: string
  - name: utm_term
    sql: utm_term
    type: string
  - name: fbclid
    sql: fbclid
    type: string
  - name: gclid
    sql: gclid
    type: string
  - name: landing_page
    sql: landing_page
    type: string
  - name: first_page_url
    sql: first_page_url
    type: string
  - name: last_page_url
    sql: last_page_url
    type: string
  - name: adset_id
    sql: adset_id
    type: string
  - name: adset_name
    sql: adset_name
    type: string
  - name: ad_id
    sql: ad_id
    type: string
  - name: ad_name
    sql: ad_name
    type: string
  - name: shopify_order_number
    sql: shopify_order_number
    type: string
  - name: purchase_at
    sql: purchase_at
    type: time
  - name: _loaded_at
    sql: _loaded_at
    type: time
