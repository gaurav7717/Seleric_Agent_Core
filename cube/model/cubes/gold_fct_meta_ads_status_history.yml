# gold.fct_meta_ads_status_history — entity change audit.
cubes:
- name: gold_fct_meta_ads_status_history
  sql_table: gold.fct_meta_ads_status_history
  title: Gold Meta Ads Status History
  description: Meta campaign/adset/ad status and budget change events. Use ad_status_changes
    view.
  measures:
  - name: change_events
    type: count
    format: number
  - name: status_changes
    sql: CASE WHEN {CUBE}.is_status_change = 1 THEN {CUBE}.entity_id END
    type: count_distinct
    format: number
  - name: budget_changes
    sql: CASE WHEN {CUBE}.is_budget_change = 1 THEN {CUBE}.entity_id END
    type: count_distinct
    format: number
  - name: daily_budget
    sql: daily_budget
    type: sum
    format: currency
  - name: lifetime_budget
    sql: lifetime_budget
    type: sum
    format: currency
  - name: company_id
    sql: company_id
    type: sum
    format: number
  - name: is_first_seen
    sql: is_first_seen
    type: sum
    format: number
  - name: is_bid_strategy_change
    sql: is_bid_strategy_change
    type: sum
    format: number
  - name: bid_amount
    sql: bid_amount
    type: sum
    format: currency
  - name: prev_daily_budget
    sql: prev_daily_budget
    type: sum
    format: currency
  - name: prev_lifetime_budget
    sql: prev_lifetime_budget
    type: sum
    format: currency
  - name: prev_bid_amount
    sql: prev_bid_amount
    type: sum
    format: currency
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
    primary_key: true
  - name: entity_type
    sql: entity_type
    type: string
    primary_key: true
  - name: entity_id
    sql: entity_id
    type: string
    primary_key: true
  - name: changed_at
    sql: changed_at
    type: time
    primary_key: true
  - name: entity_name
    sql: entity_name
    type: string
  - name: status
    sql: status
    type: string
  - name: effective_status
    sql: effective_status
    type: string
  - name: is_status_change
    sql: is_status_change
    type: boolean
  - name: is_budget_change
    sql: is_budget_change
    type: boolean
  - name: campaign_id
    sql: campaign_id
    type: string
  - name: adset_id
    sql: adset_id
    type: string
  - name: ad_id
    sql: ad_id
    type: string
  - name: shop_domain
    sql: shop_domain
    type: string
  - name: prev_snapshot_at
    sql: prev_snapshot_at
    type: time
  - name: changed_fields
    sql: changed_fields
    type: string
  - name: configured_status
    sql: configured_status
    type: string
  - name: bid_strategy
    sql: bid_strategy
    type: string
  - name: optimization_goal
    sql: optimization_goal
    type: string
  - name: creative_id
    sql: creative_id
    type: string
  - name: entity_name_prev
    sql: entity_name_prev
    type: string
  - name: prev_status
    sql: prev_status
    type: string
  - name: prev_effective_status
    sql: prev_effective_status
    type: string
  - name: prev_configured_status
    sql: prev_configured_status
    type: string
  - name: prev_bid_strategy
    sql: prev_bid_strategy
    type: string
  - name: prev_optimization_goal
    sql: prev_optimization_goal
    type: string
  - name: prev_creative_id
