# Campaign × product daily performance — gold.fct_order_attribution + fct_order_items.
cubes:
- name: gold_campaign_product_performance
  title: Campaign Product Performance (Gold)
  description: >
    Daily attributed revenue and COGS by last-touch campaign and SKU.
    Grain brand_id × report_date × lt_campaign_name × lt_platform × sku.
    spend joins platform ad tables at campaign × day (duplicated across SKUs in a campaign).
  sql: |
    WITH product_attr AS (
      SELECT
        a.brand_id AS brand_id,
        a.order_date AS report_date,
        a.lt_platform AS lt_platform,
        a.lt_campaign_name AS lt_campaign_name,
        o.sku AS sku,
        any(o.product_title) AS product_title,
        countDistinct(CASE
          WHEN a.order_status IN ('active', 'partially_refunded') AND a.is_test = 0
          THEN a.order_id END) AS attributed_orders,
        sum(CASE
          WHEN a.order_status IN ('active', 'partially_refunded') AND a.is_test = 0
          THEN o.net_revenue / 1.18 ELSE 0 END) AS attributed_net_revenue_ex_gst,
        sum(CASE
          WHEN a.order_status IN ('active', 'partially_refunded') AND a.is_test = 0
           AND o.included_in_pnl_cogs = 1
          THEN o.total_cost ELSE 0 END) AS attributed_cogs,
        sum(CASE
          WHEN a.order_status IN ('active', 'partially_refunded') AND a.is_test = 0
          THEN o.quantity ELSE 0 END) AS units_sold
      FROM gold.fct_order_attribution a
      INNER JOIN gold.fct_order_items o
        ON o.brand_id = a.brand_id AND o.order_id = a.order_id
      WHERE a.lt_campaign_name IS NOT NULL AND a.lt_campaign_name != ''
      GROUP BY a.brand_id, a.order_date, a.lt_platform, a.lt_campaign_name, o.sku
    ),
    campaign_spend AS (
      SELECT brand_id, report_date, 'meta' AS platform, campaign_name, sum(toFloat64(spend)) AS spend
      FROM gold.fct_meta_ads_daily
      GROUP BY brand_id, report_date, campaign_name
      UNION ALL
      SELECT brand_id, report_date, 'google' AS platform, campaign_name, sum(toFloat64(spend)) AS spend
      FROM gold.fct_google_ads_daily
      GROUP BY brand_id, report_date, campaign_name
    )
    SELECT
      p.brand_id AS brand_id,
      p.report_date AS report_date,
      p.lt_platform AS lt_platform,
      p.lt_campaign_name AS lt_campaign_name,
      p.sku AS sku,
      p.product_title AS product_title,
      p.attributed_orders AS attributed_orders,
      p.attributed_net_revenue_ex_gst AS attributed_net_revenue_ex_gst,
      p.attributed_cogs AS attributed_cogs,
      p.units_sold AS units_sold,
      coalesce(cs.spend, 0) AS spend
    FROM product_attr p
    LEFT JOIN campaign_spend cs
      ON cs.brand_id = p.brand_id
     AND cs.report_date = p.report_date
     AND cs.platform = p.lt_platform
     AND cs.campaign_name = p.lt_campaign_name
  measures:
  - name: attributed_orders
    sql: attributed_orders
    type: sum
    format: number
  - name: attributed_net_revenue_ex_gst
    sql: attributed_net_revenue_ex_gst
    type: sum
    format: currency
  - name: attributed_revenue
    sql: attributed_net_revenue_ex_gst
    type: sum
    format: currency
  - name: attributed_cogs
    sql: attributed_cogs
    type: sum
    format: currency
  - name: attributed_gross_profit
    sql: attributed_net_revenue_ex_gst - attributed_cogs
    type: sum
    format: currency
  - name: spend
    sql: spend
    type: sum
    format: currency
  - name: attributed_roas
    sql: sum(attributed_net_revenue_ex_gst) / nullIf(sum(spend), 0)
    type: number
  - name: units_sold
    sql: units_sold
    type: sum
    format: number
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
  - name: report_date
    sql: report_date
    type: time
  - name: lt_platform
    sql: lt_platform
    type: string
  - name: lt_campaign_name
    sql: lt_campaign_name
    type: string
  - name: sku
    sql: sku
    type: string
  - name: product_title
    sql: product_title
    type: string
