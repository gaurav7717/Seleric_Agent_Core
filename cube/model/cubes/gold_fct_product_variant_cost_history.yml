# gold.fct_product_variant_cost_history — SCD2 cost history.
cubes:
- name: gold_fct_product_variant_cost_history
  public: false
  sql_table: gold.fct_product_variant_cost_history
  title: Gold Variant Cost History (SCD2)
  description: Point-in-time COGS history. Append-on-change sync preserves backfills.
  measures:
  - name: cost_records
    type: count
    format: number
  - name: cost_per_item
    sql: cost_per_item
    type: avg
    format: currency
  - name: cost_change_amount
    sql: cost_change_amount
    type: sum
    format: currency
  - name: packaging_cost
    sql: packaging_cost
    type: avg
    format: currency
  - name: shipping_cost
    sql: shipping_cost
    type: avg
    format: currency
  - name: payment_gateway_fee
    sql: payment_gateway_fee
    type: avg
    format: currency
  - name: rto
    sql: rto
    type: avg
    format: currency
  - name: product_id
    sql: product_id
    type: sum
    format: number
  - name: price
    sql: price
    type: sum
    format: currency
  - name: previous_cost
    sql: previous_cost
    type: sum
    format: currency
  - name: cost_change_pct
    sql: avg(cost_change_pct)
    type: number
    format: percent
  - name: packaging_cost_change_amount
    sql: packaging_cost_change_amount
    type: sum
    format: currency
  - name: payment_gateway_fee_change_amount
    sql: payment_gateway_fee_change_amount
    type: sum
    format: currency
  - name: previous_packaging_cost
    sql: previous_packaging_cost
    type: sum
    format: currency
  - name: previous_payment_gateway_fee
    sql: previous_payment_gateway_fee
    type: sum
    format: currency
  - name: previous_price
    sql: previous_price
    type: sum
    format: currency
  - name: previous_rto
    sql: previous_rto
    type: sum
    format: currency
  - name: previous_shipping_cost
    sql: previous_shipping_cost
    type: sum
    format: currency
  - name: price_change_pct
    sql: avg(price_change_pct)
    type: number
    format: percent
  - name: rto_change_amount
    sql: rto_change_amount
    type: sum
    format: currency
  - name: shipping_cost_change_amount
    sql: shipping_cost_change_amount
    type: sum
    format: currency
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
    primary_key: true
  - name: variant_id
    sql: variant_id
    type: string
    primary_key: true
  - name: effective_from
    sql: effective_from
    type: time
    primary_key: true
  - name: effective_to
    sql: effective_to
    type: time
  - name: is_current
    sql: is_current
    type: boolean
  - name: sku
    sql: sku
    type: string
  - name: sku_changed
    sql: sku_changed
    type: boolean
  - name: previous_sku
    sql: previous_sku
    type: string
  - name: variant_title_changed
    sql: variant_title_changed
    type: boolean
  - name: price_change_amount
    sql: price_change_amount
    type: number
    format: currency
  - name: is_cost_missing
    sql: is_cost_missing
    type: boolean
  - name: cost_history_key
    sql: cost_history_key
    type: string
  - name: variant_title
    sql: variant_title
    type: string
  - name: _loaded_at
    sql: _loaded_at
    type: time
  - name: previous_variant_title
    sql: previous_variant_title
    type: string
