# gold.fct_meta_ads_breakdown_daily — brand × date × ad × breakdown segment.
# Each breakdown_type is a separate Meta API slice of the same spend. Filter to ONE
# breakdown_type before summing spend — mixing types multi-counts (~8×). For totals use fct_meta_ads_daily.
cubes:
- name: gold_fct_meta_ads_breakdown_daily
  public: false
  sql_table: gold.fct_meta_ads_breakdown_daily
  title: Gold Meta Ads Breakdown Daily
  description: 'Meta ad performance by breakdown segment. Grain includes breakdown_type
    — always filter to exactly one breakdown_type before aggregating spend. For account/campaign/ad
    totals use gold.fct_meta_ads_daily (meta_ad_performance).

    '
  measures:
  - name: spend
    sql: spend
    type: sum
    format: currency
  - name: impressions
    sql: impressions
    type: sum
    format: number
  - name: clicks
    sql: clicks
    type: sum
    format: number
  - name: purchases
    sql: purchases
    type: sum
    format: number
  - name: video_views_3s
    sql: video_views_3s
    type: sum
    format: number
  - name: video_thruplay_15s
    sql: video_thruplay_15s
    type: sum
    format: number
  - name: hook_rate
    sql: 100.0 * sum(video_views_3s) / nullIf(sum(impressions), 0)
    type: number
    format: percent
  - name: hold_rate_15s
    sql: 100.0 * sum(video_thruplay_15s) / nullIf(sum(video_views_3s), 0)
    type: number
    format: percent
  - name: hold_rate_p50
    sql: 100.0 * sum(video_p50_views) / nullIf(sum(video_views_3s), 0)
    type: number
    format: percent
  - name: reach
    sql: reach
    type: sum
    format: number
  - name: frequency
    sql: frequency
    type: sum
    format: number
  - name: link_clicks
    sql: link_clicks
    type: sum
    format: number
  - name: ctr_all
