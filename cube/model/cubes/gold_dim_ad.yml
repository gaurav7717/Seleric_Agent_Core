# gold.dim_ad — cross-platform ad dimension.
cubes:
- name: gold_dim_ad
  public: false
  sql_table: gold.dim_ad
  title: Gold Ad Dimension
  description: Unified Meta and Google ads with creative metadata.
  measures:
  - name: ads
    type: count
    format: number
  - name: active_ads
    sql: CASE WHEN {CUBE}.is_active = 1 THEN {CUBE}.ad_key END
    type: count_distinct
    format: number
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
    primary_key: true
  - name: ad_key
    sql: ad_key
    type: string
    primary_key: true
  - name: adset_key
    sql: adset_key
    type: string
  - name: campaign_key
    sql: campaign_key
    type: string
  - name: ad_id
    sql: ad_id
    type: string
  - name: adset_id
    sql: adset_id
    type: string
  - name: campaign_id
    sql: campaign_id
    type: string
  - name: platform
    sql: platform
    type: string
  - name: ad_name
    sql: ad_name
    type: string
  - name: ad_status
    sql: ad_status
    type: string
  - name: is_active
    sql: is_active
    type: boolean
  - name: creative_type
    sql: creative_type
    type: string
  - name: headline
    sql: headline
    type: string
  - name: ad_format
    sql: ad_format
    type: string
  - name: description
    sql: description
    type: string
  - name: creative_id
    sql: creative_id
    type: string
  - name: destination_url
    sql: destination_url
    type: string
  - name: display_url
    sql: display_url
    type: string
  - name: platform_created_at
    sql: platform_created_at
    type: time
  - name: platform_updated_at
    sql: platform_updated_at
    type: time
  - name: _loaded_at
    sql: _loaded_at
    type: time
  - name: creative_key
    sql: creative_key
    type: string
