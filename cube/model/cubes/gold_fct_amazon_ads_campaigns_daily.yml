# gold.fct_amazon_ads_campaigns_daily — Amazon Ads campaign × day.
# Date axis: report_date (when the ad ran, NOT the order date). Ratios (cpc/cpm/
# ctr/roas/acos) are RECOMPUTED from aggregates — never sum the stored ratio cols.
# Analytics Platform Reference §5.
cubes:
- name: gold_fct_amazon_ads_campaigns_daily
  public: false
  sql_table: gold.fct_amazon_ads_campaigns_daily
  title: Amazon Ads Campaigns Daily (Gold)
  description: >
    Amazon Ads (SP/SB/SD) performance at brand × campaign × report_date. Date axis
    is report_date. spend = coalesce(spend, cost). sales/orders are Amazon-attributed
    (platform-reported), not Shopify truth. Ratios recomputed from numerator/
    denominator. Serve view: amazon_ad_performance.
  measures:
  - name: spend
    sql: coalesce(spend, cost)
    type: sum
    format: currency
    description: Ad cost = coalesce(spend, cost).
  - name: impressions
    sql: impressions
    type: sum
    format: number
  - name: clicks
    sql: clicks
    type: sum
    format: number
  - name: attributed_orders
    sql: orders
    type: sum
    format: number
    description: Amazon-attributed orders (platform-reported).
  - name: attributed_sales
    sql: sales
    type: sum
    format: currency
    description: Amazon-attributed sales (platform-reported) — not Shopify truth.
  - name: matched_order_count
    sql: matched_order_count
    type: sum
    format: number
  - name: purchases_7d
    sql: purchases_7d
    type: sum
    format: number
  - name: sales_7d
    sql: sales_7d
    type: sum
    format: currency
  - name: ctr
    sql: 100.0 * sum({CUBE}.clicks) / nullIf(sum({CUBE}.impressions), 0)
    type: number
    format: percent
    description: Click-through rate, recomputed from clicks / impressions.
  - name: cpc
    sql: sum(coalesce({CUBE}.spend, {CUBE}.cost)) / nullIf(sum({CUBE}.clicks), 0)
    type: number
    format: currency
    description: Cost per click, recomputed from spend / clicks.
  - name: cpm
    sql: 1000.0 * sum(coalesce({CUBE}.spend, {CUBE}.cost)) / nullIf(sum({CUBE}.impressions), 0)
    type: number
    format: currency
  - name: ads_roas
    sql: sum({CUBE}.sales) / nullIf(sum(coalesce({CUBE}.spend, {CUBE}.cost)), 0)
    type: number
    description: Attributed sales / spend (ad-linked orders only). Recomputed.
  - name: ads_acos
    sql: 100.0 * sum(coalesce({CUBE}.spend, {CUBE}.cost)) / nullIf(sum({CUBE}.sales), 0)
    type: number
    format: percent
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
    title: Brand ID
  - name: campaign_id
    sql: campaign_id
    type: string
    primary_key: true
  - name: report_date
    sql: report_date
    type: time
    primary_key: true
    title: Report Date
    description: Date the ad ran (NOT the order date).
  - name: campaign_name
    sql: campaign_name
    type: string
  - name: campaign_type
    sql: campaign_type
    type: string
    description: SP (Sponsored Products), SB (Brands), SD (Display).
  - name: campaign_status
    sql: campaign_status
    type: string
