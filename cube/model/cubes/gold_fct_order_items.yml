# gold.fct_order_items — brand × order × line_item grain.
cubes:
- name: gold_fct_order_items
  public: false
  sql_table: gold.fct_order_items
  title: Gold Order Line Items
  description: 'Line-item fact with point-in-time COGS. Use product_performance view.
    Filter is_test via parent order join or order_status for P&L-aligned metrics.

    '
  joins:
  - name: gold_fct_orders
    sql: '{gold_fct_order_items.brand_id} = {gold_fct_orders.brand_id} AND {gold_fct_order_items.order_id}
      = {gold_fct_orders.order_id}'
    relationship: many_to_one
  - name: gold_fct_product_variant_cost
    sql: '{gold_fct_order_items.brand_id} = {gold_fct_product_variant_cost.brand_id}
      AND {gold_fct_order_items.variant_id} = {gold_fct_product_variant_cost.variant_id}'
    relationship: many_to_one
  measures:
  - name: line_item_count
    sql: "{CUBE}.line_item_id"
    type: count_distinct
    format: number
  - name: net_revenue
    sql: net_revenue
    type: sum
    format: currency
  - name: gross_line_revenue
    sql: total_price
    type: sum
    format: currency
  - name: gross_line_revenue_ex_gst
    sql: net_pre_refund_excl_gst + discount_excl_gst
    type: sum
    format: currency
    description: >
      Pre-discount, pre-refund line revenue ex-GST. Uses per-line GST columns
      (net_pre_refund_excl_gst + discount_excl_gst), NOT a flat /1.18 — brands have
      mixed 5/12/18/28% rates.
  - name: net_line_revenue
    sql: CASE WHEN {CUBE}.return_status NOT IN ('RETURNED', 'IN_PROGRESS') THEN {CUBE}.net_revenue
      ELSE 0 END
    type: sum
    format: currency
  - name: net_line_revenue_ex_gst
    sql: CASE WHEN {CUBE}.return_status NOT IN ('RETURNED', 'IN_PROGRESS') THEN {CUBE}.net_excl_gst
      ELSE 0 END
    type: sum
    format: currency
    description: Net line revenue ex-GST (per-line net_excl_gst), non-returned lines only.
  - name: total_line_discounts
    sql: total_price - net_revenue
    type: sum
    format: currency
  - name: total_quantity
    sql: quantity
    type: sum
    format: number
  - name: returned_units
    sql: CASE WHEN {CUBE}.return_status IN ('RETURNED', 'IN_PROGRESS') THEN {CUBE}.quantity
      ELSE 0 END
    type: sum
    format: number
    description: Pre-filtered to RETURNED + IN_PROGRESS — do not add extra return_status
      filter.
  - name: cancelled_units
    sql: CASE WHEN {CUBE}.order_status = 'cancelled' THEN {CUBE}.quantity ELSE 0 END
    type: sum
    format: number
  - name: unique_products
    sql: variant_id
    type: count_distinct
    format: number
  - name: units_per_order
    sql: sum({CUBE}.quantity) / nullIf(countDistinct({CUBE}.order_id), 0)
    type: number
    format: number
  - name: avg_unit_price
    sql: sum({CUBE}.total_price) / nullIf(sum({CUBE}.quantity), 0)
    type: number
    format: currency
  - name: avg_discounted_unit_price
    sql: sum({CUBE}.net_revenue) / nullIf(sum({CUBE}.quantity), 0)
    type: number
    format: currency
  - name: gross_profit_ex_gst
    sql: sum(CASE WHEN {CUBE}.return_status NOT IN ('RETURNED', 'IN_PROGRESS') THEN
      {CUBE}.net_excl_gst ELSE 0 END) - sum({CUBE}.net_cost)
    type: number
    format: currency
    description: Net line revenue ex-GST − net product cost (per-line GST columns, not flat /1.18).
  - name: total_cogs
    sql: '{placed_product_cost}'
    type: number
    format: currency
  - name: total_price
    sql: total_price
    type: sum
    format: currency
  - name: total_discount
    sql: total_discount
    type: sum
    format: currency
  - name: quantity
    sql: quantity
    type: sum
    format: number
  - name: net_quantity
    sql: net_quantity
    type: sum
    format: number
  - name: units_sold
    sql: CASE WHEN {CUBE}.order_status NOT IN ('cancelled', 'refunded', 'voided')
      THEN {CUBE}.net_quantity ELSE 0 END
    type: sum
    format: number
  - name: total_cost
    sql: total_cost
    type: sum
    format: currency
  - name: net_cost
    sql: net_cost
    type: sum
    format: currency
  - name: placed_product_cost
    sql: CASE WHEN {CUBE}.included_in_pnl_cogs = 1 THEN {CUBE}.total_cost ELSE 0 END
    type: sum
    format: currency
  - name: refunded_product_cost
    sql: refunded_product_cost
    type: sum
    format: currency
  - name: packaging_cost
    sql: packaging_cost
    type: sum
    format: currency
  - name: shipping_cost
    sql: shipping_cost
    type: sum
    format: currency
  - name: gateway_fee
    sql: gateway_fee
    type: sum
    format: currency
  - name: rto_cost
    sql: rto_cost
    type: sum
    format: currency
  - name: gross_margin
    sql: sum({CUBE}.net_excl_gst) - sum({CUBE}.net_cost)
    type: number
    format: currency
    description: Net line revenue ex-GST − net product cost (per-line GST columns, not flat /1.18).
  - name: lines_missing_cogs
    sql: CASE WHEN {CUBE}.is_cost_set = 0 THEN {CUBE}.line_item_id END
    type: count_distinct
    format: number
  - name: product_id
    sql: product_id
    type: sum
    format: number
  - name: refunded_quantity
    sql: refunded_quantity
    type: sum
    format: number
  - name: unit_price
    sql: unit_price
    type: sum
    format: currency
  - name: net_price
    sql: net_price
    type: sum
    format: currency
  - name: unit_cost
    sql: unit_cost
    type: sum
    format: currency
  - name: requires_shipping
    sql: requires_shipping
    type: sum
    format: number
  - name: is_gift_card
    sql: is_gift_card
    type: sum
    format: number
  - name: is_revenue_adjustment
    sql: is_revenue_adjustment
    type: sum
    format: number
  - name: over_refund_flag
    sql: over_refund_flag
    type: sum
    format: number
  - name: revenue_eligible
    sql: revenue_eligible
    type: sum
    format: number
  - name: gateway_fee_per_unit
    sql: gateway_fee_per_unit
    type: sum
    format: currency
  - name: packaging_cost_per_unit
    sql: packaging_cost_per_unit
    type: sum
    format: currency
  - name: placed_gateway_fee
    sql: placed_gateway_fee
    type: sum
    format: currency
  - name: placed_packaging_cost
    sql: placed_packaging_cost
    type: sum
    format: currency
  - name: placed_shipping_cost
    sql: placed_shipping_cost
    type: sum
    format: currency
  - name: refunded_gateway_fee
    sql: refunded_gateway_fee
    type: sum
    format: currency
  - name: refunded_packaging_cost
    sql: refunded_packaging_cost
    type: sum
    format: currency
  - name: refunded_shipping_cost
    sql: refunded_shipping_cost
    type: sum
    format: currency
  - name: rto_per_unit
    sql: rto_per_unit
    type: sum
    format: currency
  - name: shipping_cost_per_unit
    sql: shipping_cost_per_unit
    type: sum
