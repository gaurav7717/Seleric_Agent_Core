# Enriched ad×tag map with neurohack catalog fields (SQL join).
cubes:
- name: gold_ad_neurohack_enriched
  public: false
  sql: "SELECT\n  toString(m.brand_id) AS brand_id,\n  m.ad_id AS ad_id,\n  m.ad_key\
    \ AS ad_key,\n  m.ad_name AS ad_name,\n  m.tag_code AS tag_code,\n  m.tag_position\
    \ AS tag_position,\n  n.category_code AS category_code,\n  n.category_name AS\
    \ category_name,\n  n.hack_name AS hack_name,\n  n.hack_number AS hack_number,\n\
    \  n.category_order AS category_order\nFROM gold.dim_ad_neurohack_map AS m LEFT\
    \ JOIN gold.dim_neurohack AS n ON m.tag_code = n.tag_code\n"
  title: Ad Neurohack Map (Enriched)
  description: dim_ad_neurohack_map joined to dim_neurohack on tag_code.
  measures:
  - name: tag_mappings
    type: count
    format: number
  - name: tagged_ads
    sql: ad_key
    type: count_distinct
    format: number
  - name: distinct_tags
    sql: tag_code
    type: count_distinct
    format: number
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
    primary_key: true
  - name: ad_key
    sql: ad_key
    type: string
    primary_key: true
  - name: ad_id
    sql: ad_id
    type: string
  - name: ad_name
    sql: ad_name
    type: string
  - name: tag_code
    sql: tag_code
    type: string
    primary_key: true
  - name: tag_position
    sql: tag_position
    type: number
  - name: category_code
    sql: category_code
    type: string
  - name: category_name
    sql: category_name
    type: string
  - name: hack_name
    sql: hack_name
    type: string
  - name: hack_number
    sql: hack_number
    type: number
  - name: category_order
    sql: category_order
    type: number
