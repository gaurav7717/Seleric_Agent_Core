# Hourly commerce aggregates — inline from gold.fct_orders until gold.fct_orders_hourly is synced.
cubes:
- name: gold_hourly_commerce
  title: Hourly Commerce (Gold)
  description: >
    Hourly order counts and revenue (IST). Aggregates gold.fct_orders; switches to
    gold.fct_orders_hourly after dbt deploy + CH sync for better performance.
  sql: |
    SELECT
      brand_id,
      order_date AS report_date,
      toHour(toTimeZone(order_created_at, 'Asia/Kolkata')) AS hour_of_day,
      count(DISTINCT order_id) AS orders,
      count(DISTINCT if(order_status != 'cancelled', order_id, NULL)) AS net_orders,
      sum(if(order_status IN ('active', 'partially_refunded'), net_revenue, 0)) AS net_revenue,
      sum(if(order_status IN ('active', 'partially_refunded'), net_revenue_excl_tax, 0)) AS net_revenue_excl_tax,
      sum(if(order_status IN ('active', 'partially_refunded'), gross_revenue, 0)) AS gross_revenue
    FROM gold.fct_orders
    WHERE is_test = 0
      AND order_created_at IS NOT NULL
    GROUP BY brand_id, report_date, hour_of_day
  measures:
  - name: orders
    sql: orders
    type: sum
    format: number
  - name: net_orders
    sql: net_orders
    type: sum
    format: number
  - name: net_revenue
    sql: net_revenue
    type: sum
    format: currency
  - name: net_revenue_excl_tax
    sql: net_revenue_excl_tax
    type: sum
    format: currency
  - name: gross_revenue
    sql: gross_revenue
    type: sum
    format: currency
  dimensions:
  - name: brand_id
    sql: brand_id
    type: string
  - name: report_date
    sql: report_date
    type: time
  - name: hour_of_day
    sql: hour_of_day
    type: number
