# Neurohack tag × attributed revenue + Meta spend — dim_ad_neurohack_map + fct_order_attribution.
cubes:
- name: gold_neurohack_attribution
  public: false
  title: Neurohack Attribution (Gold)
  description: >
    Attributed revenue and Meta ad spend by Neurohack tag. Multi-tag ads fan out spend
    and revenue — use distinct_ads to check dedupe.
  sql: |
    SELECT
      a.brand_id AS brand_id,
      a.order_date AS report_date,
      m.tag_code AS tag_code,
      any(nh.category_name) AS category_name,
      any(nh.hack_name) AS hack_name,
      a.lt_ad_id AS ad_id,
      max(toFloat64(meta.spend)) AS spend,
      countDistinct(CASE
        WHEN a.order_status IN ('active', 'partially_refunded') AND a.is_test = 0
        THEN a.order_id END) AS attributed_orders,
      sum(CASE
        WHEN a.order_status IN ('active', 'partially_refunded') AND a.is_test = 0
        THEN a.net_revenue_excl_tax ELSE 0 END) AS attributed_net_revenue_ex_gst,
      sum(CASE
        WHEN a.order_status IN ('active', 'partially_refunded') AND a.is_test = 0
         AND o.included_in_pnl_cogs = 1
        THEN o.total_cost ELSE 0 END) AS attributed_cogs
    FROM gold.fct_order_attribution a
    INNER JOIN gold.dim_ad_neurohack_map m
      ON m.brand_id = a.brand_id AND m.ad_id = a.lt_ad_id
    LEFT JOIN gold.dim_neurohack nh
      ON nh.tag_code = m.tag_code
    LEFT JOIN gold.fct_order_items o
      ON o.brand_id = a.brand_id AND o.order_id = a.order_id
    LEFT JOIN gold.fct_meta_ads_daily meta
      ON meta.brand_id = a.brand_id
     AND meta.ad_id = a.lt_ad_id
     AND meta.report_date = a.order_date
    WHERE a.lt_platform = 'meta' AND a.lt_ad_id IS NOT NULL
    GROUP BY a.brand_id, a.order_date, m.tag_code, a.lt_ad_id
  measures:
  - name: spend
    sql: spend
    type: sum
    format: currency
  - name: attributed_orders
    sql: attributed_orders
    type: sum
    format: number
  - name: attributed_net_revenue_ex_gst
    sql: attributed_net_revenue_ex_gst
    type: sum
    format: currency
  - name: attributed_revenue
    sql: attributed_net_revenue_ex_gst
    type: sum
    format: currency
  - name: attributed_cogs
    sql: attributed_cogs
    type: sum
    format: currency
  - name: attributed_gross_profit
    sql: attributed_net_revenue_ex_gst - attributed_cogs
    type: sum
    format: currency
  - name: attributed_roas
    sql: sum(attributed_net_revenue_ex_gst) / nullIf(sum(spend), 0)
    type: number
  - name: distinct_ads
    sql: ad_id
    type: count_distinct
    format: number
  dimensions:
  - name: neurohack_attribution_key
    sql: "concat(toString(brand_id),'|',toString(report_date),'|',tag_code,'|',coalesce(ad_id,''))"
    type: string
    primary_key: true
  - name: brand_id
    sql: brand_id
    type: string
  - name: report_date
    sql: report_date
    type: time
  - name: tag_code
    sql: tag_code
    type: string
  - name: category_name
    sql: category_name
    type: string
  - name: hack_name
    sql: hack_name
    type: string
  - name: ad_id
    sql: ad_id
    type: string
