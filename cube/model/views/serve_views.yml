views:
  - name: canonical_pnl
    title: Canonical Company P&L (Gold)
    description: >
      Company net profit, MER, ROAS and full operating waterfall (rebuilt on int_finance_daily_rollups + line-item cost split + ad spend).
      MCP tool: cube_canonical_pnl. Sum daily rows for period rollups (IST report_date).
    cubes:
      - join_path: gold_fct_daily_pnl
        includes:
          - gross_revenue
          - gross_sales_excl_tax
          - net_revenue
          - net_sales_excl_tax
