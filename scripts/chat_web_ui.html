<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>seleric-mcp · test chat</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2129; --border: #2d333b;
    --text: #e6edf3; --dim: #8b949e; --accent: #4da3ff; --green: #3fb950;
    --amber: #d29922; --red: #f85149; --user-bg: #1f3a5f;
    font-size: 15px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text); height: 100vh;
    display: flex; flex-direction: column;
    font-family: "Segoe UI", system-ui, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    background: var(--panel); border-bottom: 1px solid var(--border);
  }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--dim); }
  header .dot.ok { background: var(--green); }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; }
  header .meta { color: var(--dim); font-size: 12px; font-family: Consolas, monospace; }
  header .spacer { flex: 1; }
  button {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  #log { flex: 1; overflow-y: auto; padding: 18px 0 8px; }
  .row { max-width: 900px; margin: 0 auto 10px; padding: 0 16px; }
  .msg { padding: 10px 14px; border-radius: 10px; white-space: pre-wrap; line-height: 1.45; }
  .user .msg { background: var(--user-bg); border: 1px solid #2c4f7c; margin-left: 15%; }
  .agent .msg { background: var(--panel); border: 1px solid var(--border); margin-right: 8%; }
  .who { font-size: 11px; color: var(--dim); margin: 0 4px 3px; text-transform: uppercase; letter-spacing: .06em; }
  .user .who { text-align: right; }
  details.tool {
    margin: 4px 0 4px 24px; font-family: Consolas, "Cascadia Mono", monospace; font-size: 12px;
    border-left: 2px solid var(--border); padding-left: 10px;
  }
  details.tool summary { cursor: pointer; color: var(--dim); list-style: none; }
  details.tool summary::before { content: "→ "; color: var(--accent); }
  details.tool.done summary::before { content: "← "; color: var(--green); }
  details.tool pre {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; overflow-x: auto; max-height: 320px; overflow-y: auto;
    margin: 6px 0 2px; white-space: pre-wrap; word-break: break-word;
  }
  .error .msg { background: #3d1d1f; border: 1px solid var(--red); }
  .thinking { color: var(--dim); font-size: 12px; margin-left: 24px; font-family: Consolas, monospace; }
  .thinking::after { content: ""; animation: dots 1.2s steps(4) infinite; }
  @keyframes dots { 0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "..."; } }
  footer {
    background: var(--panel); border-top: 1px solid var(--border); padding: 12px 16px;
  }
  .inputwrap { max-width: 900px; margin: 0 auto; display: flex; gap: 10px; }
  textarea {
    flex: 1; resize: none; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    font: inherit; min-height: 44px; max-height: 140px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  #send { padding: 0 22px; font-size: 14px; }
  #send:disabled { opacity: .45; cursor: default; }
  #pad {
    position: fixed; right: 0; top: 0; bottom: 0; width: 340px; background: var(--panel);
    border-left: 1px solid var(--border); padding: 16px; overflow-y: auto;
    transform: translateX(100%); transition: transform .18s ease; z-index: 10;
  }
  #pad.open { transform: none; }
  #pad h2 { font-size: 13px; margin: 0 0 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }
  #pad .kv { font-family: Consolas, monospace; font-size: 12px; border-bottom: 1px solid var(--border); padding: 6px 0; }
  #pad .kv b { color: var(--accent); display: block; }
  #pad .empty { color: var(--dim); font-size: 12px; }
</style>
</head>
<body>
<header>
  <div class="dot" id="statusdot"></div>
  <h1>seleric-mcp · test chat</h1>
  <span class="meta" id="meta">connecting…</span>
  <div class="spacer"></div>
  <button id="padbtn">Scratchpad</button>
  <button id="resetbtn">Reset</button>
</header>

<div id="log"></div>

<footer>
  <div class="inputwrap">
    <textarea id="input" placeholder="e.g. what was net profit last 7 days vs prior?  (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send">Send</button>
  </div>
</footer>

<aside id="pad"><h2>Scratchpad</h2><div id="padbody" class="empty">empty</div></aside>

<script>
const log = document.getElementById("log");
const input = document.getElementById("input");
const send = document.getElementById("send");
const pad = document.getElementById("pad");

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}
function addMessage(kind, who, text) {
  const row = el("div", "row " + kind);
  row.appendChild(el("div", "who", who));
  row.appendChild(el("div", "msg", text));
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
  return row;
}
function addTool(name, args) {
  const row = el("div", "row");
  const d = el("details", "tool");
  const s = el("summary", null, name + "(" + JSON.stringify(args) + ")");
  d.appendChild(s);
  row.appendChild(d);
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
  return d;
}
function finishTool(d, preview, truncated) {
  d.classList.add("done");
  const pre = el("pre", null, preview + (truncated ? "\n… (truncated)" : ""));
  d.appendChild(pre);
  log.scrollTop = log.scrollHeight;
}
function renderPad(notes) {
  const body = document.getElementById("padbody");
  body.innerHTML = "";
  const keys = Object.keys(notes || {});
  if (!keys.length) { body.className = "empty"; body.textContent = "empty"; return; }
  body.className = "";
  for (const k of keys) {
    const kv = el("div", "kv");
    kv.appendChild(el("b", null, k));
    kv.appendChild(document.createTextNode(notes[k]));
    body.appendChild(kv);
  }
}

async function refreshState() {
  try {
    const s = await (await fetch("/state")).json();
    document.getElementById("meta").textContent = s.model + " · " + s.tools.length + " tools";
    document.getElementById("statusdot").classList.add("ok");
    renderPad(s.scratchpad);
  } catch { document.getElementById("meta").textContent = "backend unreachable"; }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || send.disabled) return;
  input.value = "";
  send.disabled = true;
  addMessage("user", "you", text);
  const thinking = el("div", "row");
  thinking.appendChild(el("div", "thinking", "working"));
  log.appendChild(thinking);

  let openTool = null;
  try {
    const resp = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text }),
    });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    for (;;) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf("\n\n")) >= 0) {
        const chunk = buf.slice(0, idx); buf = buf.slice(idx + 2);
        if (!chunk.startsWith("data: ")) continue;
        const ev = JSON.parse(chunk.slice(6));
        if (ev.type === "tool_call") openTool = addTool(ev.tool, ev.args);
        else if (ev.type === "tool_result" && openTool) { finishTool(openTool, ev.preview, ev.truncated); openTool = null; }
        else if (ev.type === "assistant") addMessage("agent", "agent", ev.text);
        else if (ev.type === "error") addMessage("agent error", "error", ev.text);
        else if (ev.type === "done") renderPad(ev.scratchpad);
      }
    }
  } catch (e) {
    addMessage("agent error", "error", "request failed: " + e);
  } finally {
    thinking.remove();
    send.disabled = false;
    input.focus();
  }
}

send.onclick = sendMessage;
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById("resetbtn").onclick = async () => {
  await fetch("/reset", { method: "POST" });
  log.innerHTML = "";
  renderPad({});
  addMessage("agent", "agent", "Conversation reset.");
};
document.getElementById("padbtn").onclick = () => pad.classList.toggle("open");

refreshState();
input.focus();
</script>
</body>
</html>
