# Business language -> canonical metric id. This is what makes
# catalogue_search_metrics("topline") resolve without guessing.
# Only reference ids that exist under catalogue/metrics/.
terms:
  # Topline/period totals must match the dashboard Net Sales card, which nets
  # returns/cancels on their event date -> commerce_net_revenue_daily.
  # commerce_net_revenue stays placement-axis, order-grain, for breakdowns
  # (city/UTM/payment method) that commerce_performance can't provide.
  - term: topline
    canonical_id: commerce_net_revenue_daily
  - term: net sales
    canonical_id: commerce_net_revenue_daily
  - term: revenue
    canonical_id: commerce_net_revenue_daily
  - term: commerce net revenue
    canonical_id: commerce_net_revenue_daily
  - term: revenue by city
    canonical_id: commerce_net_revenue
  - term: net revenue by city
    canonical_id: commerce_net_revenue
  - term: AOV
    canonical_id: aov
  - term: basket size
    canonical_id: aov
  - term: average order value
    canonical_id: aov
  - term: order volume
    canonical_id: orders
  - term: units sold
    canonical_id: units_sold
  - term: units
    canonical_id: units_sold
  - term: product revenue
    canonical_id: product_net_revenue
  - term: SKU revenue
    canonical_id: product_net_revenue
  - term: sales by product
    canonical_id: product_net_revenue
  - term: most profitable product
    canonical_id: product_gross_profit
  - term: product margin
    canonical_id: product_gross_margin_pct
  - term: gross margin by SKU
    canonical_id: product_gross_margin_pct
  - term: ASP
    canonical_id: average_selling_price
  - term: average selling price
    canonical_id: average_selling_price
  - term: best selling product
    canonical_id: null
    definition: >
      Ambiguous — "best" can mean highest units_sold, product_net_revenue, or
      product_gross_profit. Resolve from context (default to units_sold for
      "best selling"); clarify only when the business meaning materially changes.
  - term: gross sales
    canonical_id: gross_sales
    definition: >
      Placement revenue ex-GST before discounts (includes cancelled/voided
      placement orders — dashboard Gross Sales card definition).
  - term: discounts
    canonical_id: discounts
  - term: coupons
    canonical_id: discounts
  - term: returns and cancellations
    canonical_id: returns_cancels
  - term: returns / cancels
    canonical_id: returns_cancels
  - term: return revenue
    canonical_id: return_cancel_revenue
  - term: revenue lost to returns
    canonical_id: return_cancel_revenue
  - term: RTO
    canonical_id: null
    definition: >
      Return to Origin — an order returned before/at delivery. Not a
      standalone catalogued metric in the current commerce/product set.
  - term: bottom line
    canonical_id: net_profit
  - term: profit
    canonical_id: net_profit
  - term: net profit
    canonical_id: net_profit
  - term: COGS
    canonical_id: net_cogs
  - term: company COGS
    canonical_id: net_cogs
  - term: net cogs
    canonical_id: net_cogs
  - term: cost of goods
    canonical_id: net_cogs
  - term: product COGS
    canonical_id: product_cogs
  - term: gross margin
    canonical_id: product_gross_margin_pct
  - term: MER
    canonical_id: mer
  - term: marketing efficiency ratio
    canonical_id: mer
  - term: ROAS
    canonical_id: net_roas
    definition: >
      Defaults to Net ROAS ((Net Sales − Net COGS) / Shopify ad spend).
      Platform-reported Meta/Google/Amazon ROAS is not certified.
  - term: net ROAS
    canonical_id: net_roas
  - term: net roas
    canonical_id: net_roas
