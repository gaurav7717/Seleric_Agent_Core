# Business language -> canonical metric id. This is what makes
# catalogue_search_metrics("topline") resolve without guessing.
terms:
  - term: topline
    canonical_id: net_revenue
  - term: net sales
    canonical_id: net_revenue
  - term: revenue
    canonical_id: net_revenue
  - term: commerce net revenue
    canonical_id: commerce_net_revenue
  - term: revenue by city
    canonical_id: commerce_net_revenue
  - term: net revenue by city
    canonical_id: commerce_net_revenue
  - term: bottom line
    canonical_id: net_profit
  - term: profit
    canonical_id: net_profit
  - term: MER
    canonical_id: mer
    definition: "Marketing Efficiency Ratio = net revenue (ex-GST) / total ad spend"
  - term: marketing efficiency ratio
    canonical_id: mer
  - term: ROAS
    canonical_id: blended_roas
    definition: >
      Blended ROAS by default; Meta platform-reported ROAS is the separate
      metric meta_roas.
  - term: return on ad spend
    canonical_id: blended_roas
  - term: AOV
    canonical_id: aov
  - term: basket size
    canonical_id: aov
  - term: average order value
    canonical_id: aov
  - term: COGS
    canonical_id: total_cogs
  - term: cost of goods
    canonical_id: total_cogs
  - term: ad spend
    canonical_id: total_ad_spend
  - term: marketing spend
    canonical_id: total_ad_spend
  - term: contribution
    canonical_id: contribution_margin
  - term: LTV
    canonical_id: avg_ltv
  - term: lifetime value
    canonical_id: avg_ltv
  - term: order volume
    canonical_id: orders
  - term: gross margin
    canonical_id: gross_profit
  - term: attributed revenue
    canonical_id: attributed_revenue
    definition: >
      Business-truth net revenue (ex-GST) credited to the last marketing touch
      (gold.fct_order_attribution). Not the platform-reported conversion value —
      that is meta_ad_performance.purchase_value / google conversion_value.
  - term: last-touch revenue
    canonical_id: attributed_revenue
  - term: campaign revenue
    canonical_id: attributed_revenue
  - term: attributed orders
    canonical_id: attributed_orders
  - term: RTO
    canonical_id: null
    definition: >
      Return to Origin — an order returned before/at delivery, reversed out of
      net revenue. RTO cost is a COGS component (canonical_pnl.rto_cost); not a
      standalone catalogued metric yet.
  - term: meta impressions
    canonical_id: meta_impressions
  - term: meta clicks
    canonical_id: meta_clicks
  - term: meta CTR
    canonical_id: meta_ctr
  - term: meta CPC
    canonical_id: meta_cpc
  - term: meta purchases
    canonical_id: meta_purchases
  - term: meta CPA
    canonical_id: meta_cpa
  - term: meta purchase value
    canonical_id: meta_purchase_value
  - term: product views
    canonical_id: product_view_sessions
  - term: add to carts
    canonical_id: add_to_cart_sessions
  - term: add-to-carts
    canonical_id: add_to_cart_sessions
  - term: checkouts
    canonical_id: checkout_sessions
  - term: funnel purchases
    canonical_id: funnel_purchases
  - term: cart abandonment
    canonical_id: cart_abandonment_rate
  - term: checkout abandonment
    canonical_id: checkout_abandonment_rate
  - term: google conversions
    canonical_id: google_conversions
  - term: google conversion value
    canonical_id: google_conversion_value
  - term: google CPA
    canonical_id: google_cpa
