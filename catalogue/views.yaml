# Cube serve views exposed to the agent. Source of truth for names:
# C:\SpacePeppers\SpacePeppers\cube_mcp\semantic_layer_serve\model\views\serve_views.yml
views:
  - name: commerce_orders
    title: Commerce Performance (Serve)
    date_dimension: order_date
    freshness:
      source: serve.commerce_orders
      expected_cadence: "hourly after gold sync, IST"
  - name: commerce_performance
    title: Commerce Performance Daily (Serve)
    date_dimension: report_date
    freshness:
      source: serve.commerce_performance_daily
      expected_cadence: "hourly after gold sync, IST"
  - name: product_performance
    title: Product / SKU Performance (Serve)
    date_dimension: order_date
    freshness:
      source: serve.product_performance (VIEW over gold.fct_order_items FINAL)
      expected_cadence: "hourly after gold sync, IST"
  - name: meta_ad_performance
    title: Meta Ads Performance (Serve, daily)
    date_dimension: report_date
    freshness:
      source: serve.meta_ads_daily (VIEW over gold.fct_meta_ads_daily FINAL)
      expected_cadence: "5-min gold sync after dbt orchestrator; platform account day"
  - name: google_ad_performance
    title: Google Ads Performance (Serve, daily)
    date_dimension: report_date
    freshness:
      source: serve.google_ads_daily (VIEW aggregating gold.fct_google_ads_daily FINAL)
      expected_cadence: "5-min gold sync after dbt orchestrator; customer account day"
  - name: amazon_ad_performance
    title: Amazon Ads Performance (Serve, daily)
    date_dimension: report_date
    freshness:
      source: serve.amazon_ads_daily (VIEW over gold.fct_amazon_ads_campaigns_daily FINAL)
      expected_cadence: "daily Reports API (T-1) via curated dbt + 5-min gold sync"
  - name: meta_ad_breakdown_performance
    title: Meta Ads Breakdown (Serve, daily)
    date_dimension: report_date
    freshness:
      source: serve.meta_ads_breakdown_daily (VIEW over gold.mart_meta_ad_breakdown_daily FINAL)
      expected_cadence: "5-min gold sync after dbt orchestrator; platform account day"
  - name: order_attribution
    title: Order Attribution (Serve, last-touch)
    date_dimension: order_date
    freshness:
      source: serve.order_attribution (VIEW over gold.fct_order_attribution FINAL)
      expected_cadence: "hourly after gold sync, IST; order_date older than 3 days final"
  - name: meta_ad_attribution
    title: Meta Ad Attribution Daily (Serve, last-touch)
    date_dimension: report_date
    freshness:
      source: serve.meta_ad_attribution_daily (VIEW over gold.mart_meta_ad_daily_attribution FINAL)
      expected_cadence: "hourly after gold sync, IST"
  - name: customer_ltv
    title: Customer LTV (Serve)
    date_dimension: last_order_at
    freshness:
      source: serve.customer_ltv (VIEW over gold.fct_orders FINAL + dim_customers)
      expected_cadence: "hourly after gold sync, IST"
  - name: purchase_sequence
    title: Purchase Sequence (Serve)
    date_dimension: order_date
    freshness:
      source: serve.purchase_sequence (VIEW over gold.fct_orders FINAL)
      expected_cadence: "hourly after gold sync, IST"
  - name: canonical_pnl
    title: Canonical P&L Daily (Serve)
    date_dimension: report_date
    freshness:
      source: serve.canonical_pnl (commerce oracle + FE §11 Net COGS + ads spend)
      expected_cadence: "hourly after gold sync; costs lag ~1 day (is_final = report_date <= today-3)"
  - name: amazon_daily_pnl
    title: Amazon Daily P&L (Marketplace Fees)
    date_dimension: report_date
    freshness:
      source: gold.fct_amazon_daily_pnl
      expected_cadence: "daily after Amazon SP settlement sync"
  - name: orders_all_channels
    title: Total Orders (All Channels)
    date_dimension: report_date
    freshness:
      source: serve.commerce_orders + gold.fct_amazon_sp_orders
      expected_cadence: "hourly after gold sync, IST"
  - name: sales_all_channels
    title: Sales (All Channels)
    date_dimension: report_date
    freshness:
      source: serve.commerce_performance_daily + gold.fct_amazon_sp_order_pnl
      expected_cadence: "hourly after gold sync, IST"
  - name: refund_events
    title: Refund Events (Serve)
    date_dimension: refund_date
    freshness:
      source: serve.refund_events (VIEW over gold.fct_refunds FINAL)
      expected_cadence: "hourly after gold sync, IST"
  - name: return_lifecycle
    title: Return Lifecycle (Serve)
    date_dimension: refund_date
    freshness:
      source: serve.return_lifecycle (VIEW over gold.fct_refund_line_items FINAL)
      expected_cadence: "hourly after gold sync, IST"
  - name: amazon_commerce_performance
    title: Amazon Commerce Performance Daily (Serve)
    date_dimension: report_date
    freshness:
      source: serve.amazon_commerce_daily
      expected_cadence: "daily after Amazon SP sync; 30h SLA"
  - name: channel_attribution
    title: Channel Attribution Daily (Serve)
    date_dimension: report_date
    freshness:
      source: serve.channel_attribution_daily
      expected_cadence: "hourly Shopify + daily Amazon SP; 30h SLA"
  - name: customer_data
    title: Customer Data (Serve)
    date_dimension: null
    freshness:
      source: serve.customer_data
      expected_cadence: "hourly after gold dim_customers sync, IST"
  - name: session_funnel
    title: Session Funnel (Serve)
    date_dimension: session_date
    freshness:
      source: serve.session_funnel (VIEW over gold.fct_session_funnel FINAL)
      expected_cadence: "hourly after gold sync, IST"
  - name: funnel_daily
    title: Funnel Daily (Serve)
    date_dimension: report_date
    freshness:
      source: serve.funnel_daily (VIEW over gold.mart_funnel_daily FINAL)
      expected_cadence: "daily after dw/mart run; 26h SLA"
