# Business ontology crosswalk (agent catalogue ↔ OpenMetadata glossaries).
# Full OM specs: mage-ai/openmetadata/glossary/*.yml

domains:
  Commerce:
    om_glossary: Commerce
    owner_team: commerce-data-team
    data_product: CommercePerformance
    cube_views: [commerce_orders, commerce_performance]
    grain: Order
    date_axes: [placement, event]
  Product:
    om_glossary: Product
    owner_team: commerce-data-team
    data_product: ProductPerformance
    cube_views: [product_performance]
    grain: OrderLine
    date_axes: [placement]
  PaidMedia:
    om_glossary: Paid Media
    owner_team: growth-paid-media
    data_products: [MetaAdsPerformance, GoogleAdsPerformance, AmazonAdsPerformance]
    cube_views:
      - meta_ad_performance
      - meta_ad_breakdown_performance
      - google_ad_performance
      - amazon_ad_performance
    grain: Daily
    date_axes: [report_date]
    notes: Delivery metrics only — platform attribution excluded from certified ports.
  Finance:
    om_glossary: Finance
    owner_team: finance-data-team
    data_product: CanonicalPnl
    cube_views: [canonical_pnl]
    grain: Daily
    date_axes: [report_date]
    notes: >
      Composed brand x day P&L oracle, not an independent ingestion. MER is
      first-party net sales / total ad spend — never platform-reported ROAS.
  Attribution:
    om_glossary: Attribution
    owner_team: growth-paid-media
    data_product: MarketingAttribution
    cube_views: [order_attribution, meta_ad_attribution]
    grain: Order
    date_axes: [order_date]
    notes: Last-touch only. Multi-touch/view-through fail closed, not modeled.
  Customer:
    om_glossary: Customer
    owner_team: growth-crm
    data_product: CustomerIntelligence
    cube_views: [customer_ltv]
    grain: Customer
    date_axes: []
    notes: Lifetime snapshot, not a period rollup. Hashed PII only.
  PurchaseSequence:
    om_glossary: Customer
    owner_team: growth-crm
    data_product: PurchaseSequence
    cube_views: [purchase_sequence]
    grain: Order
    date_axes: [order_date]
    notes: Order-grain repeat-purchase cohort model; uses window functions.

entity_clusters:
  commerce_order:
    glossary: Commerce.CommerceOrder
    related: [Commerce.EligibleOrder, Commerce.ActiveOrder, Commerce.CancelledOrder, Commerce.ReturnedOrder]
    catalogue_metrics: [orders, active_orders, new_customer_orders]
  commerce_revenue:
    glossary: Commerce.NetSales
    related: [Commerce.GrossSales, Commerce.TotalSales, Commerce.Discounts, Commerce.ReturnCancelRevenue]
    catalogue_metrics: [commerce_net_revenue, commerce_net_revenue_daily, gross_sales, total_sales, discounts, return_cancel_revenue]
  commerce_events:
    glossary: Commerce.EventAxis
    related: [Commerce.CancelledOrder, Commerce.ReturnedOrder, Commerce.returnsCancels]
    catalogue_metrics: [cancelled_orders, refunded_orders, returns_cancels]
  product_line:
    glossary: Product.ProductOrder
    related: [Product.UnitsSold, Product.ProductNetRevenue, Product.ProductCOGS]
    catalogue_metrics: [product_orders, units_sold, product_net_revenue, product_cogs]
  product_margin:
    glossary: Product.ProductGrossProfit
    related: [Product.ProductGrossMargin, Product.AverageSellingPrice]
    catalogue_metrics: [product_gross_profit, product_gross_margin_pct, average_selling_price]
  paid_delivery:
    glossary: Paid Media.Spend
    related: [Paid Media.CTR, Paid Media.CPC, Paid Media.CPM, Paid Media.ReportDate, Paid Media.IsFinal]
    catalogue_metrics: [meta_spend, google_spend, amazon_ads_spend]
  paid_video_meta:
    glossary: Paid Media.HookRate(Meta)
    related: [Paid Media.ThruPlay, Paid Media.HoldRate(Meta)]
    catalogue_metrics: [meta_hook_rate, meta_thruplays, meta_video_completion_rate, meta_hold_rate_15s]
  finance_pnl:
    glossary: Finance.NetProfit
    related: [Finance.GrossProfit, Finance.ContributionMargin, Finance.MER, Finance.NetCogs, Finance.CostCoverage]
    catalogue_metrics:
      - net_cogs
      - shipping_cost
      - packaging_cost
      - payment_gateway_fees
      - rto_cost
      - operating_cost
      - total_ad_spend
      - gross_profit
      - contribution_margin
      - net_profit
      - gross_margin_pct
      - contribution_margin_pct
      - net_margin_pct
      - mer
      - cost_coverage_pct
  order_attribution:
    glossary: Attribution.AttributedOrder
    related: [Attribution.AttributedNetRevenue, Attribution.AttributionRate, Attribution.LastTouch]
    catalogue_metrics:
      - attributed_orders
      - attributed_net_revenue
      - attributed_gross_revenue
      - attributed_refund_amount
      - attributed_new_customer_orders
      - touch_attributed_orders
      - attribution_rate
      - avg_attribution_confidence
      - attributed_aov
  meta_ad_attribution:
    glossary: Attribution.AttributedOrder
    related: [Attribution.AttributedNetRevenue, Attribution.LastTouch]
    catalogue_metrics:
      - meta_attr_orders
      - meta_attr_net_revenue
      - meta_attr_gross_revenue
      - meta_attr_refund_amount
      - meta_attr_new_customer_orders
      - meta_attr_new_customer_revenue
      - meta_attr_aov
  customer_ltv:
    glossary: Customer.LifetimeValue
    related: [Customer.RepeatCustomer, Customer.AcquisitionChannel]
    catalogue_metrics:
      - customers
      - repeat_customers
      - lifetime_net_revenue
      - lifetime_gross_revenue
      - lifetime_orders
      - avg_ltv
      - repeat_rate
      - avg_orders_per_customer
      - avg_days_since_last_order
  purchase_sequence:
    glossary: Customer.RepeatCustomer
    related: [Customer.LifetimeValue]
    catalogue_metrics:
      - repeat_purchase_orders
      - first_orders
      - repeat_orders
      - repeat_purchase_net_revenue
      - repeat_order_share
      - avg_days_between_orders

attribution_boundary:
  excluded_from_certified:
    - platform_reported_purchases
    - platform_reported_roas
    - platform_reported_conversion_value
    - amazon_acos
  om_glossary_term: Paid Media.Platform-ReportedConversion
  agent_policy: >
    Never answer ROAS/CPA/attributed revenue from platform-reported fields.
    Use certified delivery spend + commerce_net_revenue separately, or state
    attribution product is not yet in the agent catalogue.
