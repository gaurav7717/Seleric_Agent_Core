# OpenMetadata governance crosswalk for Seleric Agent Core.
# Numbers execute in Cube; OM holds owners, contracts, lineage, DQ, glossary.
# Spec source of truth: mage-ai/openmetadata/ + mage-ai/infra/openmetadata/owned_assets.py

instance:
  base_url: http://127.0.0.1:8585
  version: "1.13.1"
  auth_env: OM_JWT_OR_PAT

agent_ready_tag: DataProduct.AgentReady
release_status_tag: ReleaseStatus.Certified
currency: INR

data_products:
  - name: CommercePerformance
    domain: Commerce
    owner_team: commerce-data-team
    primary_serve_table: clickhouse.default.serve.commerce_orders
    contract: commerce_performance_contract_v1
    secondary_contracts:
      - commerce_order_events_contract_v1
      - commerce_performance_daily_contract_v1
    cube_views: [commerce_orders, commerce_performance]
    platforms: [Shopify]
    notes: >
      Shopify-only by frozen dashboard-oracle policy. Amazon marketplace orders
      are the sibling product AmazonCommercePerformance (not unioned here).
  - name: AmazonCommercePerformance
    domain: Commerce
    owner_team: commerce-data-team
    primary_serve_table: clickhouse.default.serve.amazon_orders
    contract: amazon_orders_contract_v1
    secondary_contracts: [amazon_commerce_daily_contract_v1]
    cube_views: [amazon_commerce_performance, amazon_daily_pnl, orders_all_channels]
    platforms: [AmazonSP]
    notes: >
      Marketplace-reported revenue INCLUDES GST. Never mix with Shopify ex-GST
      CommercePerformance without stating the basis. Ads stay on AmazonAdsPerformance.
      amazon_commerce_performance now also carries Amazon's own cancelled/returned
      order axis (cancelled_orders on purchase_date, returned_orders +
      returned_revenue on refund-posted date; returns_cancels = the sum) —
      the Amazon-only counterpart to CommercePerformance's Shopify event-date
      cancelled_orders/refunded_orders/returns_cancels/return_revenue, per the
      Seleric Dashboard Historical Analytics Amazon Seller Partner Returns /
      Cancellations cards. Amazon has no "cancelled revenue" figure — CANCELED
      orders are excluded from P&L entirely (₹0), unlike Shopify's cancel_revenue.
      Pending customer refunds not yet posted to Amazon settlement
      (gold.int_amazon_return_reconciliation) are a Seleric Dashboard
      Node-Backend accrual overlay, not reflected in the certified Cube measure.
  - name: ProductPerformance
    domain: Product
    owner_team: commerce-data-team
    primary_serve_table: clickhouse.default.serve.product_performance
    contract: product_performance_contract_v1
    cube_views: [product_performance]
    platforms: [Shopify]
    notes: >
      Amazon SP order lines and listings (gold.fct_amazon_order_items,
      gold.dim_amazon_listings) = V2 port.
  - name: MetaAdsPerformance
    domain: PaidMedia
    owner_team: growth-paid-media
    primary_serve_table: clickhouse.default.serve.meta_ads_daily
    contract: paid_media_meta_contract_v1
    cube_views: [meta_ad_performance, meta_ad_breakdown_performance]
    platforms: [Meta]
    notes: >
      Delivery + video engagement only. Platform-reported purchases/ROAS stay in
      gold as diagnostics — not certified (attribution boundary).
  - name: GoogleAdsPerformance
    domain: PaidMedia
    owner_team: growth-paid-media
    primary_serve_table: clickhouse.default.serve.google_ads_daily
    contract: paid_media_google_contract_v1
    cube_views: [google_ad_performance]
    platforms: [GoogleAds]
  - name: AmazonAdsPerformance
    domain: PaidMedia
    owner_team: growth-paid-media
    primary_serve_table: clickhouse.default.serve.amazon_ads_daily
    contract: paid_media_amazon_contract_v1
    cube_views: [amazon_ad_performance]
    platforms: [AmazonAds]
    notes: >
      Sponsored Products (SP) campaign daily grain only — SB/SD/DSP not ingested.
      No attributed sales/ACOS/ROAS (attribution boundary).
  - name: MarketingAttribution
    domain: Attribution
    owner_team: growth-attribution
    primary_serve_table: clickhouse.default.serve.order_attribution
    contract: attribution_order_contract_v1
    secondary_contracts: [attribution_meta_ad_contract_v1]
    cube_views: [order_attribution, meta_ad_attribution]
    platforms: [Shopify, Meta, GoogleAds]
    notes: >
      Last-touch, Shopify orders + Meta/Google touchpoints, first-party revenue
      only. Amazon ad→order linkage (gold.fct_amazon_ads_ad_order_attribution)
      = V2 port; platform-attributed sales/ACOS excluded.
  - name: ChannelAttribution
    domain: Attribution
    owner_team: growth-attribution
    primary_serve_table: clickhouse.default.serve.channel_attribution_daily
    contract: channel_attribution_daily_contract_v1
    cube_views: [channel_attribution]
    platforms: [Shopify, Meta, GoogleAds, AmazonSP]
    notes: >
      Closed channel set (meta/google/organic_shopify/amazon/organic_amazon).
      Shopify rows use first-party ex-GST; Amazon rows use marketplace incl-GST.
  - name: CustomerIntelligence
    domain: Customer
    owner_team: growth-retention
    primary_serve_table: clickhouse.default.serve.customer_ltv
    contract: customer_ltv_contract_v1
    secondary_contracts: [purchase_sequence_contract_v1]
    cube_views: [customer_ltv, purchase_sequence]
    platforms: [Shopify]
    notes: >
      Hashed PII only. Amazon SP-API exposes no durable buyer identity —
      Amazon orders cannot join LTV (permanent boundary, not V2).
  - name: CustomerData
    domain: Customer
    owner_team: growth-retention
    primary_serve_table: clickhouse.default.serve.customer_data
    contract: customer_data_contract_v1
    cube_views: [customer_data]
    platforms: [Shopify]
    notes: >
      Master-data profile/consent/acquisition only — no lifetime counts or
      revenue (those stay on CustomerIntelligence).
  - name: SessionFunnel
    domain: WebAnalytics
    owner_team: growth-analytics
    primary_serve_table: clickhouse.default.serve.session_funnel
    contract: session_funnel_contract_v1
    secondary_contracts: [funnel_daily_contract_v1]
    cube_views: [session_funnel, funnel_daily]
    platforms: [Shopify]
    notes: >
      Snowplow website funnel (browse/product_view/add_to_cart/reached_checkout/
      purchased). No visitor identifiers on serve. FINE channel — the closed
      5-channel set is ChannelAttribution. funnel_daily purchases/revenue are
      order-grain last-touch attribution.
  - name: EventStream
    domain: WebAnalytics
    owner_team: growth-analytics
    primary_serve_table: clickhouse.default.serve.web_events
    contract: web_events_contract_v1
    secondary_contracts: [web_events_daily_contract_v1]
    cube_views: [web_events, web_events_daily]
    platforms: [Shopify]
    notes: >
      Snowplow website event stream (event grain) — page/product/collection
      views, cart interactions, checkout steps, searches, purchases. Paths +
      business keys only, no visitor identifiers or full URLs on serve. channel
      is the session-resolved FINE channel; server-side purchase events have no
      session ('unattributed'). Daily rollup is counts-only; its per-row
      distinct counts (unique_visitors/unique_pages) are not additive.
  - name: CanonicalPnl
    domain: Finance
    owner_team: finance-team
    primary_serve_table: clickhouse.default.serve.canonical_pnl
    contract: canonical_pnl_contract_v1
    cube_views: [canonical_pnl]
    platforms: [Shopify, Meta, GoogleAds, AmazonAds, AmazonSP]
    agent_ready: false
    notes: >
      OM certification InProgress until cost-basis gates close. Net sales =
      Shopify oracle; additive amazon_* block; spend from certified ads serve.
  - name: AmazonAccounts
    domain: Finance
    owner_team: finance-team
    primary_serve_table: clickhouse.default.serve.amazon_settlement_reconciliation
    contract: amazon_settlement_reconciliation_contract_v1
    secondary_contracts:
      - amazon_order_item_pnl_contract_v1
      - amazon_daily_pnl_actual_contract_v1
      - amazon_accounts_exceptions_contract_v1
    cube_views: []
    platforms: [AmazonSP]
    notes: >
      ACTUAL_ONLY Amazon Seller Central accounts — settlement reconciliation,
      item/daily P&L, close exceptions. OM-governed; Cube/agent metric ports
      not catalogued yet. Never mix with AmazonCommercePerformance placement
      estimates. Flat 18% reverse-GST estimate only; statutory GST report not
      modeled.
  - name: ReturnsRefunds
    domain: Operations
    owner_team: ops-team
    primary_serve_table: clickhouse.default.serve.refund_events
    contract: refund_events_contract_v1
    secondary_contracts: [return_lifecycle_contract_v1]
    cube_views: [refund_events, return_lifecycle]
    platforms: [Shopify]
    notes: >
      Return REVENUE oracle remains Commerce (commerce_order_events for
      Shopify; amazon_commerce_performance for Amazon SP — see
      AmazonCommercePerformance). Amazon's own line-item return detail
      (gold.fct_amazon_return_items, gold.fct_amazon_returns_daily,
      gold.int_amazon_return_reconciliation at return/line grain, incl.
      pending-refund and return-label-fee accruals) remains a V2 port —
      only the AmazonCommercePerformance daily-grain rollup
      (cancelled_orders/returned_orders/returned_revenue) is certified today.

views:
  commerce_orders:
    data_product: CommercePerformance
    serve_table: clickhouse.default.serve.commerce_orders
    gold_inputs: [clickhouse.default.gold.fct_orders, clickhouse.default.gold.dim_customers]
  commerce_performance:
    data_product: CommercePerformance
    serve_table: clickhouse.default.serve.commerce_performance_daily
    gold_inputs: [clickhouse.default.serve.commerce_orders, clickhouse.default.serve.commerce_order_events]
  product_performance:
    data_product: ProductPerformance
    serve_table: clickhouse.default.serve.product_performance
    gold_inputs:
      - clickhouse.default.gold.fct_order_items
      - clickhouse.default.gold.fct_product_variant_cost_history
  meta_ad_performance:
    data_product: MetaAdsPerformance
    serve_table: clickhouse.default.serve.meta_ads_daily
    gold_inputs: [clickhouse.default.gold.fct_meta_ads_daily]
  meta_ad_breakdown_performance:
    data_product: MetaAdsPerformance
    serve_table: clickhouse.default.serve.meta_ads_breakdown_daily
    contract: paid_media_meta_breakdown_contract_v1
    gold_inputs:
      - clickhouse.default.gold.fct_meta_ads_breakdown_daily
      - clickhouse.default.gold.mart_meta_ad_breakdown_daily
  google_ad_performance:
    data_product: GoogleAdsPerformance
    serve_table: clickhouse.default.serve.google_ads_daily
    gold_inputs: [clickhouse.default.gold.fct_google_ads_daily]
  amazon_ad_performance:
    data_product: AmazonAdsPerformance
    serve_table: clickhouse.default.serve.amazon_ads_daily
    gold_inputs:
      - clickhouse.default.gold.fct_amazon_ads_campaigns_daily
      - clickhouse.default.gold.dim_amazon_ads_campaigns
  order_attribution:
    data_product: MarketingAttribution
    serve_table: clickhouse.default.serve.order_attribution
    gold_inputs: [clickhouse.default.gold.fct_order_attribution]
  meta_ad_attribution:
    data_product: MarketingAttribution
    serve_table: clickhouse.default.serve.meta_ad_attribution_daily
    contract: attribution_meta_ad_contract_v1
    gold_inputs: [clickhouse.default.gold.mart_meta_ad_daily_attribution]
  customer_ltv:
    data_product: CustomerIntelligence
    serve_table: clickhouse.default.serve.customer_ltv
    gold_inputs:
      - clickhouse.default.gold.fct_orders
      - clickhouse.default.gold.dim_customers
  purchase_sequence:
    data_product: CustomerIntelligence
    serve_table: clickhouse.default.serve.purchase_sequence
    contract: purchase_sequence_contract_v1
    gold_inputs: [clickhouse.default.gold.fct_orders]
  canonical_pnl:
    data_product: CanonicalPnl
    serve_table: clickhouse.default.serve.canonical_pnl
    gold_inputs:
      - clickhouse.default.serve.commerce_performance_daily
      - clickhouse.default.gold.fct_daily_pnl   # cost columns ONLY (its spend columns are broken)
      - clickhouse.default.serve.meta_ads_daily
      - clickhouse.default.serve.google_ads_daily
      - clickhouse.default.serve.amazon_ads_daily
  refund_events:
    data_product: ReturnsRefunds
    serve_table: clickhouse.default.serve.refund_events
    gold_inputs: [clickhouse.default.gold.fct_refunds]
  return_lifecycle:
    data_product: ReturnsRefunds
    serve_table: clickhouse.default.serve.return_lifecycle
    contract: return_lifecycle_contract_v1
    gold_inputs: [clickhouse.default.gold.fct_refund_line_items]
  amazon_commerce_performance:
    data_product: AmazonCommercePerformance
    serve_table: clickhouse.default.serve.amazon_commerce_daily
    contract: amazon_commerce_daily_contract_v1
    gold_inputs: [clickhouse.default.gold.fct_amazon_daily_pnl]
  channel_attribution:
    data_product: ChannelAttribution
    serve_table: clickhouse.default.serve.channel_attribution_daily
    gold_inputs:
      - clickhouse.default.gold.fct_order_attribution
      - clickhouse.default.gold.fct_amazon_sp_orders
  customer_data:
    data_product: CustomerData
    serve_table: clickhouse.default.serve.customer_data
    gold_inputs: [clickhouse.default.gold.dim_customers]

# catalogue metric crosswalk lives in openmetadata/metrics.yaml.
# Regenerate: py scripts/sync_openmetadata_catalogue.py

glossaries:
  - name: Commerce
    domain: Commerce
  - name: Product
    domain: Product
  - name: Paid Media
    domain: PaidMedia
    terms: [Spend, CTR, CPC, CPM, ReportDate, IsFinal, HookRate(Meta), ThruPlay, SponsoredProducts(SP)]
  - name: Attribution
    domain: Attribution
    terms: [AttributedOrder, AttributedNetRevenue, AttributionRate, LastTouch, Channel]
  - name: Customer
    domain: Customer
    terms: [LifetimeValue, RepeatCustomer, AcquisitionChannel, PurchaseSequence, HashedPII, CustomerProfile]
  - name: Finance
    domain: Finance
    terms:
      - NetCogs
      - GrossProfit
      - ContributionMargin
      - NetProfit
      - MER
      - CostCoverage
      - TotalAdSpend
      - AmazonAccountsActual
      - AmazonSettlementReconciliation
      - AmazonSettledNetPayout
      - AmazonSettledGrossProfit
      - AmazonSettlementException
  - name: Operations
    domain: Operations
  - name: Web Analytics
    domain: WebAnalytics
    terms: [Session, FunnelStage, Bounce, WebEvent, PageView, FineChannel]
