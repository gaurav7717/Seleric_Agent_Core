# OpenMetadata governance crosswalk for Seleric Agent Core.
# Numbers execute in Cube; OM holds owners, contracts, lineage, DQ, glossary.
# Spec source of truth: mage-ai/openmetadata/ + mage-ai/infra/openmetadata/owned_assets.py

instance:
  base_url: http://127.0.0.1:8585
  version: "1.13.1"
  auth_env: OM_JWT_OR_PAT

agent_ready_tag: DataProduct.AgentReady
release_status_tag: ReleaseStatus.Certified
currency: INR

data_products:
  - name: CommercePerformance
    domain: Commerce
    owner_team: commerce-data-team
    primary_serve_table: clickhouse.default.serve.commerce_orders
    contract: commerce_performance_contract_v1
    cube_views: [commerce_orders, commerce_performance]
    platforms: [Shopify]
    notes: >
      Shopify-only by frozen dashboard-oracle policy. Amazon marketplace orders
      (gold.fct_amazon_sp_orders / gold.fct_amazon_order_items) = V2 port.
  - name: ProductPerformance
    domain: Product
    owner_team: commerce-data-team
    primary_serve_table: clickhouse.default.serve.product_performance
    contract: product_performance_contract_v1
    cube_views: [product_performance]
    platforms: [Shopify]
    notes: >
      Amazon SP order lines and listings (gold.fct_amazon_order_items,
      gold.dim_amazon_listings) = V2 port.
  - name: MetaAdsPerformance
    domain: PaidMedia
    owner_team: growth-paid-media
    primary_serve_table: clickhouse.default.serve.meta_ads_daily
    contract: paid_media_meta_contract_v1
    cube_views: [meta_ad_performance, meta_ad_breakdown_performance]
    platforms: [Meta]
    notes: >
      Delivery + video engagement only. Platform-reported purchases/ROAS stay in
      gold as diagnostics — not certified (attribution boundary).
  - name: GoogleAdsPerformance
    domain: PaidMedia
    owner_team: growth-paid-media
    primary_serve_table: clickhouse.default.serve.google_ads_daily
    contract: paid_media_google_contract_v1
    cube_views: [google_ad_performance]
    platforms: [GoogleAds]
  - name: AmazonAdsPerformance
    domain: PaidMedia
    owner_team: growth-paid-media
    primary_serve_table: clickhouse.default.serve.amazon_ads_daily
    contract: paid_media_amazon_contract_v1
    cube_views: [amazon_ad_performance]
    platforms: [AmazonAds]
    notes: >
      Sponsored Products (SP) campaign daily grain only — SB/SD/DSP not ingested.
      No attributed sales/ACOS/ROAS (attribution boundary).
  - name: MarketingAttribution
    domain: Attribution
    owner_team: growth-attribution
    primary_serve_table: clickhouse.default.serve.order_attribution
    contract: attribution_order_contract_v1
    secondary_contracts: [attribution_meta_ad_contract_v1]
    cube_views: [order_attribution, meta_ad_attribution]
    platforms: [Shopify, Meta, GoogleAds]
    notes: >
      Last-touch, Shopify orders + Meta/Google touchpoints, first-party revenue
      only. Amazon ad→order linkage (gold.fct_amazon_ads_ad_order_attribution)
      = V2 port; platform-attributed sales/ACOS excluded.
  - name: CustomerIntelligence
    domain: Customer
    owner_team: growth-retention
    primary_serve_table: clickhouse.default.serve.customer_ltv
    contract: customer_ltv_contract_v1
    secondary_contracts: [purchase_sequence_contract_v1]
    cube_views: [customer_ltv, purchase_sequence]
    platforms: [Shopify]
    notes: >
      Hashed PII only. Amazon SP-API exposes no durable buyer identity —
      Amazon orders cannot join LTV (permanent boundary, not V2).
  - name: CanonicalPnl
    domain: Finance
    owner_team: finance-team
    primary_serve_table: clickhouse.default.serve.canonical_pnl
    contract: canonical_pnl_contract_v1
    cube_views: [canonical_pnl]
    platforms: [Shopify, Meta, GoogleAds, AmazonAds]
    notes: >
      Composed: commerce oracle net sales + fct_daily_pnl COST columns only +
      certified Meta/Google/Amazon Ads spend (serve.*_ads_daily). Amazon
      marketplace revenue/fees (gold.fct_amazon_daily_pnl,
      gold.fct_amazon_sp_order_pnl) = V2 port — v1 net sales are Shopify only.
  - name: ReturnsRefunds
    domain: Operations
    owner_team: ops-team
    primary_serve_table: clickhouse.default.serve.refund_events
    contract: refund_events_contract_v1
    secondary_contracts: [return_lifecycle_contract_v1]
    cube_views: [refund_events, return_lifecycle]
    platforms: [Shopify]
    notes: >
      Return REVENUE oracle remains Commerce (commerce_order_events). Amazon
      returns (gold.fct_amazon_return_items, gold.fct_amazon_returns_daily,
      gold.int_amazon_return_reconciliation) = V2 port, separate grain.

views:
  commerce_orders:
    data_product: CommercePerformance
    serve_table: clickhouse.default.serve.commerce_orders
    gold_inputs: [clickhouse.default.gold.fct_orders, clickhouse.default.gold.dim_customers]
  commerce_performance:
    data_product: CommercePerformance
    serve_table: clickhouse.default.serve.commerce_performance_daily
    gold_inputs: [clickhouse.default.serve.commerce_orders, clickhouse.default.serve.commerce_order_events]
  product_performance:
    data_product: ProductPerformance
    serve_table: clickhouse.default.serve.product_performance
    gold_inputs:
      - clickhouse.default.gold.fct_order_items
      - clickhouse.default.gold.fct_product_variant_cost_history
  meta_ad_performance:
    data_product: MetaAdsPerformance
    serve_table: clickhouse.default.serve.meta_ads_daily
    gold_inputs: [clickhouse.default.gold.fct_meta_ads_daily]
  meta_ad_breakdown_performance:
    data_product: MetaAdsPerformance
    serve_table: clickhouse.default.serve.meta_ads_breakdown_daily
    contract: paid_media_meta_breakdown_contract_v1
    gold_inputs:
      - clickhouse.default.gold.fct_meta_ads_breakdown_daily
      - clickhouse.default.gold.mart_meta_ad_breakdown_daily
  google_ad_performance:
    data_product: GoogleAdsPerformance
    serve_table: clickhouse.default.serve.google_ads_daily
    gold_inputs: [clickhouse.default.gold.fct_google_ads_daily]
  amazon_ad_performance:
    data_product: AmazonAdsPerformance
    serve_table: clickhouse.default.serve.amazon_ads_daily
    gold_inputs:
      - clickhouse.default.gold.fct_amazon_ads_campaigns_daily
      - clickhouse.default.gold.dim_amazon_ads_campaigns
  order_attribution:
    data_product: MarketingAttribution
    serve_table: clickhouse.default.serve.order_attribution
    gold_inputs: [clickhouse.default.gold.fct_order_attribution]
  meta_ad_attribution:
    data_product: MarketingAttribution
    serve_table: clickhouse.default.serve.meta_ad_attribution_daily
    contract: attribution_meta_ad_contract_v1
    gold_inputs: [clickhouse.default.gold.mart_meta_ad_daily_attribution]
  customer_ltv:
    data_product: CustomerIntelligence
    serve_table: clickhouse.default.serve.customer_ltv
    gold_inputs:
      - clickhouse.default.gold.fct_orders
      - clickhouse.default.gold.dim_customers
  purchase_sequence:
    data_product: CustomerIntelligence
    serve_table: clickhouse.default.serve.purchase_sequence
    contract: purchase_sequence_contract_v1
    gold_inputs: [clickhouse.default.gold.fct_orders]
  canonical_pnl:
    data_product: CanonicalPnl
    serve_table: clickhouse.default.serve.canonical_pnl
    gold_inputs:
      - clickhouse.default.serve.commerce_performance_daily
      - clickhouse.default.gold.fct_daily_pnl   # cost columns ONLY (its spend columns are broken)
      - clickhouse.default.serve.meta_ads_daily
      - clickhouse.default.serve.google_ads_daily
      - clickhouse.default.serve.amazon_ads_daily
  refund_events:
    data_product: ReturnsRefunds
    serve_table: clickhouse.default.serve.refund_events
    gold_inputs: [clickhouse.default.gold.fct_refunds]
  return_lifecycle:
    data_product: ReturnsRefunds
    serve_table: clickhouse.default.serve.return_lifecycle
    contract: return_lifecycle_contract_v1
    gold_inputs: [clickhouse.default.gold.fct_refund_line_items]

# catalogue metric crosswalk lives in openmetadata/metrics.yaml (76 metrics).
# Regenerate: py scripts/sync_openmetadata_catalogue.py

glossaries:
  - name: Commerce
    domain: Commerce
  - name: Product
    domain: Product
  - name: Paid Media
    domain: PaidMedia
    terms: [Spend, CTR, CPC, CPM, ReportDate, IsFinal, HookRate(Meta), ThruPlay, SponsoredProducts(SP)]
  - name: Attribution
    domain: Attribution
    terms: [AttributedOrder, AttributedNetRevenue, AttributionRate, LastTouch]
  - name: Customer
    domain: Customer
    terms: [LifetimeValue, RepeatCustomer, AcquisitionChannel]
  - name: Finance
    domain: Finance
    terms: [NetCogs, GrossProfit, ContributionMargin, NetProfit, MER, CostCoverage]
  - name: Operations
    domain: Operations
