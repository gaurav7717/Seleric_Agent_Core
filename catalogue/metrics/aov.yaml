id: aov
display_name: Average Order Value (Shopify-only)
category: commerce
status: certified
description: 'Total Sales (incl. GST) divided by Total Orders on the placement axis. Ratio — never sum
  or average daily AOV rows. Scope: Shopify-only (Historical Analytics / commerce oracle). Does not include
  Amazon SP marketplace sales or fees. For all-platform ad spend use total_ad_spend; for blended-ads net
  profit use net_profit_blended.'
formula:
  human_readable: Total Sales ÷ Total Orders
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.aov
  measure_pct: null
aggregation: ratio
unit: currency
currency_default: INR
grain: order
supported_dimensions:
- brand_id
- order_date
- order_created_at_ist
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- is_new_customer
- utm_source
- utm_medium
- utm_campaign
- source_name
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- order_status
- return_status
- fulfillment_status
- financial_status
supported_filters:
- date_range
- brand_id
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- is_new_customer
- utm_source
- utm_medium
- utm_campaign
- source_name
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- order_status
- return_status
- fulfillment_status
- financial_status
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
examples:
- question: AOV by shipping region this quarter
  request:
    measures:
    - aov
    dimensions:
    - shipping_region
    time_range:
      preset: last_90d
validation_tests:
- aov > 0 for any slice with orders
deprecated_aliases:
- daily_pnl.avg_order_value
