id: aov
display_name: Average Order Value (Shopify-only)
category: commerce
status: certified
description: 'Shopify Average Order Value at commerce order grain, computed as net
  revenue divided by order count (ratio of aggregates).'
formula:
  human_readable: commerce_net_revenue / orders
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.aov
  measure_pct: null
aggregation: ratio
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- order_date
- shipping_region
- shipping_country
- shipping_city
supported_filters:
- date_range
- brand_id
- shipping_region
- shipping_country
- shipping_city
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
examples:
- question: AOV by shipping region this quarter
  request:
    measures:
    - aov
    dimensions:
    - shipping_region
    time_range:
      preset: last_90d
validation_tests:
- aov > 0 for any slice with orders
- aov equals commerce_net_revenue ÷ orders for the same slice
deprecated_aliases:
- daily_pnl.avg_order_value
dashboard_alignment:
  status: drift_corrected
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: services/dashboardService.js:141
  note: >
    Dashboard summary may compute blended AOV in a separate path. This metric
    is aligned to canonical Cube semantic execution (`commerce_orders.aov`).
