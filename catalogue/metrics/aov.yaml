id: aov
display_name: Average Order Value
category: commerce
status: approved
description: >
  Average order value (incl. tax). Ex-GST companion: aov_excl_tax on the same
  view. A ratio — never sum or average daily AOV rows.
formula:
  human_readable: "Order revenue / order count"
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.aov
  measure_pct: null
companion_measures: [commerce_orders.aov_excl_tax]
aggregation: ratio
unit: currency
currency_default: INR
grain: order
supported_dimensions: [brand_id, order_date, payment_method, utm_source, shipping_country, shipping_region]
supported_filters: [date_range, brand_id, payment_method, utm_source, shipping_country, shipping_region]
data_owner: "Commerce Ops"
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
examples:
  - question: "AOV by shipping region this quarter"
    request: {measures: [aov], dimensions: [shipping_region], time_range: {preset: last_90d}}
validation_tests:
  - "aov > 0 for any slice with orders"
deprecated_aliases: [daily_pnl.avg_order_value]
