id: product_gross_profit
display_name: Product Gross Profit (ex-GST)
category: product
status: certified
description: 'Lifecycle net revenue minus FULLY-LOADED lifecycle COGS (product + shipping
  + packaging + payment fee + RTO, recognized by pnl_refund_class) per line, from
  serve.product_performance. Basis decision 2026-07-14: margins align with the company
  P&L; merchandise-only cost is product_cost_only. Distinct from the company gross_profit
  metric (canonical_pnl).

  '
formula:
  human_readable: Sum of (lifecycle net revenue ex-GST − lifecycle net_cogs) at line
    grain
  authoritative_source: cube
cube_mapping:
  view: product_performance
  measure: product_performance.gross_profit_ex_gst
aggregation: additive
unit: currency
currency_default: INR
grain: order_item
supported_dimensions:
- brand_id
- order_date
- product_title
- variant_title
- sku
- product_type
- vendor
- shipping_city
- shipping_region
- shipping_country
- order_status
- return_status
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
supported_filters:
- date_range
- brand_id
- product_title
- sku
- product_type
- vendor
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Top products by gross profit last 30 days
  request:
    measures:
    - product_gross_profit
    dimensions:
    - product_title
    time_range:
      preset: last_30d
    sort:
    - field: product_gross_profit
      direction: desc
    limit: 10
validation_tests:
- equals product_net_revenue − product_cogs exactly for any slice
deprecated_aliases: []
