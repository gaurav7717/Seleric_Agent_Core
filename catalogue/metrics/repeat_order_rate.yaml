id: repeat_order_rate
display_name: Repeat Order Rate
category: customer
status: approved
description: >
  Share of orders that are a repeat order (order_sequence_number > 1) for
  the customer that placed them. A ratio — never sum or average rows.
  Derived from gold.fct_orders windowed per customer — no new source data.
  CAVEAT: unverified against live ClickHouse, see customer_purchase_sequence
  cube header comment.
formula:
  human_readable: "Repeat orders / Total orders"
  authoritative_source: cube
cube_mapping:
  view: customer_purchase_sequence
  measure: customer_purchase_sequence.repeat_order_rate
aggregation: ratio
ratio_components:
  numerator: customer_purchase_sequence.repeat_orders
  denominator: customer_purchase_sequence.orders
unit: ratio
grain: order
supported_dimensions: [brand_id, order_date, customer_id]
supported_filters: [date_range, brand_id, customer_id]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Repeat order rate last 90 days"
    request: {measures: [repeat_order_rate], time_range: {preset: last_90d}}
validation_tests:
  - "repeat_order_rate is between 0 and 100 for any non-empty slice"
deprecated_aliases: []
