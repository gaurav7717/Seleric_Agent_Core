id: customer_profiles
display_name: Customer Profiles
category: customer
status: draft
description: >
  Not implemented in the dashboard as of this audit — no customer master-data
  table/endpoint exists in Node-Backend. Count of customer master-data rows
  (serve.customer_data). Profile/consent/ acquisition only — use
  lifetime_net_revenue / customers on CustomerIntelligence for LTV questions.
formula:
  human_readable: COUNT(customer_id)
  authoritative_source: cube
cube_mapping:
  view: customer_data
  measure: customer_data.customers
aggregation: additive
unit: count
grain: brand × customer
supported_dimensions:
  - brand_id
  - customer_id
  - acquisition_platform
  - acquisition_channel
  - accepts_marketing
  - default_city
  - default_province
  - default_country
supported_filters:
  - brand_id
  - acquisition_platform
  - accepts_marketing
data_owner: Growth / Retention
access_policy:
  roles_allowed: [exec, growth_lead, analyst, ops]
  scopes: [metrics:read]
validation_tests:
  - customer_profiles >= 0
deprecated_aliases: []
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    No customer master-data table or endpoint exists in Node-Backend. Part of
    the broader finding that there is no customer-master or
    lifetime-aggregation layer.
