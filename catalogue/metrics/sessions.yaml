id: sessions
display_name: Sessions
category: marketing
status: approved
description: >
  Session count from the Snowplow funnel (gold.fct_session_funnel). Count
  sessions and conversion rates only — do NOT use for revenue; use
  attributed_revenue (order_attribution) or net_revenue (canonical_pnl) for
  revenue truth. Snowplow coverage may be partial — check freshness before
  treating as a complete traffic count.
formula:
  human_readable: "Count of sessions"
  authoritative_source: cube
cube_mapping:
  view: session_funnel
  measure: session_funnel.sessions
aggregation: additive
unit: count
grain: session
supported_dimensions: [brand_id, session_date, channel, campaign_name, utm_source, utm_medium, landing_page]
supported_filters: [date_range, brand_id, channel, campaign_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Sessions trend last 30 days"
    request: {measures: [sessions], time_range: {preset: last_30d}, granularity: day}
validation_tests:
  - "sessions >= converted_sessions for any slice"
deprecated_aliases: []
