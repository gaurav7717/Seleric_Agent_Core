id: meta_attr_net_revenue
display_name: Meta Attributed Net Revenue
category: attribution
status: certified
description: First-party net revenue (ex-GST) last-touch attributed to a Meta ad.
  Never mix with Meta's platform-reported purchase_value.
formula:
  human_readable: SUM(attributed_net_revenue_excl_tax)
  authoritative_source: cube
cube_mapping:
  view: meta_ad_attribution
  measure: meta_ad_attribution.attributed_net_revenue
aggregation: additive
unit: currency
grain: daily ad grain (brand x campaign x adset x ad x day, last-touch attribution)
supported_dimensions:
- brand_id
- report_date
- campaign_id
- campaign_name
- adset_id
- adset_name
- ad_id
- ad_name
- attribution_model
supported_filters:
- date_range
- brand_id
- campaign_id
- campaign_name
- adset_id
- adset_name
- ad_id
- ad_name
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Meta Attributed Net Revenue by campaign for June 2026
  request:
    measures:
    - meta_attr_net_revenue
    dimensions:
    - campaign_name
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests: []
deprecated_aliases: []
currency_default: INR
