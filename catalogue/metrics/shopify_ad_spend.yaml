id: shopify_ad_spend
display_name: Total Ad Spend (Shopify-only)
category: finance
status: certified
description: 'Meta + Google ad spend only — Historical Analytics "Total Ad Spend" when Shopify-only is
  selected. Excludes Amazon Ads. For all-platform Total Ad Spend (= Total Performance Marketing) use total_ad_spend.
  Scope: Shopify-only (Historical Analytics / commerce oracle). Does not include Amazon SP marketplace
  sales or fees. For all-platform ad spend use total_ad_spend; for blended-ads net profit use net_profit_blended.'
formula:
  human_readable: SUM(meta_spend) + SUM(google_spend)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.shopify_ad_spend
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  scopes:
  - metrics:read
examples:
- question: Total Ad Spend for June 2026 (Shopify dashboard)
  request:
    measures:
    - shopify_ad_spend
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- shopify_ad_spend >= 0 for any slice
- June 2026 brand 20 ≈ dashboard ₹19,07,629.36
deprecated_aliases: []
dashboard_alignment:
  status: match
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: src/integrations/historicalAnalytics/lineItemHistoricalSql.js:647-648
