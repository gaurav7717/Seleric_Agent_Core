id: amazon_total_sales
display_name: Total Sales (Amazon-only, incl. GST)
category: commerce
status: certified
description: >
  Amazon SP order_total_header for placements in range (including canceled).
  The Amazon slice inside All-channels Total Sales. For Shopify-only use
  total_sales; for both channels use total_sales_all_channels.
formula:
  human_readable: SUM(amazon order_total_header)
  authoritative_source: cube
cube_mapping:
  view: sales_all_channels
  measure: sales_all_channels.amazon_total_sales
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
  - channel
  - shipping_region
  - shipping_country
  - shipping_city
supported_filters:
  - date_range
  - brand_id
  - channel
  - shipping_region
  - shipping_country
  - shipping_city
data_owner: Commerce Ops
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
examples:
  - question: Amazon Total Sales June 2026
    request:
      measures: [amazon_total_sales]
      time_range: {start: "2026-06-01", end: "2026-06-30"}
validation_tests:
  - June 2026 brand 20 = ₹2,73,620
deprecated_aliases: []
