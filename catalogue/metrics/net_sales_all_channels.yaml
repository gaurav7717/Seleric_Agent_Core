id: net_sales_all_channels
display_name: Net Sales (all channels)
category: commerce
status: certified
description: >
  All-channels Net Sales: Shopify net_sales_excl_tax (dashboard parity) plus
  Amazon operational_revenue_incl_gst. Matches Historical Analytics All channels
  Net Sales. For Shopify-only use commerce_net_revenue_daily.
formula:
  human_readable: SUM(shopify net_sales_excl_tax) + SUM(amazon operational_revenue_incl_gst)
  authoritative_source: cube
cube_mapping:
  view: sales_all_channels
  measure: sales_all_channels.net_sales
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
  - channel
  - shipping_region
  - shipping_country
  - shipping_city
supported_filters:
  - date_range
  - brand_id
  - channel
  - shipping_region
  - shipping_country
  - shipping_city
data_owner: Commerce Ops
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
validation_tests:
  - June 2026 brand 20 ≈ ₹33,97,210.51
deprecated_aliases: []
