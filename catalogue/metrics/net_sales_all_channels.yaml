id: net_sales_all_channels
display_name: Net Sales (all channels, ex-GST)
category: commerce
status: certified
description: 'All-channels Net Sales (ex-GST): Shopify net_sales_excl_tax (dashboard
  parity) plus Amazon SP net revenue (effective_gross + refunds + tax_withheld per
  FE §11 amazon_net_revenue). For Shopify-only use commerce_net_revenue_daily.

  '
formula:
  human_readable: SUM(shopify net_sales_excl_tax) + SUM(amazon net revenue)
  authoritative_source: cube
cube_mapping:
  view: sales_all_channels
  measure: sales_all_channels.net_sales
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- report_date
- channel
- shipping_region
- shipping_country
- shipping_city
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
supported_filters:
- date_range
- brand_id
- channel
- shipping_region
- shipping_country
- shipping_city
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
examples:
- question: Net Sales June 2026 all channels
  request:
    measures:
    - net_sales_all_channels
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- net_sales_all_channels >= 0 for typical commerce slices
deprecated_aliases: []
