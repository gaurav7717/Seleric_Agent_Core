id: lifetime_gross_revenue
display_name: Lifetime Gross Revenue
category: customer
status: draft
description: >
  Not implemented in the dashboard as of this audit — no all-time
  revenue-per-customer aggregation exists in Node-Backend. Sum of customers'
  lifetime gross revenue. A cumulative snapshot — do not filter by date_range.
formula:
  human_readable: SUM(lifetime_gross_revenue)
  authoritative_source: cube
cube_mapping:
  view: customer_ltv
  measure: customer_ltv.lifetime_gross_revenue
aggregation: additive
unit: currency
grain: customer (one row per customer with >=1 eligible order, lifetime snapshot)
supported_dimensions:
- brand_id
- acquisition_platform
- acquisition_channel
- acquisition_campaign
- is_repeat_customer
- lifetime_order_count_band
- customer_default_city
- customer_default_province
supported_filters:
- brand_id
- acquisition_platform
- acquisition_channel
- acquisition_campaign
- is_repeat_customer
- lifetime_order_count_band
data_owner: Growth / CRM
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Lifetime Gross Revenue by acquisition channel
  request:
    measures:
    - lifetime_gross_revenue
    dimensions:
    - acquisition_channel
validation_tests: []
deprecated_aliases: []
currency_default: INR
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    No all-time revenue-per-customer aggregation exists in Node-Backend. Part
    of the broader finding that there is no customer-master or
    lifetime-aggregation layer.
