id: amazon_net_sales
display_name: Net Sales (Amazon-only)
category: commerce
status: certified
description: >
  Amazon SP net revenue (effective_gross + refunds + tax_withheld per FE §11
  amazon_net_revenue). Amazon slice inside All-channels Net Sales. For
  Shopify-only use commerce_net_revenue_daily; for both use
  net_sales_all_channels.
formula:
  human_readable: SUM(amazon gross + refunds + tax_withheld)
  authoritative_source: cube
cube_mapping:
  view: sales_all_channels
  measure: sales_all_channels.amazon_net_sales
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
supported_filters:
  - date_range
  - brand_id
data_owner: Commerce Ops
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
examples:
  - question: Amazon Net Sales June 2026
    request:
      measures: [amazon_net_sales]
      time_range: {start: "2026-06-01", end: "2026-06-30"}
validation_tests:
  - amazon_net_sales is defined for brand × day slices
deprecated_aliases: []
