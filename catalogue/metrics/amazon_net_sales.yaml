id: amazon_net_sales
display_name: Net Sales (Amazon-only — operational incl GST)
category: commerce
status: certified
description: >
  Amazon SP operational_revenue_incl_gst — Amazon slice inside Historical
  All-channels Net Sales. For Shopify-only use commerce_net_revenue_daily; for
  both use net_sales_all_channels.
formula:
  human_readable: SUM(operational_revenue_incl_gst)
  authoritative_source: cube
cube_mapping:
  view: sales_all_channels
  measure: sales_all_channels.amazon_net_sales
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
  - channel
  - shipping_region
  - shipping_country
  - shipping_city
supported_filters:
  - date_range
  - brand_id
  - channel
  - shipping_region
  - shipping_country
  - shipping_city
data_owner: Commerce Ops
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
validation_tests:
  - June 2026 brand 20 ≈ ₹1,75,967
deprecated_aliases: []
