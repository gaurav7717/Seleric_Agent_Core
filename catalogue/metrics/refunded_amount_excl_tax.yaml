- shopify_return_status
- order_status
- payment_status
- is_cod
- restock
- is_unprocessed
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- payment_method
- payment_gateway
supported_filters:
- date_range
- brand_id
- pnl_refund_class
- return_status
- payment_status
- is_cod
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- payment_method
- payment_gateway
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- refunded_amount_excl_tax >= 0 for any slice
