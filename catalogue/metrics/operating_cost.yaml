id: operating_cost
display_name: Operating Cost non-product (Shopify-only)
category: finance
status: certified
description: 'Non-product cost arms already inside Net COGS: shipping + packaging + gateway + RTO. For
  FE §13 "Total Operating Cost" use total_operating_cost (or net_cogs) — that includes product_cost. Do
  not subtract operating_cost again when Net COGS is used. Scope: Shopify-only (Historical Analytics /
  commerce oracle). Does not include Amazon SP marketplace sales or fees. For all-platform ad spend use
  total_ad_spend; for blended-ads net profit use net_profit_blended.'
formula:
  human_readable: SUM(operating_cost)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.operating_cost
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  scopes:
  - metrics:read
examples:
- question: Non-product operating cost breakdown for June 2026
  request:
    measures:
    - operating_cost
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- operating_cost = shipping + packaging + gateway + rto
deprecated_aliases: []
dashboard_alignment:
  status: match
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: src/integrations/historicalAnalytics/lineItemHistoricalSql.js:616-621
