id: operating_cost
display_name: Operating Cost (breakdown)
category: finance
status: certified
description: >
  Ship + pack + gateway + RTO arms already included inside Net COGS — exposed
  for breakdown only. Do not subtract again from Net Sales when Net COGS is used.
formula:
  human_readable: SUM(operating_cost)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.operating_cost
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
supported_filters:
  - date_range
  - brand_id
data_owner: Finance
access_policy:
  roles_allowed: [exec, finance]
  scopes: [metrics:read]
examples:
  - question: Operating Cost for June 2026
    request:
      measures: [operating_cost]
      time_range: {start: "2026-06-01", end: "2026-06-30"}
validation_tests:
  - operating_cost >= 0 for any slice
deprecated_aliases: []
