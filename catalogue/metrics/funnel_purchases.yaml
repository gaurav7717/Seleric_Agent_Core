id: funnel_purchases
display_name: Funnel Purchase Sessions
category: marketing
status: approved
description: >
  Sessions that reached purchase in the Snowplow funnel (session-grain,
  not Shopify order count). For order truth use orders / attributed_orders.
formula:
  human_readable: "Count of sessions with a purchase event"
  authoritative_source: cube
cube_mapping:
  view: session_funnel
  measure: session_funnel.purchases
aggregation: additive
unit: count
grain: session
supported_dimensions: [brand_id, session_date, channel, campaign_name, utm_source, utm_medium, landing_page]
supported_filters: [date_range, brand_id, channel, campaign_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Funnel purchases last 30 days"
    request: {measures: [funnel_purchases, sessions], time_range: {preset: last_30d}}
validation_tests: []
deprecated_aliases: []
