id: meta_video_100_pct_views
display_name: Meta Video Completions
category: paid_media
status: draft
description: Views reaching 100% of video length.
formula:
  human_readable: SUM(meta_video_100_pct_views)
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.meta_video_100_pct_views
aggregation: additive
unit: count
grain: daily ad grain (brand x account x day x campaign x adset x ad)
supported_dimensions:
- brand_id
- report_date
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
supported_filters:
- date_range
- brand_id
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- meta_video_100_pct_views >= 0 for any slice
dashboard_alignment:
  status: unclear
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    A per-ad value exists (meta/analytics.js:1814,1837) but it is never
    summed to a campaign/account/date-level dashboard total, so it's unclear
    whether this catalogue entry describes anything the dashboard actually
    surfaces.
