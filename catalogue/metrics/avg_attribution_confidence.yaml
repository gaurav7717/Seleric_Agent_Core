id: avg_attribution_confidence
display_name: Average Attribution Confidence
category: attribution
status: certified
description: Mean confidence score of the last-touch attribution match.
formula:
  human_readable: SUM(attribution_confidence) / attributed_orders
  authoritative_source: cube
cube_mapping:
  view: order_attribution
  measure: order_attribution.avg_attribution_confidence
aggregation: ratio
unit: ratio
grain: order (last-touch attribution)
supported_dimensions:
- brand_id
- order_date
- lt_platform
- lt_channel
- lt_utm_source
- lt_utm_medium
- lt_utm_campaign
- lt_campaign_id
- lt_campaign_name
- lt_adset_name
- lt_ad_name
- attribution_method
- is_new_customer
- is_cod
- source_name
- attribution_model
supported_filters:
- date_range
- brand_id
- lt_platform
- lt_channel
- attribution_method
- is_new_customer
data_owner: Growth / Attribution
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Average Attribution Confidence for June 2026
  request:
    measures:
    - avg_attribution_confidence
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests: []
deprecated_aliases: []
