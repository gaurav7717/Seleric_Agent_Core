id: product_return_revenue
display_name: Product Return Revenue (ex-GST, cohort)
category: product
status: certified
description: 'Line-level cohort return revenue deduction (ex-GST) from product_performance. Supports SKU/product and shipping geo breakdowns. Deductions attach to the placement period (order_date), not the return event date.

  '
formula:
  human_readable: SUM(cohort_return_deduction_ex_gst) on eligible lines
  authoritative_source: cube
cube_mapping:
  view: product_performance
  measure: product_performance.product_return_revenue
aggregation: additive
unit: currency
currency_default: INR
grain: order_item
supported_dimensions:
- brand_id
- order_date
- product_title
- variant_title
- sku
- product_type
- vendor
- product_id
- variant_id
- shipping_city
- shipping_region
- shipping_country
- order_status
- return_status
- pnl_refund_class
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
supported_filters:
- date_range
