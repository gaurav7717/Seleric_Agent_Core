id: new_customer_orders
display_name: New Customer Orders (Shopify-only)
category: commerce
status: approved
description: 'Orders placed by first-time customers. Scope: Shopify-only (Historical Analytics / commerce
  oracle). Does not include Amazon SP marketplace sales or fees. For all-platform ad spend use total_ad_spend;
  for blended-ads net profit use net_profit_blended.'
formula:
  human_readable: Count of orders where the customer has no prior order
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.new_customer_orders
aggregation: additive
unit: count
grain: order
supported_dimensions:
- brand_id
- order_date
- order_created_at_ist
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- is_new_customer
- utm_source
- utm_medium
- utm_campaign
- source_name
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- order_status
- return_status
- fulfillment_status
- financial_status
supported_filters:
- date_range
- brand_id
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- is_new_customer
- utm_source
- utm_medium
- utm_campaign
- source_name
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- order_status
- return_status
- fulfillment_status
- financial_status
data_owner: Growth
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Share of new customer orders last month
  request:
    measures:
    - new_customer_orders
    - orders
    time_range:
      preset: last_month
validation_tests:
- new_customer_orders <= orders for any slice
deprecated_aliases: []
dashboard_alignment:
