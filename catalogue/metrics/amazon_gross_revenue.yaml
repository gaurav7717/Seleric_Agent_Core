id: amazon_gross_revenue
display_name: Amazon Gross Revenue (incl. GST)
category: commerce
status: certified
description: >
  Amazon marketplace effective gross revenue (INCLUDES GST). Never mix with
  Shopify Net Sales / Total Sales without stating the tax basis.
formula:
  human_readable: SUM(gross_revenue) on amazon_commerce_daily
  authoritative_source: cube
cube_mapping:
  view: amazon_commerce_performance
  measure: amazon_commerce_performance.gross_revenue
aggregation: additive
unit: INR
grain: brand × day
supported_dimensions:
  - brand_id
  - report_date
supported_filters:
  - date_range
  - brand_id
data_owner: Commerce Ops
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
currency_default: INR
validation_tests:
  - amazon_gross_revenue >= 0
deprecated_aliases: []
dashboard_alignment:
  status: match
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: amazonSpOrderTotals.js:429,471
