id: packaging_cost
display_name: Packaging Cost (Shopify-only)
category: finance
status: certified
description: 'Packaging cost arm of Shopify Net COGS (brand × day), including return-event packaging.
  FE §13 Packaging Cost. Part of Net COGS — do not subtract again when Net COGS / Total Operating Cost
  is used. Scope: Shopify-only (Historical Analytics / commerce oracle). Does not include Amazon SP marketplace
  sales or fees. For all-platform ad spend use total_ad_spend; for blended-ads net profit use net_profit_blended.'
formula:
  human_readable: SUM(packaging_cost)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.packaging_cost
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  scopes:
  - metrics:read
examples:
- question: Packaging Cost for June 2026
  request:
    measures:
    - packaging_cost
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- packaging_cost >= 0 for any slice
- June 2026 brand 20 ≈ ₹23,640.00
deprecated_aliases: []
