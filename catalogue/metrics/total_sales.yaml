id: total_sales
display_name: Total Sales (Shopify-only, incl. GST)
category: commerce
status: certified
description: 'Pre-discount checkout value including GST on eligible placement orders (gross_revenue +
  total_discounts). Shopify-only. Use when the user says Shopify-only. For Total / all channels
  use total_sales_all_channels; for Amazon-only use amazon_total_sales.'
formula:
  human_readable: Sum of gross_revenue + total_discounts per eligible order
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.total_sales
aggregation: additive
unit: currency
currency_default: INR
grain: order
supported_dimensions:
- brand_id
- order_date
- payment_method
- utm_source
- shipping_country
- shipping_region
- shipping_city
supported_filters:
- date_range
- brand_id
- payment_method
- utm_source
- shipping_country
- shipping_region
- shipping_city
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
examples:
- question: Total sales last week
  request:
    measures:
    - total_sales
    time_range:
      preset: last_7d
validation_tests:
- total_sales >= commerce_net_revenue for same period when both on placement axis
deprecated_aliases: []
