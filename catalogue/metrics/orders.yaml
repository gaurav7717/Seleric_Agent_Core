id: orders
display_name: Orders (Shopify-only)
category: commerce
status: certified
description: 'Shopify placement order count from serve.commerce_orders. Excludes test and revenue-adjustment
  orders; includes later-cancelled and voided placements. Scope: Shopify-only (Historical Analytics /
  commerce oracle). Does not include Amazon SP marketplace sales or fees. For all-platform ad spend use
  total_ad_spend; for blended-ads net profit use net_profit_blended.'
formula:
  human_readable: Count of eligible orders placed (is_test = 0, is_revenue_adjustment = 0)
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.orders
aggregation: additive
unit: count
grain: order
supported_dimensions:
- brand_id
- order_date
- order_created_at_ist
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- is_new_customer
- utm_source
- utm_medium
- utm_campaign
- source_name
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- order_status
- return_status
- fulfillment_status
- financial_status
supported_filters:
- date_range
- brand_id
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- is_new_customer
- utm_source
- utm_medium
- utm_campaign
- source_name
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- order_status
- return_status
- fulfillment_status
- financial_status
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
examples:
- question: Orders by payment method last 30 days
  request:
    measures:
    - orders
    dimensions:
    - payment_method
    time_range:
      preset: last_30d
validation_tests:
- orders >= active_orders for any slice
deprecated_aliases:
- daily_pnl.orders_created
- daily_pnl.total_orders
dashboard_alignment:
  status: match
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: lineItemHistoricalSql.js:186-190
