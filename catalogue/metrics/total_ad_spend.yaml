id: total_ad_spend
display_name: Total Ad Spend (all platforms)
category: finance
status: certified
description: >
  Total Ad Spend across all platforms = Total Performance Marketing =
  Meta + Google + Amazon Ads. FE §13 identity. For Historical Analytics
  Shopify-only Total Ad Spend (Meta+Google, no Amazon) use shopify_ad_spend.
formula:
  human_readable: SUM(meta_spend) + SUM(google_spend) + SUM(amazon_spend)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.total_ad_spend
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
supported_filters:
  - date_range
  - brand_id
data_owner: Finance
access_policy:
  roles_allowed: [exec, finance]
  scopes: [metrics:read]
examples:
  - question: Total Performance Marketing / Total Ad Spend (all platforms) for June 2026
    request:
      measures: [total_ad_spend]
      time_range: {start: "2026-06-01", end: "2026-06-30"}
validation_tests:
  - total_ad_spend >= 0 for any slice
  - equals meta_spend + google_spend + amazon_spend for the same slice
  - June 2026 brand 20 ≈ ₹19,22,687.25
deprecated_aliases:
  - total_performance_marketing
dashboard_alignment:
  status: match
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: src/integrations/historicalAnalytics/historicalQueryHelpers.js:369-370
