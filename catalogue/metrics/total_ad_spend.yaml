id: total_ad_spend
display_name: Total Ad Spend (Blended)
category: finance
status: certified
description: >
  Blended Meta + Google + Amazon Ads spend. For the Historical Analytics
  Shopify-only "Total Ad Spend" card use shopify_ad_spend (Meta+Google only) —
  that is what the FE shows when Shopify-only is selected.
formula:
  human_readable: SUM(total_ad_spend)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.total_ad_spend
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
supported_filters:
  - date_range
  - brand_id
data_owner: Finance
access_policy:
  roles_allowed: [exec, finance]
  scopes: [metrics:read]
examples:
  - question: Blended total ad spend for June 2026
    request:
      measures: [total_ad_spend]
      time_range: {start: "2026-06-01", end: "2026-06-30"}
validation_tests:
  - total_ad_spend >= 0 for any slice
deprecated_aliases: []
