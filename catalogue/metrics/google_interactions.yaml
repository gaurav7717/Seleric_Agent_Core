id: google_interactions
display_name: Google Interactions
category: paid_media
status: certified
description: Google Ads interactions (clicks, engagements, video engagements).
formula:
  human_readable: SUM(google_interactions)
  authoritative_source: cube
cube_mapping:
  view: google_ad_performance
  measure: google_ad_performance.google_interactions
aggregation: additive
unit: count
grain: daily campaign grain (brand x customer account x day x campaign)
supported_dimensions:
- brand_id
- report_date
- customer_account_id
- campaign_id
- campaign_name
- campaign_type
supported_filters:
- date_range
- brand_id
- customer_account_id
- campaign_id
- campaign_name
- campaign_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- google_interactions >= 0 for any slice
