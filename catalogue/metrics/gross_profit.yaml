id: gross_profit
display_name: Gross Profit (Shopify-only)
category: finance
status: certified
description: 'Net Sales − Net COGS (before ads). Same numeric identity as contribution_margin on canonical_pnl
  v2. Distinct from the FE dashboard "Gross Profit" card which is Gross Sales − Gross COGS − Ad Spend.
  Scope: Shopify-only (Historical Analytics / commerce oracle). Does not include Amazon SP marketplace
  sales or fees. For all-platform ad spend use total_ad_spend; for blended-ads net profit use net_profit_blended.'
formula:
  human_readable: net_sales - net_cogs
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.gross_profit
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  scopes:
  - metrics:read
examples:
- question: P&L gross profit for June 2026
  request:
    measures:
    - gross_profit
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- gross_profit = net_sales - net_cogs for the same slice
deprecated_aliases: []
