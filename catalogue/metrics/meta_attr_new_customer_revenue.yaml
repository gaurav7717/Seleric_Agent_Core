id: meta_attr_new_customer_revenue
display_name: Meta Attributed New Customer Revenue
category: attribution
status: draft
description: Not implemented in the dashboard — Node-Backend has no equivalent live
  calculation. Net revenue from new-customer orders last-touch attributed to a Meta
  ad.
formula:
  human_readable: SUM(new_customer_revenue)
  authoritative_source: cube
cube_mapping:
  view: meta_ad_attribution
  measure: meta_ad_attribution.new_customer_revenue
aggregation: additive
unit: currency
grain: daily ad grain (brand x campaign x adset x ad x day, last-touch attribution)
supported_dimensions:
- brand_id
- report_date
- campaign_id
- campaign_name
- adset_id
- adset_name
- ad_id
- ad_name
- attribution_model
supported_filters:
- date_range
- brand_id
- campaign_id
- campaign_name
- adset_id
- adset_name
- ad_id
- ad_name
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Meta Attributed New Customer Revenue by campaign for June 2026
  request:
    measures:
    - meta_attr_new_customer_revenue
    dimensions:
    - campaign_name
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests: []
deprecated_aliases: []
currency_default: INR
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    is_new_customer is attached per-order but never summed to ad/adset/campaign
    grain anywhere.
