id: site_search_events
display_name: Site Search Events
category: web_analytics
status: certified
description: >
  Snowplow site_search events (on-site search interactions) on the event-type ×
  channel day rollup. Search terms are not yet propagated past raw ingest —
  this is a volume metric only.
formula:
  human_readable: SUM(events WHERE event_type = 'site_search')
  authoritative_source: cube
cube_mapping:
  view: web_events_daily
  measure: web_events_daily.site_search_events
aggregation: additive
unit: count
grain: brand × day × fine channel
supported_dimensions:
  - brand_id
  - report_date
  - channel
supported_filters:
  - date_range
  - brand_id
  - channel
data_owner: Growth / Analytics
access_policy:
  roles_allowed: [exec, growth_lead, analyst, ops]
  scopes: [metrics:read]
validation_tests:
  - site_search_events >= 0
deprecated_aliases: []
