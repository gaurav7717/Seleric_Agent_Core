id: event_cancel_revenue
display_name: Cancel Revenue by Event (Shopify-only, ex-GST)
category: commerce
status: certified
description: >
  Cancellation revenue deducted on the cancel event date (ex-GST), order-grain with
  full shipping geo and payment mix. Use this — not cancel_revenue on canonical_pnl —
  for "cancelled revenue by state/region/COD/prepaid". Event axis: event_date.
formula:
  human_readable: SUM(cancel_revenue_excl_tax) WHERE event_type = cancellation
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.cancel_revenue_excl_tax
  time_dimension: commerce_orders.event_date
aggregation: additive
unit: currency
currency_default: INR
grain: order event
supported_dimensions:
- brand_id
- event_date
- event_type
- payment_method
- payment_bucket
- utm_source
- utm_medium
- utm_campaign
- source_name
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- order_status
- return_status
- fulfillment_status
- payment_gateway
- is_cod
- is_prepaid
- financial_status
supported_filters:
- date_range
- brand_id
- event_type
- payment_method
- payment_bucket
- utm_source
- utm_medium
- utm_campaign
- source_name
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- order_status
- return_status
- fulfillment_status
- payment_gateway
- is_cod
- is_prepaid
- financial_status
data_owner: Commerce Ops
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
examples:
- question: Cancelled revenue by state last month
  request:
    measures: [event_cancel_revenue]
    dimensions: [shipping_region]
    time_range: {preset: last_month}
validation_tests:
- reconciles to cancel_revenue on canonical_pnl when grouped by day only
deprecated_aliases: []
dashboard_alignment:
  status: match
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: lineItemHistoricalSql.js:279-305
