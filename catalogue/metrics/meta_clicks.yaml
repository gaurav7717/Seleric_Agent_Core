id: meta_clicks
display_name: Meta Clicks
category: marketing
status: approved
description: >
  Meta platform-reported clicks (all clicks) from gold.fct_meta_ads_daily.
  Link clicks are a separate Cube measure (link_clicks) not yet catalogued.
formula:
  human_readable: "Sum of Meta clicks"
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.clicks
aggregation: additive
unit: count
grain: day
supported_dimensions: [brand_id, report_date, campaign_id, campaign_name, adset_name, ad_id, ad_name]
supported_filters: [date_range, brand_id, campaign_id, campaign_name, adset_name, ad_id, ad_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Meta clicks by campaign last 7 days"
    request: {measures: [meta_clicks], dimensions: [campaign_name], time_range: {preset: last_7d}}
validation_tests: []
deprecated_aliases: []
