- brand_id
- report_date
- channel
supported_filters:
- date_range
- brand_id
- channel
data_owner: Growth / Analytics
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- funnel_revenue >= 0
deprecated_aliases: []
dashboard_alignment:
  status: drift_corrected
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: channelFunnel/spendRoasClickhouse.js:6-11, analytics.js:89-100
  note: Session-mart revenue basis plus a third revenue-source override in analytics.js not reflected in the catalogue.
