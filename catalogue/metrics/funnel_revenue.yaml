id: funnel_revenue
display_name: Funnel Revenue
category: web_analytics
status: certified
description: 'First-party attributed net revenue (ex-GST) on the channel-day funnel — order-grain last-touch attribution, never platform-reported.

  '
formula:
  human_readable: SUM(revenue)
  authoritative_source: cube
cube_mapping:
  view: funnel_daily
