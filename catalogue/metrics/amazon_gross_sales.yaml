id: amazon_gross_sales
display_name: Gross Sales (Amazon-only, ex-GST)
category: commerce
status: certified
description: >
  Amazon SP revenue_principal (ex-GST) for placements in range — Amazon slice
  inside All-channels Gross Sales. Distinct from amazon_gross_revenue (GST-incl
  daily commerce). For Shopify-only use gross_sales; for both use
  gross_sales_all_channels.
formula:
  human_readable: SUM(amazon revenue_principal)
  authoritative_source: cube
cube_mapping:
  view: sales_all_channels
  measure: sales_all_channels.amazon_gross_sales
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
supported_filters:
  - date_range
  - brand_id
data_owner: Commerce Ops
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
examples:
  - question: Amazon Gross Sales June 2026
    request:
      measures: [amazon_gross_sales]
      time_range: {start: "2026-06-01", end: "2026-06-30"}
validation_tests:
  - amazon_gross_sales >= 0
deprecated_aliases: []
