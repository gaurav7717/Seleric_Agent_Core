id: meta_purchase_value
display_name: Meta Purchase Value (platform-reported)
category: marketing
status: approved
description: >
  Meta platform-reported purchase conversion value — NOT Shopify net revenue.
formula:
  human_readable: "Sum of Meta-reported purchase value"
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.purchase_value
aggregation: additive
unit: currency
currency_default: INR
grain: day
supported_dimensions: [brand_id, report_date, campaign_id, campaign_name, adset_name, ad_id, ad_name]
supported_filters: [date_range, brand_id, campaign_id, campaign_name, adset_name, ad_id, ad_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Meta purchase value by campaign last 7 days"
    request: {measures: [meta_purchase_value, meta_spend], dimensions: [campaign_name], time_range: {preset: last_7d}}
validation_tests: []
deprecated_aliases: []
