id: product_net_revenue
display_name: Product Net Revenue (ex-GST)
category: product
status: certified
description: 'Lifecycle line-item net revenue ex-GST (pre-refund − cancelled − returned deductions, per-line GST rates) from serve.product_performance. Cohort model: deductions attach to the placement period. Use for product/SKU breakdowns — company net_revenue on canonical_pnl has no product dimension; commerce net sales reconciles within a documented band, not exactly (shipping revenue and order-level GST strip differ).

  '
formula:
  human_readable: 'Sum of (net_pre_refund_excl_gst − cancelled_revenue_excl_gst − returned_revenue_excl_gst) on eligible lines

    '
  authoritative_source: cube
cube_mapping:
  view: product_performance
  measure: product_performance.net_line_revenue_ex_gst
aggregation: additive
unit: currency
currency_default: INR
grain: order_item
supported_dimensions:
- brand_id
- order_date
- product_title
- variant_title
- sku
- product_type
- vendor
- shipping_city
- shipping_region
- shipping_country
- order_status
- return_status
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- product_id
- variant_id
- pnl_refund_class
supported_filters:
- date_range
- brand_id
- product_title
- sku
- product_type
- vendor
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- product_id
- variant_id
- pnl_refund_class
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Top products by revenue last 30 days
  request:
    measures:
    - product_net_revenue
    dimensions:
    - product_title
    time_range:
      preset: last_30d
    sort:
    - field: product_net_revenue
      direction: desc
    limit: 10
validation_tests:
- matches dashboard product-performance lifecycle revenue for closed months
- reconciles to commerce net sales within documented band
deprecated_aliases: []
dashboard_alignment:
  status: drift_corrected
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: lineItemHistoricalSql.js:1677,1702,1739
  note: Field labeled net_sales is actually pre-refund gross with no lifecycle deduction applied.
