id: product_net_revenue
display_name: Product Net Revenue (ex-GST)
category: commerce
status: approved
description: >
  Line-item net revenue ex-GST from product_performance (gold.fct_order_items).
  Use for product/SKU breakdowns — company net_revenue on canonical_pnl has no
  product dimension.
formula:
  human_readable: "Sum of net line revenue ex-GST"
  authoritative_source: cube
cube_mapping:
  view: product_performance
  measure: product_performance.net_line_revenue_ex_gst
aggregation: additive
unit: currency
currency_default: INR
grain: order_item
supported_dimensions: [brand_id, order_date, product_title, sku, shipping_city, shipping_country]
supported_filters: [date_range, brand_id, product_title, sku]
data_owner: "Commerce Ops"
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Top products by revenue last 30 days"
    request: {measures: [product_net_revenue], dimensions: [product_title], time_range: {preset: last_30d}, limit: 10}
validation_tests: []
deprecated_aliases: []
