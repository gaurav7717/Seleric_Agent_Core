id: meta_video_50_pct_rate
display_name: Meta Video 50% Rate
category: paid_media
status: draft
description: >
  Not implemented in the Node-Backend dashboard as of 2026-07-21 — describes
  the intended Cube-layer design only. Meta Video 50% Rate recomputed from
  aggregated components — never SUM/AVG of row ratios.
formula:
  human_readable: SUM(50% views) / SUM(3s views)
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.meta_video_50_pct_rate
aggregation: ratio
unit: ratio
grain: daily ad grain (brand x account x day x campaign x adset x ad)
supported_dimensions:
- brand_id
- report_date
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
supported_filters:
- date_range
- brand_id
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- meta_video_50_pct_rate equals meta_video_50_pct_views / meta_video_3s_views recomputed on
  any slice
ratio_components:
  numerator: meta_ad_performance.meta_video_50_pct_views
  denominator: meta_ad_performance.meta_video_3s_views
companion_measures:
- meta_video_50_pct_views
- meta_video_3s_views
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    This rate needs a 3s-views denominator, which does not exist anywhere in
    Node-Backend, so it is not computed on the dashboard.
