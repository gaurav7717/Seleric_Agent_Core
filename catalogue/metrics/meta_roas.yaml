id: meta_roas
display_name: Meta ROAS (platform-reported)
category: marketing
status: approved
description: >
  Return on ad spend as reported by Meta's attribution (platform conversion
  values, NOT Shopify truth). For business-truth blended efficiency use mer or
  blended_roas on canonical_pnl. A ratio — never sum or average rows.
formula:
  human_readable: "Meta-reported purchase value / Meta spend"
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.roas
aggregation: ratio
ratio_components:
  numerator: meta_ad_performance.purchase_value
  denominator: meta_ad_performance.spend
unit: ratio
grain: day
supported_dimensions: [brand_id, report_date, campaign_id, campaign_name, adset_name, ad_id, ad_name]
supported_filters: [date_range, brand_id, campaign_id, campaign_name, adset_name, ad_id, ad_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Which ads had the worst ROAS last 7 days?"
    request: {measures: [meta_roas, meta_spend], dimensions: [ad_name], time_range: {preset: last_7d}}
validation_tests:
  - "period ROAS equals sum(purchase_value)/sum(spend) for the same slice"
deprecated_aliases: [marketing_performance.roas]
