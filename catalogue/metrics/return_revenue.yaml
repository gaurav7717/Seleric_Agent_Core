id: return_revenue
display_name: Returns Revenue (Shopify-only, ex-GST)
category: commerce
status: certified
description: 'Revenue deducted by return events in the period (ex-GST), on the return event date — FE
  §13 P&L Returns card / half of Return/Cancel Rev. Period totals only (brand × day); for geo/payment/UTM
  breakdowns use event_return_revenue on commerce_orders with event_date. Not an order count (use refunded_orders).
  Scope: Shopify-only (Historical Analytics / commerce oracle). Does not include Amazon SP marketplace
  sales or fees. For all-platform ad spend use total_ad_spend; for blended-ads net profit use net_profit_blended.'
formula:
  human_readable: SUM(return_revenue_excl_tax)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.return_revenue
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
examples:
