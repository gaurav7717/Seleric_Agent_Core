id: shipping_cost
display_name: Shipping Cost (Shopify-only)
category: finance
status: certified
description: 'Fulfilment shipping cost arm of Shopify Net COGS (brand × day), including return-event shipping.
  FE §13 Shipping Cost (Courier). Part of Net COGS — do not subtract again when Net COGS / Total Operating
  Cost is used. Scope: Shopify-only (Historical Analytics / commerce oracle). Does not include Amazon
  SP marketplace sales or fees. For all-platform ad spend use total_ad_spend; for blended-ads net profit
  use net_profit_blended.'
formula:
  human_readable: SUM(shipping_cost)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.shipping_cost
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  scopes:
  - metrics:read
examples:
- question: Shipping Cost for June 2026
  request:
    measures:
    - shipping_cost
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- shipping_cost >= 0 for any slice
- June 2026 brand 20 ≈ ₹2,85,227.00
deprecated_aliases: []
dashboard_alignment:
  status: match
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: src/integrations/historicalAnalytics/lineItemHistoricalSql.js:616
