id: amazon_platform_fees
display_name: Amazon Platform Fees
category: finance
status: certified
description: >
  Amazon SP marketplace fees for the period (brand × day): abs(commission) +
  abs(closing) + abs(shipping) + abs(tax_withheld) + abs(other_service_fees).
  Matches Amazon Attribution Analysis Amazon Fees card. Not Amazon Ads spend
  (amazon_ads_spend). Distinct from Shopify Net COGS / Total Operating Cost.
  P&L TOC uses operational marketplace fees (slightly different rollup).
formula:
  human_readable: SUM(|commission| + |closing| + |shipping| + |tax_withheld| + |other|)
  authoritative_source: cube
cube_mapping:
  view: amazon_daily_pnl
  measure: amazon_daily_pnl.marketplace_fees
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
supported_filters:
  - date_range
  - brand_id
data_owner: Finance
access_policy:
  roles_allowed: [exec, finance]
  scopes: [metrics:read]
examples:
  - question: Amazon Platform Fees for June 2026
    request:
      measures: [amazon_platform_fees]
      time_range: {start: "2026-06-01", end: "2026-06-30"}
validation_tests:
  - amazon_platform_fees >= 0 for any slice
  - June 2026 brand 20 ≈ ₹52,128.10
deprecated_aliases: []
