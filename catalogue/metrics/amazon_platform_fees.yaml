id: amazon_platform_fees
display_name: Amazon Platform Fees
category: finance
status: certified
description: >
  Amazon SP platform fees from `amazon_daily_pnl.marketplace_fees`, defined as
  the sum of absolute fee components (commission, closing, shipping,
  tax-withheld, other service fees). This is not Amazon Ads spend
  (`amazon_ads_spend`) and is distinct from Shopify Net COGS / Total Operating
  Cost.
formula:
  human_readable: SUM(ABS(commission) + ABS(closing) + ABS(shipping) + ABS(tax_withheld) + ABS(other_service_fees))
  authoritative_source: cube
cube_mapping:
  view: amazon_daily_pnl
  measure: amazon_daily_pnl.marketplace_fees
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
supported_filters:
  - date_range
  - brand_id
data_owner: Finance
access_policy:
  roles_allowed: [exec, finance]
  scopes: [metrics:read]
examples:
  - question: Amazon Platform Fees for June 2026
    request:
      measures: [amazon_platform_fees]
      time_range: {start: "2026-06-01", end: "2026-06-30"}
validation_tests:
  - amazon_platform_fees >= 0 for any slice
  - amazon_platform_fees equals sum of absolute fee components on
    amazon_daily_pnl.marketplace_fees
  - June 2026 brand 20 ≈ ₹52,128.10
deprecated_aliases: []
dashboard_alignment:
  status: drift_corrected
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: data_platform/mage-ai/infra/cube/model/cubes/serve_amazon_daily_pnl.yml:15-25
  note: >
    Dashboard fee logic and canonical Cube fee logic are not identical. The
    catalogue is now aligned to the executing Cube semantic used by the Base
    Agent (`amazon_daily_pnl.marketplace_fees`).
