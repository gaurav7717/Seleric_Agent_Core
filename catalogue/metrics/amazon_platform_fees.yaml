id: amazon_platform_fees
display_name: Amazon Platform Fees
category: finance
status: certified
description: >
  Amazon SP marketplace fees for the period (brand × day): abs(marketplace_fees)
  + abs(return_label_fees). Settled fee components (commission, closing, shipping,
  other, TCS) plus return shipping-label accrual. Not Amazon Ads spend
  (amazon_ads_spend). Distinct from Shopify Net COGS / Total Operating Cost.
formula:
  human_readable: SUM(abs(marketplace_fees) + abs(return_label_fees))
  authoritative_source: cube
cube_mapping:
  view: amazon_daily_pnl
  measure: amazon_daily_pnl.marketplace_fees
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
supported_filters:
  - date_range
  - brand_id
data_owner: Finance
access_policy:
  roles_allowed: [exec, finance]
  scopes: [metrics:read]
examples:
  - question: Amazon Platform Fees for June 2026
    request:
      measures: [amazon_platform_fees]
      time_range: {start: "2026-06-01", end: "2026-06-30"}
validation_tests:
  - amazon_platform_fees >= 0 for any slice
  - June 2026 brand 20 ≈ ₹53,828.09 (settled 52,646.91 + return labels 1,181.18)
deprecated_aliases: []
