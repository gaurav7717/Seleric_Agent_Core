id: google_roas
display_name: Google ROAS (platform-reported)
category: marketing
status: approved
description: >
  Return on ad spend as reported by Google's attribution (platform conversion
  value, NOT Shopify truth). For business-truth blended efficiency use mer or
  blended_roas on canonical_pnl. A ratio — never sum or average rows.
formula:
  human_readable: "Google-reported conversion value / Google spend"
  authoritative_source: cube
cube_mapping:
  view: google_ad_performance
  measure: google_ad_performance.roas
aggregation: ratio
ratio_components:
  numerator: google_ad_performance.conversion_value
  denominator: google_ad_performance.spend
unit: ratio
grain: day
supported_dimensions: [brand_id, report_date, campaign_id, campaign_name, adset_name, ad_id, ad_name]
supported_filters: [date_range, brand_id, campaign_id, campaign_name, adset_name, ad_id, ad_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Which Google campaigns had the worst ROAS last 7 days?"
    request: {measures: [google_roas, google_spend], dimensions: [campaign_name], time_range: {preset: last_7d}}
validation_tests:
  - "period ROAS equals sum(conversion_value)/sum(spend) for the same slice"
deprecated_aliases: []
