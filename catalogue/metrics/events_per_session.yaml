id: events_per_session
display_name: Events per Session
category: web_analytics
status: certified
description: >
  Average website events per session, computed at event grain
  (serve.web_events): COUNT(events) / COUNT(DISTINCT session-linked sessions),
  recomputed as a ratio of aggregates on any slice. Numerator includes
  sessionless server-side purchase events; denominator counts sessions with
  ≥1 web event.
formula:
  human_readable: COUNT(events) / COUNT(DISTINCT session_id)
  authoritative_source: cube
cube_mapping:
  view: web_events
  measure: web_events.events_per_session
aggregation: ratio
unit: ratio
grain: brand × event (aggregated on any slice)
supported_dimensions:
  - brand_id
  - event_date
  - event_type
  - channel
supported_filters:
  - date_range
  - brand_id
  - event_type
  - channel
data_owner: Growth / Analytics
access_policy:
  roles_allowed: [exec, growth_lead, analyst, ops]
  scopes: [metrics:read]
validation_tests:
  - events_per_session >= 1 on unfiltered slices
ratio_components:
  numerator: web_events.events
  denominator: web_events.unique_sessions
companion_measures:
  - web_events
deprecated_aliases: []
