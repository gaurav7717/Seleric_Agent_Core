id: contribution_margin_pct
display_name: Contribution Margin % (Shopify-only)
category: finance
status: certified
description: 'Contribution margin as a share of net sales (ratio of aggregates),
  aligned to canonical_pnl semantic execution.'
formula:
  human_readable: 100 x SUM(contribution_margin) / SUM(net_sales)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.contribution_margin_pct
aggregation: ratio
unit: percent
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  scopes:
  - metrics:read
examples:
- question: Contribution Margin % for June 2026
  request:
    measures:
    - contribution_margin_pct
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- period value equals 100 x sum(contribution_margin)/sum(net_sales) for the same slice
deprecated_aliases: []
ratio_components:
  numerator: canonical_pnl.contribution_margin
  denominator: canonical_pnl.net_sales
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: —
  note: No percent-of-sales contribution-margin field anywhere in Node-Backend.
