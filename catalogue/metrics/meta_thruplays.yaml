id: meta_thruplays
display_name: Meta ThruPlays
category: paid_media
status: draft
description: >
  Not implemented in the Node-Backend dashboard as of 2026-07-21 — describes
  the intended Cube-layer design only. ThruPlays (15s or full watch).
formula:
  human_readable: SUM(meta_thruplays)
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.meta_thruplays
aggregation: additive
unit: count
grain: daily ad grain (brand x account x day x campaign x adset x ad)
supported_dimensions:
- brand_id
- report_date
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
supported_filters:
- date_range
- brand_id
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- meta_thruplays >= 0 for any slice
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    Confirmed by grep — "thruplay" has zero occurrences anywhere in
    Node-Backend's src/. This field is not fetched or computed on the
    dashboard.
