id: gross_units_ordered
display_name: Gross Units Ordered
category: product
status: draft
description: >
  Not implemented in the dashboard as of this audit — only net quantity
  exists in Node-Backend, no gross-before-refunds figure. Gross ordered
  quantity (before refunds) on eligible placement lines from
  serve.product_performance. The net basis (after refunds) is units_sold —
  one metric name is never used for both.
formula:
  human_readable: Sum of ordered quantity on eligible lines
  authoritative_source: cube
cube_mapping:
  view: product_performance
  measure: product_performance.gross_units_ordered
aggregation: additive
unit: count
grain: order_item
supported_dimensions:
- brand_id
- order_date
- product_title
- variant_title
- sku
- product_type
- vendor
- shipping_city
- shipping_region
- shipping_country
- order_status
- return_status
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- product_id
- variant_id
- pnl_refund_class
supported_filters:
- date_range
- brand_id
- product_title
- sku
- product_type
- vendor
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- product_id
- variant_id
- pnl_refund_class
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Gross units ordered by SKU last month
  request:
    measures:
    - gross_units_ordered
    dimensions:
    - sku
    time_range:
      preset: last_month
validation_tests:
- gross_units_ordered >= units_sold for any slice
deprecated_aliases: []
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    Only net quantity exists in Node-Backend; no gross-before-refunds figure
    is computed. Part of the broader finding that there is no all-channel
    product/SKU rollup.
