id: avg_ltv
display_name: Average LTV
category: customer
status: draft
description: >
  Not implemented in the dashboard as of this audit — no lifetime-value calc
  exists anywhere in Node-Backend. Lifetime net revenue divided by customer
  count (ex-GST).
formula:
  human_readable: lifetime_net_revenue / customers
  authoritative_source: cube
cube_mapping:
  view: customer_ltv
  measure: customer_ltv.avg_ltv
aggregation: ratio
unit: currency
grain: customer (one row per customer with >=1 eligible order, lifetime snapshot)
supported_dimensions:
- brand_id
- acquisition_platform
- acquisition_channel
- acquisition_campaign
- is_repeat_customer
- lifetime_order_count_band
- customer_default_city
- customer_default_province
supported_filters:
- brand_id
- acquisition_platform
- acquisition_channel
- acquisition_campaign
- is_repeat_customer
- lifetime_order_count_band
data_owner: Growth / CRM
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Average LTV by acquisition channel
  request:
    measures:
    - avg_ltv
    dimensions:
    - acquisition_channel
validation_tests: []
deprecated_aliases: []
currency_default: INR
ratio_components:
  numerator: customer_ltv.lifetime_net_revenue
  denominator: customer_ltv.customers
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    No lifetime-value calculation exists anywhere in Node-Backend. Part of the
    broader finding that there is no customer-master or lifetime-aggregation
    layer.
