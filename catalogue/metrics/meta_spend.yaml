id: meta_spend
display_name: Meta Spend (Meta-only)
category: paid_media
status: certified
description: >
  Meta Ads spend only. For Google-only use google_spend; Amazon Ads use
  amazon_ads_spend; Shopify Historical (Meta+Google) use shopify_ad_spend;
  all platforms use total_ad_spend.
formula:
  human_readable: SUM(meta_spend)
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.meta_spend
aggregation: additive
unit: INR
grain: daily ad grain (brand x account x day x campaign x adset x ad)
supported_dimensions:
- brand_id
- report_date
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
supported_filters:
- date_range
- brand_id
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- meta_spend >= 0 for any slice
currency_default: INR
dashboard_alignment:
  status: match
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: historicalAnalytics/analyticsClickhouse.js:761
