id: product_gross_margin_pct
display_name: Product Gross Margin %
category: product
status: certified
description: >
  Product gross profit as a share of lifecycle net revenue (ex-GST),
  fully-loaded COGS basis, from serve.product_performance. A ratio — never sum
  or average row/daily margin percentages; recompute from components.
formula:
  human_readable: 100 × product_gross_profit / product_net_revenue
  authoritative_source: cube
cube_mapping:
  view: product_performance
  measure: product_performance.product_gross_margin_pct
aggregation: ratio
ratio_components:
  numerator: product_performance.gross_profit_ex_gst
  denominator: product_performance.net_line_revenue_ex_gst
unit: percent
grain: order_item
supported_dimensions:
- brand_id
- order_date
- product_title
- variant_title
- sku
- product_type
- vendor
- order_status
- return_status
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- shipping_city
- shipping_region
- shipping_country
- product_id
- variant_id
- pnl_refund_class
supported_filters:
- date_range
- brand_id
- product_title
- sku
- product_type
- vendor
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- shipping_city
- shipping_region
- shipping_country
- variant_title
- product_id
- variant_id
- pnl_refund_class
data_owner: Commerce Ops / Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Gross margin by SKU last month
  request:
    measures:
    - product_gross_margin_pct
    dimensions:
    - sku
    time_range:
      preset: last_month
validation_tests:
- period value equals 100 × sum(gross_profit)/sum(net_revenue) for the same slice
deprecated_aliases: []
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    Depends on non-existent fields — Node-Backend has no product-grain gross
    profit or net revenue rollup. Part of the broader finding that there is
    no all-channel product/SKU rollup.
