id: meta_ctr
display_name: Meta CTR
category: paid_media
status: certified
description: >
  Meta CTR recomputed from aggregated components — never SUM/AVG of row
  ratios.
formula:
  human_readable: SUM(clicks) / SUM(impressions)
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.meta_ctr
aggregation: ratio
unit: ratio
grain: daily ad grain (brand x account x day x campaign x adset x ad)
supported_dimensions:
- brand_id
- report_date
- ad_account_id
- campaign_id
- campaign_name
- adset_id
- adset_name
- ad_id
- ad_name
supported_filters:
- date_range
- brand_id
- ad_account_id
- campaign_id
- campaign_name
- adset_id
- adset_name
- ad_id
- ad_name
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- meta_ctr equals (meta_clicks / meta_impressions) recomputed on any slice
ratio_components:
  numerator: meta_ad_performance.meta_clicks
  denominator: meta_ad_performance.meta_impressions
companion_measures:
- meta_clicks
- meta_impressions
dashboard_alignment:
  status: drift_corrected
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: historicalAnalytics/analyticsClickhouse.js:780
  note: >
    Dashboard computes CTR as percentage (x100). Canonical Cube semantic is a
    ratio-of-aggregates measure (no x100), which the catalogue now reflects for
    agent query consistency.
