id: be_roas
display_name: Break-Even ROAS (Shopify-only)
category: finance
status: certified
description: 'Historical Analytics BE ROAS (FE tooltip / attribution form): Net Sales / (Net Sales − Net
  COGS). Contribution-margin breakeven — the ad efficiency needed to cover COGS. Do not confuse with (net_cogs
  + spend) / spend. Scope: Shopify-only (Historical Analytics / commerce oracle). Does not include Amazon
  SP marketplace sales or fees. For all-platform ad spend use total_ad_spend; for blended-ads net profit
  use net_profit_blended.'
formula:
  human_readable: SUM(net_sales) / (SUM(net_sales) - SUM(net_cogs))
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.be_roas
aggregation: ratio
unit: ratio
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  scopes:
  - metrics:read
examples:
- question: BE ROAS for June 2026
  request:
    measures:
    - be_roas
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- June 2026 brand 20 ≈ dashboard 1.97x
deprecated_aliases: []
