id: cod_orders
display_name: Cash-on-Delivery Orders
category: commerce
status: certified
description: >
  COD bucket orders from serve.commerce_orders (dashboard payment_bucket = cod).
  Excludes test, revenue-adjustment, and draft orders. Payment mix uses
  order_created_at_ist date axis in dashboard SQL.
formula:
  human_readable: "Count of orders in COD payment bucket"
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.cod_orders
aggregation: additive
unit: count
grain: order
supported_dimensions: [brand_id, order_date, order_created_at_ist, payment_method, payment_bucket]
supported_filters: [date_range, brand_id, payment_method, payment_bucket]
data_owner: "Commerce Ops"
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
examples:
  - question: "COD orders by shipping region last 7 days"
    request: {measures: [cod_orders], dimensions: [shipping_region], time_range: {preset: last_7d}}
validation_tests:
  - "cod_orders <= orders for any slice"
deprecated_aliases: []
