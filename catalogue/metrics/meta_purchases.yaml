id: meta_purchases
display_name: Meta Purchases (platform-reported)
category: marketing
status: approved
description: >
  Meta platform-reported purchase conversions — NOT Shopify/backend order
  truth. For backend attributed orders use attributed_orders.
formula:
  human_readable: "Sum of Meta-reported purchases"
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.purchases
aggregation: additive
unit: count
grain: day
supported_dimensions: [brand_id, report_date, campaign_id, campaign_name, adset_name, ad_id, ad_name]
supported_filters: [date_range, brand_id, campaign_id, campaign_name, adset_name, ad_id, ad_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Meta purchases by campaign last 7 days"
    request: {measures: [meta_purchases, meta_spend], dimensions: [campaign_name], time_range: {preset: last_7d}}
validation_tests: []
deprecated_aliases: []
