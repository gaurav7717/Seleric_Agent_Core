id: repeat_purchase_net_revenue
display_name: Sequenced Net Revenue
category: customer
status: draft
description: >
  Not implemented in the dashboard as of this audit — no purchase-sequence
  revenue split exists in Node-Backend. Net revenue (ex-GST) at order grain
  from the purchase-sequence model.
formula:
  human_readable: SUM(net_revenue_excl_tax)
  authoritative_source: cube
cube_mapping:
  view: purchase_sequence
  measure: purchase_sequence.net_revenue
aggregation: additive
unit: currency
grain: order (eligible orders, per-customer sequenced)
supported_dimensions:
- brand_id
- order_date
- order_status
- is_cod
- order_seq
- order_seq_band
- is_first_order
- payment_method
- payment_bucket
- payment_gateway
- is_prepaid
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
supported_filters:
- date_range
- brand_id
- order_status
- is_cod
- order_seq
- order_seq_band
- is_first_order
- payment_method
- payment_bucket
- payment_gateway
- is_prepaid
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
data_owner: Growth / CRM
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Sequenced Net Revenue for June 2026
  request:
    measures:
    - repeat_purchase_net_revenue
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests: []
deprecated_aliases: []
currency_default: INR
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    No purchase-sequence revenue split exists in Node-Backend. Part of the
    broader finding that there is no customer-master or lifetime-aggregation
    layer.
