id: attribution_rate
display_name: Attribution Rate
category: attribution
status: certified
description: Share of orders with an identified last-touch marketing touchpoint.
formula:
  human_readable: touch_attributed_orders / attributed_orders
  authoritative_source: cube
cube_mapping:
  view: order_attribution
  measure: order_attribution.attribution_rate
aggregation: ratio
unit: percent
grain: order (last-touch attribution)
supported_dimensions:
- brand_id
- order_date
- lt_platform
- lt_channel
- lt_utm_source
- lt_utm_medium
- lt_utm_campaign
- lt_campaign_id
- lt_campaign_name
- lt_adset_name
- lt_ad_name
- attribution_method
- is_new_customer
- is_cod
- source_name
- attribution_model
- payment_method
- payment_bucket
- payment_gateway
- is_prepaid
supported_filters:
- date_range
- brand_id
- lt_platform
- lt_channel
- attribution_method
- is_new_customer
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
data_owner: Growth / Attribution
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Attribution Rate for June 2026
  request:
    measures:
    - attribution_rate
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests: []
deprecated_aliases: []
ratio_components:
  numerator: order_attribution.touch_attributed_orders
  denominator: order_attribution.attributed_orders
