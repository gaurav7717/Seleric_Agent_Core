id: net_revenue
display_name: Net Revenue (ex-GST)
category: financial
status: approved
description: >
  Net sales excluding GST — the P&L revenue base. Revenue after discounts,
  returns/RTO impact, and cancellations, recognized at the order level.
  Brand × day only (canonical_pnl). For city / region / payment-method /
  UTM breakdowns use commerce_net_revenue on commerce_orders instead.
formula:
  human_readable: "Net sales excluding GST (after discounts, returns, cancellations)"
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.net_revenue_excl_tax
aggregation: additive
unit: currency
currency_default: INR
grain: day
supported_dimensions: [brand_id, report_date]
supported_filters: [date_range, brand_id]
data_owner: "Finance Analytics"
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "What was net revenue last month?"
    request: {measures: [net_revenue], time_range: {preset: last_month}}
validation_tests:
  - "sum over a closed month reconciles to finance close figure within 0.5%"
  - "never negative for a completed period"
deprecated_aliases: [daily_pnl.net_revenue, daily_pnl.total_sales_ex_gst, daily_pnl.net_sales_ex_gst]
