id: net_profit_all_channels
display_name: Net Profit (all channels — P&L Forecast)
category: finance
status: certified
description: 'P&L Forecast Net Profit: (Shopify net + Amazon operational revenue / 1.18) − all-channels TOC − Total Ad Spend (Meta+Google+Amazon). Distinct from Shopify-only net_profit and from Historical all-channels net_profit_incl_amazon.

  '
formula:
  human_readable: pnl_net_sales_all - toc_all_channels - total_ad_spend
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.net_profit_all_channels
aggregation: additive
unit: currency
currency_default: INR
grain: daily
