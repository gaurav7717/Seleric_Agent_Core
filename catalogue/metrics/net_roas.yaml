id: net_roas
display_name: Net ROAS (Shopify-only)
category: finance
status: certified
description: 'Historical Analytics Net ROAS card: (Net Sales − Net COGS) / Shopify ad spend (Meta + Google).
  Contribution margin per ad rupee — NOT MER (Net Sales / spend) and NOT platform-reported ROAS. FE buildDashboardStats:
  safeDiv(netSales - cogs, adSpend). Scope: Shopify-only (Historical Analytics / commerce oracle). Does
  not include Amazon SP marketplace sales or fees. For all-platform ad spend use total_ad_spend; for blended-ads
  net profit use net_profit_blended.'
formula:
  human_readable: (SUM(net_sales) - SUM(net_cogs)) / SUM(shopify_ad_spend)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.net_roas
aggregation: ratio
unit: ratio
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  scopes:
  - metrics:read
examples:
- question: Net ROAS for June 2026
  request:
    measures:
    - net_roas
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- equals (net_sales - net_cogs) / shopify_ad_spend for the same slice
- June 2026 brand 20 ≈ dashboard 0.86x
deprecated_aliases: []
ratio_components:
  numerator: canonical_pnl.contribution_margin
  denominator: canonical_pnl.shopify_ad_spend
