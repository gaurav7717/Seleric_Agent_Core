id: meta_landing_page_views
display_name: Meta Landing Page Views
category: paid_media
status: certified
description: >
  Meta-tracked landing page views. Dashboard basis: fetched via a separate
  account-level Meta Graph API call, not the ClickHouse-backed query used for
  spend/clicks/impressions — see dashboard_alignment.
formula:
  human_readable: SUM(meta_landing_page_views)
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.meta_landing_page_views
aggregation: additive
unit: count
grain: daily account grain (brand x ad_account x day)
supported_dimensions:
- brand_id
- report_date
- ad_account_id
supported_filters:
- date_range
- brand_id
- ad_account_id
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- meta_landing_page_views >= 0 for any slice
dashboard_alignment:
  status: drift_corrected
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: meta/analytics.js:773
  note: >
    Node-Backend fetches landing_page_views via a separate account-level Meta
    Graph API call (meta/analytics.js:773), not the ClickHouse-backed
    fct_meta_ads_daily query used for spend/clicks/impressions. It has no
    campaign, adset, ad, or creative breakdown, unlike the catalogued grain.
    Grain and supported_dimensions/filters corrected to account-level;
    cube_mapping left as-is (still valid for the Cube semantic layer, which
    the dashboard does not use).
