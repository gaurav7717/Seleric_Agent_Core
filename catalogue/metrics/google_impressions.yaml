id: google_impressions
display_name: Google Impressions
category: paid_media
status: certified
description: Google Ads impressions.
formula:
  human_readable: SUM(google_impressions)
  authoritative_source: cube
cube_mapping:
  view: google_ad_performance
  measure: google_ad_performance.google_impressions
aggregation: additive
unit: count
grain: daily campaign grain (brand x customer account x day x campaign)
supported_dimensions:
- brand_id
- report_date
- customer_account_id
- campaign_id
- campaign_name
- campaign_type
supported_filters:
- date_range
- brand_id
- customer_account_id
- campaign_id
- campaign_name
- campaign_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- google_impressions >= 0 for any slice
