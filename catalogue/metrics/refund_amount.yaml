id: refund_amount
display_name: Refund Amount
category: financial
status: approved
description: >
  Refund amount from line-item refund events (gold.fct_refund_line_items),
  dated by refund_processed_date (when the refund was processed) — not
  returned_at (the return-status lifecycle date used on order_records/
  order_item_records). Use for refund timing / cash-at-risk analysis, not
  as a substitute for canonical_pnl's return/cancellation revenue impact.
formula:
  human_readable: "Sum of refund_total_amount, incl. GST"
  authoritative_source: cube
cube_mapping:
  view: refund_events
  measure: refund_events.refund_amount
aggregation: additive
unit: currency
currency_default: INR
grain: order_item
supported_dimensions: [brand_id, refund_processed_date, return_status, sku, product_title, order_id]
supported_filters: [date_range, brand_id, return_status, sku, product_title, order_id]
data_owner: "Finance Analytics"
access_policy:
  roles_allowed: [exec, finance, analyst]
  scopes: [metrics:read]
examples:
  - question: "Refund amount by SKU last 30 days"
    request: {measures: [refund_amount], dimensions: [sku], time_range: {preset: last_30d}}
validation_tests:
  - "refund_amount >= 0 for any non-empty slice"
deprecated_aliases: []
