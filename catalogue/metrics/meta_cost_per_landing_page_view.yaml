id: meta_cost_per_landing_page_view
display_name: Meta Cost per Landing Page View
category: paid_media
status: certified
description: Meta Cost per Landing Page View recomputed from aggregated components — never
  SUM/AVG of row ratios.
formula:
  human_readable: SUM(spend) / SUM(landing_page_views)
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.meta_cost_per_landing_page_view
aggregation: ratio
unit: INR
grain: daily ad grain (brand x account x day x campaign x adset x ad)
supported_dimensions:
- brand_id
- report_date
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
supported_filters:
- date_range
- brand_id
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- meta_cost_per_landing_page_view equals meta_spend / meta_landing_page_views recomputed on
  any slice
ratio_components:
  numerator: meta_ad_performance.meta_spend
  denominator: meta_ad_performance.meta_landing_page_views
companion_measures:
- meta_spend
- meta_landing_page_views
currency_default: INR
