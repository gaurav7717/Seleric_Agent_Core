id: channel_orders
display_name: Channel Orders
category: attribution
status: draft
description: >
  Not implemented in the dashboard — Node-Backend has no equivalent live
  calculation. Orders by closed channel set (meta / google / organic_shopify / amazon /
  organic_amazon) on serve.channel_attribution_daily.
formula:
  human_readable: SUM(orders) by channel
  authoritative_source: cube
cube_mapping:
  view: channel_attribution
  measure: channel_attribution.orders
aggregation: additive
unit: count
grain: brand × day × channel
supported_dimensions:
  - brand_id
  - report_date
  - channel
  - source_platform
  - revenue_basis
supported_filters:
  - date_range
  - brand_id
  - channel
data_owner: Growth / Attribution
access_policy:
  roles_allowed: [exec, growth_lead, analyst, ops]
  scopes: [metrics:read]
examples:
  - question: Meta vs organic Shopify orders last 30 days
    request:
      measures: [channel_orders]
      dimensions: [channel]
      time_range: {preset: last_30_days}
validation_tests:
  - channel_orders >= 0
deprecated_aliases: []
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    The catalogued 5-way channel_attribution_daily split has zero references
    in Node-Backend; the nearest real endpoint uses a different channel
    definition, excludes cancelled orders, and never merges in Amazon.
