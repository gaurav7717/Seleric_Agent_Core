id: meta_breakdown_hook_rate
display_name: Meta Hook Rate (breakdown)
category: paid_media
status: draft
description: >-
  Not implemented in the Node-Backend dashboard as of 2026-07-21 — describes
  the intended Cube-layer design only. MUST filter exactly one breakdown_type (age_and_gender | placement | platform_device
  | publisher_platform | region) — the five slices repeat the same delivery, so unfiltered
  aggregation counts spend 5x. Hook rate per slice (approved gold formula).
formula:
  human_readable: SUM(3s views)/SUM(impressions) within one breakdown_type
  authoritative_source: cube
cube_mapping:
  view: meta_ad_breakdown_performance
  measure: meta_ad_breakdown_performance.meta_hook_rate
aggregation: ratio
unit: ratio
grain: daily ad x breakdown-slice grain (filter exactly one breakdown_type per query)
supported_dimensions:
- brand_id
- report_date
- breakdown_type
- age
- gender
- publisher_platform
- platform_position
- region
- campaign_name
- adset_name
- ad_name
supported_filters:
- date_range
- brand_id
- breakdown_type
- age
- gender
- publisher_platform
- platform_position
- region
- campaign_name
- adset_name
- ad_name
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- single breakdown_type totals reconcile to meta_spend/meta_impressions on meta_ad_performance
ratio_components:
  numerator: meta_ad_breakdown_performance.meta_video_3s_views
  denominator: meta_ad_breakdown_performance.meta_impressions
companion_measures:
- meta_video_3s_views
- meta_impressions
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    The entire meta_ad_breakdown_performance cube view has no dashboard
    analog — no breakdown_type gating or single-select filter exists in
    Node-Backend. The nearest real feature (getAudienceInsights) returns
    several breakdowns simultaneously via a live Graph API call, not this
    ClickHouse-backed metric.
