id: gross_sales
display_name: Gross Sales (Shopify-only, ex-GST)
category: commerce
status: certified
description: 'Placement revenue excluding GST before discounts, on eligible placement orders — includes
  cancelled and voided orders (dashboard quirk kept per Commerce Metric Policy v1). Matches the dashboard
  Gross Sales card (Shopify-only). Placement axis: order_date. For the pre-discount value including GST
  use total_sales. Scope: Shopify-only (Historical Analytics / commerce oracle). Does not include Amazon
  SP marketplace sales or fees. For all-platform ad spend use total_ad_spend; for blended-ads net profit
  use net_profit_blended.'
formula:
  human_readable: 'Sum of (gross_excl_tax_derived + discount_excl_tax) per eligible order (is_test = 0,
    is_revenue_adjustment = 0); proportional GST strip per policy v1

    '
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.gross_sales_excl_tax
aggregation: additive
unit: currency
currency_default: INR
grain: order
supported_dimensions:
- brand_id
- order_date
- payment_method
- payment_bucket
- utm_source
- shipping_country
- shipping_region
- shipping_city
supported_filters:
- date_range
- brand_id
- payment_method
- utm_source
- shipping_country
- shipping_region
- shipping_city
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
examples:
- question: Gross sales this month
  request:
    measures:
    - gross_sales
    time_range:
      preset: this_month
validation_tests:
- reconciles to dashboard Gross Sales card for closed periods
deprecated_aliases: []
