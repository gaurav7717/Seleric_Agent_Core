id: attributed_refund_amount
display_name: Attributed Refund Amount
category: attribution
status: certified
description: >
  Refund amount at order grain from the attribution oracle. Dashboard basis:
  the single total_refund_amount column is populated for Amazon attribution
  only; Shopify/meta/google attribution instead track separate return and
  cancel count/value pairs, computed on event date rather than order date —
  see dashboard_alignment.
formula:
  human_readable: SUM(total_refund_amount) for Amazon; SUM(return_value) + SUM(cancel_value)
    on event date for Shopify/meta/google — not a single unified refund-amount column
  authoritative_source: cube
cube_mapping:
  view: order_attribution
  measure: order_attribution.attributed_refund_amount
aggregation: additive
unit: currency
grain: order (Amazon, order date); event date return/cancel pairs (Shopify/meta/google) — last-touch
  attribution
supported_dimensions:
- brand_id
- order_date
- lt_platform
- lt_channel
- lt_utm_source
- lt_utm_medium
- lt_utm_campaign
- lt_campaign_id
- lt_campaign_name
- lt_adset_name
- lt_ad_name
- attribution_method
- is_new_customer
- is_cod
- source_name
- attribution_model
- payment_method
- payment_bucket
- payment_gateway
- is_prepaid
- identity_resolution_method
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
supported_filters:
- date_range
- brand_id
- lt_platform
- lt_channel
- attribution_method
- is_new_customer
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- identity_resolution_method
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
data_owner: Growth / Attribution
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Attributed Refund Amount for June 2026
  request:
    measures:
    - attributed_refund_amount
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests: []
deprecated_aliases: []
currency_default: INR
dashboard_alignment:
  status: drift_corrected
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    total_refund_amount is only used by Amazon attribution modules. Shopify,
    meta, and google attribution instead track separate return-count/return-value
    and cancel-count/cancel-value pairs, computed on the event date rather than
    the order date. Catalogue description, formula, and grain corrected to
    reflect this split; cube_mapping left as-is.
