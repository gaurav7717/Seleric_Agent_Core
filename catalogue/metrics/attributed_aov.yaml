id: attributed_aov
display_name: Attributed AOV
category: attribution
status: certified
description: Attributed net revenue divided by attributed orders.
formula:
  human_readable: attributed_net_revenue / attributed_orders
  authoritative_source: cube
cube_mapping:
  view: order_attribution
  measure: order_attribution.attributed_aov
aggregation: ratio
unit: currency
grain: order (last-touch attribution)
supported_dimensions:
- brand_id
- order_date
- lt_platform
- lt_channel
- lt_utm_source
- lt_utm_medium
- lt_utm_campaign
- lt_campaign_id
- lt_campaign_name
- lt_adset_name
- lt_ad_name
- attribution_method
- is_new_customer
- is_cod
- source_name
- attribution_model
- payment_method
- payment_bucket
- payment_gateway
- is_prepaid
- identity_resolution_method
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
supported_filters:
- date_range
- brand_id
- lt_platform
- lt_channel
- attribution_method
- is_new_customer
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- identity_resolution_method
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
data_owner: Growth / Attribution
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Attributed AOV for June 2026
  request:
    measures:
    - attributed_aov
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests: []
deprecated_aliases: []
currency_default: INR
ratio_components:
  numerator: order_attribution.attributed_net_revenue
  denominator: order_attribution.attributed_orders
