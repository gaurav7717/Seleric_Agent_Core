id: meta_cpa
display_name: Meta CPA
category: marketing
status: approved
description: >
  Meta platform cost per purchase (cost_per_purchase). A ratio — recompute
  from spend/purchases.
formula:
  human_readable: "Meta spend / Meta purchases"
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.cost_per_purchase
aggregation: ratio
ratio_components:
  numerator: meta_ad_performance.spend
  denominator: meta_ad_performance.purchases
unit: currency
currency_default: INR
grain: day
supported_dimensions: [brand_id, report_date, campaign_id, campaign_name, adset_name, ad_id, ad_name]
supported_filters: [date_range, brand_id, campaign_id, campaign_name, adset_name, ad_id, ad_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Meta CPA by campaign last 7 days"
    request: {measures: [meta_cpa], dimensions: [campaign_name], time_range: {preset: last_7d}}
validation_tests:
  - "period CPA equals sum(spend)/sum(purchases) for the same slice"
deprecated_aliases: []
