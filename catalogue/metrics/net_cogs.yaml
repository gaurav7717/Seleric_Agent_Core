id: net_cogs
display_name: Net COGS
category: finance
status: certified
description: >
  Fully-loaded Shopify Net COGS for the period (brand × day), matching the
  Historical Analytics Net COGS card (FE §11). Composed from gold.fct_order_items:
  ACTIVE placement (product + ship + pack + online gateway on order date) +
  CANCELLATION (online gateway on cancel date) + RETURN (ship + pack + gateway +
  RTO on return event date, no product). Amazon SP COGS are excluded so the
  figure pairs with the Shopify commerce oracle. Not product_cogs (SKU line grain).
formula:
  human_readable: SUM(net_cogs)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.net_cogs
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
supported_filters:
  - date_range
  - brand_id
data_owner: Finance
access_policy:
  roles_allowed: [exec, finance]
  scopes: [metrics:read]
examples:
  - question: Net COGS for June 2026
    request:
      measures: [net_cogs]
      time_range: {start: "2026-06-01", end: "2026-06-30"}
validation_tests:
  - net_cogs >= 0 for any slice
  - June 2026 brand 20 ≈ dashboard Net COGS ₹15,85,787.92
deprecated_aliases: []
