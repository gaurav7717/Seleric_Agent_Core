id: net_cogs
display_name: Net COGS (Shopify-only FE lifecycle)
category: finance
status: certified
description: 'Fully-loaded Shopify Net COGS for the period (brand × day), matching the FE lifecycle
  costing model in `serve_canonical_pnl`: ACTIVE placement (product + ship + pack + gateway on order
  date) + CANCELLATION (gateway on cancel date) + RETURN (ship + pack + gateway + RTO on return
  event date, no product). Not product_cogs (SKU grain), and does not include Amazon COGS.'
formula:
  human_readable: SUM(net_cogs)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.net_cogs
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  scopes:
  - metrics:read
examples:
- question: Net COGS for June 2026
  request:
    measures:
    - net_cogs
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- net_cogs >= 0 for any slice
- net_cogs equals product_cost + shipping_cost + packaging_cost + payment_gateway_fees + rto_cost for the same slice
deprecated_aliases: []
dashboard_alignment:
  status: drift_corrected
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: data_platform/mage-ai/infra/cube/model/cubes/serve_canonical_pnl.yml:66-72
  note: >
    Dashboard summary may blend Amazon in a separate path. This metric is
    aligned to canonical Cube semantic execution (`canonical_pnl.net_cogs`),
    which is Shopify lifecycle Net COGS.
