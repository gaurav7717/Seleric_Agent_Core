id: repeat_purchase_orders
display_name: Sequenced Orders
category: customer
status: certified
description: Count of eligible orders in the purchase-sequence model (per-customer
  order_seq assigned). Same population as commerce Total Orders.
formula:
  human_readable: COUNT(order_id)
  authoritative_source: cube
cube_mapping:
  view: purchase_sequence
  measure: purchase_sequence.orders
aggregation: additive
unit: count
grain: order (eligible orders, per-customer sequenced)
supported_dimensions:
- brand_id
- order_date
- order_status
- is_cod
- order_seq
- order_seq_band
- is_first_order
supported_filters:
- date_range
- brand_id
- order_status
- is_cod
- order_seq
- order_seq_band
- is_first_order
data_owner: Growth / CRM
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Sequenced Orders for June 2026
  request:
    measures:
    - repeat_purchase_orders
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests: []
deprecated_aliases: []
