id: repeat_purchase_orders
display_name: Sequenced Orders
category: customer
status: draft
description: >
  Not implemented in the dashboard as of this audit — no sequencing model
  exists at all in Node-Backend. Count of eligible orders in the
  purchase-sequence model (per-customer order_seq assigned). Same population
  as commerce Total Orders.
formula:
  human_readable: COUNT(order_id)
  authoritative_source: cube
cube_mapping:
  view: purchase_sequence
  measure: purchase_sequence.orders
aggregation: additive
unit: count
grain: order (eligible orders, per-customer sequenced)
supported_dimensions:
- brand_id
- order_date
- order_status
- is_cod
- order_seq
- order_seq_band
- is_first_order
- payment_method
- payment_bucket
- payment_gateway
- is_prepaid
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
supported_filters:
- date_range
- brand_id
- order_status
- is_cod
- order_seq
- order_seq_band
- is_first_order
- payment_method
- payment_bucket
- payment_gateway
- is_prepaid
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
data_owner: Growth / CRM
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Sequenced Orders for June 2026
  request:
    measures:
    - repeat_purchase_orders
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests: []
deprecated_aliases: []
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    No sequencing model exists at all in Node-Backend. Part of the broader
    finding that there is no customer-master or lifetime-aggregation layer.
