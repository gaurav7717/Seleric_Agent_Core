id: amazon_marketplace_fees
display_name: Amazon Marketplace Fees
category: commerce
status: certified
description: >
  Effective Amazon marketplace fees (commission + closing + shipping + other +
  tax withheld) from serve.amazon_commerce_daily — not Amazon Ads spend.
formula:
  human_readable: SUM(marketplace_fees)
  authoritative_source: cube
cube_mapping:
  view: amazon_commerce_performance
  measure: amazon_commerce_performance.marketplace_fees
aggregation: additive
unit: INR
grain: brand × day
supported_dimensions:
  - brand_id
  - report_date
supported_filters:
  - date_range
  - brand_id
data_owner: Commerce Ops
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
currency_default: INR
validation_tests:
  - amazon_marketplace_fees >= 0
deprecated_aliases: []
