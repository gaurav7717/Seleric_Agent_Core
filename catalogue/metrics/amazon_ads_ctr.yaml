id: amazon_ads_ctr
display_name: Amazon Ads CTR
category: paid_media
status: certified
description: Amazon Ads CTR recomputed from aggregated components.
formula:
  human_readable: SUM(clicks) / SUM(impressions)
  authoritative_source: cube
cube_mapping:
  view: amazon_ad_performance
  measure: amazon_ad_performance.amazon_ads_ctr
aggregation: ratio
unit: ratio
grain: daily SP campaign grain (brand x day x campaign_type x campaign)
supported_dimensions:
- brand_id
- report_date
- campaign_type
- campaign_id
- campaign_name
- campaign_status
- targeting_type
supported_filters:
- date_range
- brand_id
- campaign_type
- campaign_id
- campaign_name
- campaign_status
- targeting_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- amazon_ads_ctr equals amazon_ads_clicks / amazon_ads_impressions recomputed on any slice
ratio_components:
  numerator: amazon_ad_performance.amazon_ads_clicks
  denominator: amazon_ad_performance.amazon_ads_impressions
companion_measures:
- amazon_ads_clicks
- amazon_ads_impressions
