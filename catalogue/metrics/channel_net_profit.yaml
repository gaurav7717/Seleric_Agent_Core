id: channel_net_profit
display_name: Channel Net Profit
category: financial
status: approved
description: >
  Net profit by last-touch platform (Meta/Google/Organic) = attributed net
  revenue ex-GST − attributed COGS − platform ad spend. Attribution-basis
  profit, not the company-wide net_profit on canonical_pnl — do not sum
  across platforms and expect it to equal net_profit (attribution coverage
  is partial; see attribution_coverage_rate).
formula:
  human_readable: "Attributed Net Revenue (ex-GST) - Attributed COGS - Platform Ad Spend"
  authoritative_source: cube
cube_mapping:
  view: channel_pnl
  measure: channel_pnl.channel_net_profit
aggregation: additive
unit: currency
currency_default: INR
grain: day
supported_dimensions: [brand_id, report_date, platform]
supported_filters: [date_range, brand_id, platform]
data_owner: "Finance Analytics"
access_policy:
  roles_allowed: [exec, finance, growth_lead]
  scopes: [metrics:read]
examples:
  - question: "Net profit by channel this month"
    request: {measures: [channel_net_profit], dimensions: [platform], time_range: {preset: this_month}}
validation_tests:
  - "channel_net_profit is defined for every platform present in channel_pnl for the period"
deprecated_aliases: []
