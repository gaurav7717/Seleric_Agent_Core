id: attributed_gross_revenue
display_name: Attributed Gross Revenue
category: attribution
status: certified
description: Gross revenue at order grain from the attribution oracle.
formula:
  human_readable: SUM(gross_revenue)
  authoritative_source: cube
cube_mapping:
  view: order_attribution
  measure: order_attribution.attributed_gross_revenue
aggregation: additive
unit: currency
grain: order (last-touch attribution)
supported_dimensions:
- brand_id
- order_date
- lt_platform
- lt_channel
- lt_utm_source
- lt_utm_medium
- lt_utm_campaign
- lt_campaign_id
- lt_campaign_name
- lt_adset_name
- lt_ad_name
- attribution_method
- is_new_customer
- is_cod
- source_name
- attribution_model
- payment_method
- payment_bucket
- payment_gateway
- is_prepaid
supported_filters:
- date_range
- brand_id
- lt_platform
- lt_channel
- attribution_method
- is_new_customer
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
data_owner: Growth / Attribution
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Attributed Gross Revenue for June 2026
  request:
    measures:
    - attributed_gross_revenue
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests: []
deprecated_aliases: []
currency_default: INR
