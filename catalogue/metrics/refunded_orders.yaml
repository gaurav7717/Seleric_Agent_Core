id: refunded_orders
display_name: Returned Orders (Shopify-only)
category: commerce
status: certified
description: 'Orders with return events on event date (Asia/Kolkata). Maps to returned_orders measure. Filter on event_date
  — not order_date. Scope: Shopify-only (Historical Analytics / commerce oracle). Does not include Amazon SP marketplace sales
  or fees. For all-platform ad spend use total_ad_spend; for blended-ads net profit use net_profit_blended.'
formula:
  human_readable: Distinct orders with return event in period
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.returned_orders
  time_dimension: commerce_orders.event_date
aggregation: additive
unit: count
grain: order
supported_dimensions:
- brand_id
- event_date
- payment_method
- payment_bucket
- utm_source
- utm_medium
- utm_campaign
- source_name
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- order_status
- return_status
- fulfillment_status
- payment_gateway
- is_cod
- is_prepaid
- financial_status
- event_type
supported_filters:
- date_range
- brand_id
- payment_method
- payment_bucket
- utm_source
- utm_medium
- utm_campaign
- source_name
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- order_status
- return_status
- fulfillment_status
- payment_gateway
- is_cod
- is_prepaid
- financial_status
- event_type
data_owner: Commerce Ops
access_policy:
  roles_allowed:
