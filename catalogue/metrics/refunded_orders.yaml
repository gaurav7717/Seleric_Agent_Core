id: refunded_orders
display_name: Refunded Orders
category: commerce
status: approved
description: >
  Orders with order_status in (refunded, partially_refunded), excluding
  cancelled and test orders.
formula:
  human_readable: "Count of orders where order_status IN (refunded, partially_refunded) and status != cancelled (is_test = false)"
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.refunded_orders
aggregation: additive
unit: count
grain: order
supported_dimensions: [brand_id, order_date, payment_method, utm_source, shipping_country, shipping_region]
supported_filters: [date_range, brand_id, payment_method, utm_source, shipping_country, shipping_region]
data_owner: "Commerce Ops"
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
examples:
  - question: "Refunded orders last month"
    request: {measures: [refunded_orders], time_range: {preset: last_month}}
validation_tests:
  - "refunded_orders <= orders for any slice"
deprecated_aliases: []
