id: refunded_orders
display_name: Returned Orders
category: commerce
status: certified
description: >
  Orders with return events on event date (Asia/Kolkata). Maps to returned_orders
  measure. Filter on event_date — not order_date.
formula:
  human_readable: "Distinct orders with return event in period"
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.returned_orders
  time_dimension: commerce_orders.event_date
aggregation: additive
unit: count
grain: order
supported_dimensions: [brand_id, event_date]
supported_filters: [date_range, brand_id]
data_owner: "Commerce Ops"
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
examples:
  - question: "Returned orders last month"
    request: {measures: [refunded_orders], time_range: {preset: last_month}}
validation_tests:
  - "reconciles to dashboard Returns card for closed periods"
deprecated_aliases: [returned_orders]
