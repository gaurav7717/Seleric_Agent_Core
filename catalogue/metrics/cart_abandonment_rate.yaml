id: cart_abandonment_rate
display_name: Cart Abandonment Rate
category: marketing
status: approved
description: >
  Share of add-to-cart sessions that did not reach checkout (Snowplow funnel).
  A ratio — recompute from components; never average daily rates.
formula:
  human_readable: "(Add-to-cart sessions - Checkout sessions) / Add-to-cart sessions"
  authoritative_source: cube
cube_mapping:
  view: session_funnel
  measure: session_funnel.cart_abandonment_rate
aggregation: ratio
unit: ratio
grain: session
supported_dimensions: [brand_id, session_date, channel, campaign_name]
supported_filters: [date_range, brand_id, channel, campaign_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Cart abandonment last 30 days"
    request: {measures: [cart_abandonment_rate], time_range: {preset: last_30d}}
validation_tests: []
deprecated_aliases: []
