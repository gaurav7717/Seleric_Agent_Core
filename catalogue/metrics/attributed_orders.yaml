id: attributed_orders
display_name: Attributed Orders (last-touch)
category: marketing
status: approved
description: >
  Distinct active / partially refunded, non-test orders credited to the
  last marketing touch from gold.fct_order_attribution. Companion to
  attributed_revenue for campaign / platform breakdowns. Not an order-volume
  truth metric — use orders on commerce_orders for that.
formula:
  human_readable: "Count of distinct attributed orders (active or partially refunded, non-test)"
  authoritative_source: cube
cube_mapping:
  view: order_attribution
  measure: order_attribution.attributed_orders
aggregation: additive
unit: count
grain: day
supported_dimensions: [brand_id, order_date, lt_platform, lt_channel, lt_campaign_id, lt_campaign_name, lt_adset_name, lt_ad_name]
supported_filters: [date_range, brand_id, lt_platform, lt_channel, lt_campaign_id, lt_campaign_name, lt_adset_name, lt_ad_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Attributed orders by campaign last 7 days"
    request: {measures: [attributed_orders], dimensions: [lt_campaign_name], time_range: {preset: last_7d}}
validation_tests:
  - "sum over a period <= commerce_orders.orders for the same period"
deprecated_aliases: []
