id: product_total_ad_spend
display_name: Product Total Ad Spend (SKU-attributed)
category: product
status: draft
description: >
  Not implemented in the dashboard as of this audit — no SKU-attributed ad
  spend exists anywhere in Node-Backend. Total directional ad spend on a SKU
  (Meta + Google + Other). Allocated from last-touch attributed line revenue
  and campaign-day spend — compare with product_net_revenue for product
  ROAS. Fan-out caveat applies at campaign grain.
formula:
  human_readable: SUM(total_ad_spend_attributed) = Meta + Google + Other at SKU grain
  authoritative_source: cube
cube_mapping:
  view: product_ad_spend
  measure: product_ad_spend.total_ad_spend_attributed
  time_dimension: product_ad_spend.report_date
aggregation: additive
unit: currency
currency_default: INR
grain: brand × day × sku
supported_dimensions:
  - brand_id
  - report_date
  - sku
  - product_title
  - product_id
  - variant_id
supported_filters:
  - date_range
  - brand_id
  - sku
  - product_title
data_owner: Growth / Product
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: Total ad spend by product Meta vs Google last month
    request:
      measures: [product_meta_ad_spend, product_google_ad_spend, product_total_ad_spend]
      dimensions: [product_title]
      time_range: {preset: last_month}
validation_tests:
  - product_total_ad_spend >= product_meta_ad_spend for any slice
deprecated_aliases: []
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    No SKU-attributed ad spend exists anywhere in Node-Backend; ad spend is
    only tracked at channel/campaign level (pnlService.js:359 documents this
    explicitly — no SKU dimension).
