id: google_ctr
display_name: Google CTR
category: paid_media
status: certified
description: Google CTR recomputed from aggregated components.
formula:
  human_readable: SUM(clicks) / SUM(impressions)
  authoritative_source: cube
cube_mapping:
  view: google_ad_performance
  measure: google_ad_performance.google_ctr
aggregation: ratio
unit: ratio
grain: daily campaign grain (brand x customer account x day x campaign)
supported_dimensions:
- brand_id
- report_date
- customer_account_id
- campaign_id
- campaign_name
- campaign_type
supported_filters:
- date_range
- brand_id
- customer_account_id
- campaign_id
- campaign_name
- campaign_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- google_ctr equals google_clicks / google_impressions recomputed on any slice
ratio_components:
  numerator: google_ad_performance.google_clicks
  denominator: google_ad_performance.google_impressions
companion_measures:
- google_clicks
- google_impressions
