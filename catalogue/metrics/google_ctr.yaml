id: google_ctr
display_name: Google CTR
category: paid_media
status: certified
description: >
  Google CTR recomputed from aggregated components (ratio of aggregates).
formula:
  human_readable: SUM(clicks) / SUM(impressions)
  authoritative_source: cube
cube_mapping:
  view: google_ad_performance
  measure: google_ad_performance.google_ctr
aggregation: ratio
unit: ratio
grain: daily campaign grain (brand x day x campaign)
supported_dimensions:
- brand_id
- report_date
- campaign_id
- campaign_name
- campaign_type
supported_filters:
- date_range
- brand_id
- campaign_id
- campaign_name
- campaign_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- google_ctr equals (google_clicks / google_impressions) recomputed on any slice
ratio_components:
  numerator: google_ad_performance.google_clicks
  denominator: google_ad_performance.google_impressions
companion_measures:
- google_clicks
- google_impressions
dashboard_alignment:
  status: drift_corrected
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: historicalAnalytics/analyticsClickhouse.js:915
  note: >
    Dashboard computes CTR as percentage (x100). Canonical Cube semantic is a
    ratio-of-aggregates measure (no x100), which the catalogue now reflects for
    agent query consistency.
