id: contribution_margin
display_name: Contribution Margin
category: finance
status: draft
description: 'Gross profit minus variable fulfilment costs (shipping, packaging, payment
  gateway fees, RTO) for the period.


  DATA QUALITY CAVEAT: sourced from gold.fct_daily_pnl, whose cost/spend columns are
  flagged broken in the cube''s own header comment (mage-ai/infra/cube/model/cubes/serve_canonical_pnl.yml).
  Cross-checked against ClickHouse for June 2026/brand 20: net_cogs summed to ~90.6K
  vs. the dashboard''s Net COGS card of ~15.86L (17x off), and derived net_profit
  was positive (~11.9L) vs. the dashboard''s Net Profit card of -2.72L (wrong sign).
  Marked draft (not queryable) until the fct_daily_pnl cost columns are fixed upstream
  — do not certify or surface this value.'
formula:
  human_readable: gross_profit - shipping_cost - packaging_cost - payment_gateway_fees
    - rto_cost
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.contribution_margin
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  scopes:
  - metrics:read
examples:
- question: Contribution Margin for June 2026
  request:
    measures:
    - contribution_margin
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- contribution_margin <= gross_profit for the same slice
deprecated_aliases: []
