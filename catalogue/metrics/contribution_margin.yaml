id: contribution_margin
display_name: Contribution Margin (Shopify-only)
category: finance
status: certified
description: 'Net Sales − Net COGS for the period — the FE Net ROAS numerator and P&L contribution before
  advertising. Not gross_sales − gross_cogs − ad_spend (that is the dashboard "Gross Profit" / contribution-after-ads
  form). Scope: Shopify-only (Historical Analytics / commerce oracle). Does not include Amazon SP marketplace
  sales or fees. For all-platform ad spend use total_ad_spend; for blended-ads net profit use net_profit_blended.'
formula:
  human_readable: net_sales - net_cogs
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.contribution_margin
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  scopes:
  - metrics:read
examples:
- question: Contribution margin before ads for June 2026
  request:
    measures:
    - contribution_margin
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- contribution_margin = net_sales - net_cogs for the same slice
deprecated_aliases: []
