id: net_profit
display_name: Net Profit (Shopify-only)
category: finance
status: certified
description: 'Company P&L bottom line matching the Historical Analytics Net Profit card (Shopify-only):
  Net Sales − Net COGS − (Meta + Google) ad spend. FE buildDashboardStats identity. Uses Shopify-only
  spend because commerce net sales exclude Amazon SP; for blended Meta+Google+Amazon profit ask for net_profit_blended.
  Scope: Shopify-only (Historical Analytics / commerce oracle). Does not include Amazon SP marketplace
  sales or fees. For all-platform ad spend use total_ad_spend; for blended-ads net profit use net_profit_blended.'
formula:
  human_readable: net_sales - net_cogs - shopify_ad_spend
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.net_profit_shopify
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  scopes:
  - metrics:read
examples:
- question: Shopify-only Net Profit for June 2026
  request:
    measures:
    - net_profit
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- net_profit can be negative (loss periods are valid)
- June 2026 brand 20 ≈ Historical Shopify-only Net Profit −₹2,72,173.77
- When snapshot includes all-channel sales, also report net_profit_all_channels and net_profit_incl_amazon with explicit scope labels
deprecated_aliases: []
