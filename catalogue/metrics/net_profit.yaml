id: net_profit
display_name: Net Profit (Shopify-only, Meta+Google spend)
category: finance
status: certified
description: 'Canonical P&L net profit in `serve_canonical_pnl`: Shopify net sales (ex-GST) − Shopify Net
  COGS − Shopify ad spend (Meta + Google). This maps to `canonical_pnl.net_profit_shopify` and is distinct
  from all-platform variants (`net_profit_blended`, `net_profit_all_channels`).'
formula:
  human_readable: net_sales - net_cogs - total_ad_spend
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.net_profit_shopify
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  scopes:
  - metrics:read
examples:
- question: Shopify-only Net Profit for June 2026
  request:
    measures:
    - net_profit
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- net_profit can be negative (loss periods are valid)
- net_profit equals net_sales - net_cogs - shopify_ad_spend for the same slice
deprecated_aliases: []
dashboard_alignment:
  status: drift_corrected
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: src/services/dashboardService.js:132,136
  note: >
    Dashboard summary computes a blended number, but this catalogue metric is
    intentionally aligned to canonical Cube semantic execution
    (`canonical_pnl.net_profit_shopify`) for agent consistency.
