id: product_cogs
display_name: Product COGS (fully-loaded lifecycle)
category: product
status: certified
description: 'Lifecycle cost of goods per line from serve.product_performance: product
  cost + shipping + packaging + payment fee + RTO, recognized by pnl_refund_class
  (finance policy, point-in-time SCD2 unit cost at order creation). For merchandise
  cost only, ask for product cost only (product_cost_only measure).

  '
formula:
  human_readable: Sum of lifecycle net_cogs on eligible lines
  authoritative_source: cube
cube_mapping:
  view: product_performance
  measure: product_performance.product_cogs
aggregation: additive
unit: currency
currency_default: INR
grain: order_item
supported_dimensions:
- brand_id
- order_date
- product_title
- variant_title
- sku
- product_type
- vendor
- shipping_city
- shipping_region
- shipping_country
- order_status
- return_status
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
supported_filters:
- date_range
- brand_id
- product_title
- sku
- product_type
- vendor
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
data_owner: Commerce Ops / Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: COGS by SKU last month
  request:
    measures:
    - product_cogs
    dimensions:
    - sku
    time_range:
      preset: last_month
validation_tests:
- product_net_revenue − product_cogs equals product_gross_profit exactly
- cost coverage >= 99.5% of net revenue (certification threshold)
deprecated_aliases: []
