id: google_interaction_rate
display_name: Google Interaction Rate
category: paid_media
status: draft
description: >
  Not implemented in the Node-Backend dashboard as of 2026-07-21 — describes
  the intended Cube-layer design only. Google Interaction Rate recomputed
  from aggregated components.
formula:
  human_readable: SUM(interactions) / SUM(impressions)
  authoritative_source: cube
cube_mapping:
  view: google_ad_performance
  measure: google_ad_performance.google_interaction_rate
aggregation: ratio
unit: ratio
grain: daily campaign grain (brand x customer account x day x campaign)
supported_dimensions:
- brand_id
- report_date
- customer_account_id
- campaign_id
- campaign_name
- campaign_type
supported_filters:
- date_range
- brand_id
- customer_account_id
- campaign_id
- campaign_name
- campaign_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- google_interaction_rate equals google_interactions / google_impressions recomputed on any
  slice
ratio_components:
  numerator: google_ad_performance.google_interactions
  denominator: google_ad_performance.google_impressions
companion_measures:
- google_interactions
- google_impressions
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    Depends on google_interactions, which is never fetched anywhere in
    Node-Backend, so this rate cannot be and is not computed on the dashboard.
