id: meta_impressions
display_name: Meta Impressions
category: marketing
status: approved
description: >
  Meta platform-reported impressions from gold.fct_meta_ads_daily.
formula:
  human_readable: "Sum of Meta impressions"
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.impressions
aggregation: additive
unit: count
grain: day
supported_dimensions: [brand_id, report_date, campaign_id, campaign_name, adset_name, ad_id, ad_name]
supported_filters: [date_range, brand_id, campaign_id, campaign_name, adset_name, ad_id, ad_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Meta impressions by campaign last 7 days"
    request: {measures: [meta_impressions, meta_spend], dimensions: [campaign_name], time_range: {preset: last_7d}}
validation_tests: []
deprecated_aliases: []
