id: meta_cost_per_link_click
display_name: Meta Cost per Link Click
category: paid_media
status: draft
description: >
  Not implemented in the Node-Backend dashboard as of 2026-07-21 — describes
  the intended Cube-layer design only. Meta Cost per Link Click recomputed
  from aggregated components — never SUM/AVG of row ratios.
formula:
  human_readable: SUM(spend) / SUM(link_clicks)
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.meta_cost_per_link_click
aggregation: ratio
unit: INR
grain: daily ad grain (brand x account x day x campaign x adset x ad)
supported_dimensions:
- brand_id
- report_date
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
supported_filters:
- date_range
- brand_id
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- meta_cost_per_link_click equals meta_spend / meta_link_clicks recomputed on any slice
ratio_components:
  numerator: meta_ad_performance.meta_spend
  denominator: meta_ad_performance.meta_link_clicks
companion_measures:
- meta_spend
- meta_link_clicks
currency_default: INR
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    Depends on meta_link_clicks, which no code in Node-Backend extracts
    specifically, so this metric is not computed on the dashboard.
