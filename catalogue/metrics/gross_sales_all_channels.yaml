id: gross_sales_all_channels
display_name: Gross Sales (all channels, ex-GST)
category: commerce
status: certified
description: >
  All-channels Gross Sales: Shopify gross_sales_excl_tax plus Amazon
  effective_gross_revenue (Attribution Gross Sales / order_total). Matches
  Historical Analytics All channels Gross Sales (Amazon slice). For Shopify-only
  use gross_sales.
formula:
  human_readable: SUM(shopify gross_sales_excl_tax) + SUM(amazon effective_gross)
  authoritative_source: cube
cube_mapping:
  view: sales_all_channels
  measure: sales_all_channels.gross_sales
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
  - channel
  - shipping_region
  - shipping_country
  - shipping_city
supported_filters:
  - date_range
  - brand_id
  - channel
  - shipping_region
  - shipping_country
  - shipping_city
data_owner: Commerce Ops
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
validation_tests:
  - June 2026 brand 20 ≈ ₹41,44,768.43
  - gross_sales_all_channels >= shopify gross_sales for same slice
deprecated_aliases: []
dashboard_alignment:
  status: match
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: lineItemHistoricalSql.js:586
