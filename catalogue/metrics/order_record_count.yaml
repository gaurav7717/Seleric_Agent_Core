id: order_record_count
display_name: Order Count (Record-Level)
category: commerce
status: approved
description: >
  Order count from the record-grain order_records view — one row per order,
  joined to last-touch attribution and shipping city/region/country. Use this
  (not orders on commerce_orders) when the question needs order-level fields
  like campaign, ad, or shipping city alongside the count — e.g. "list/count
  orders from campaign X by city." For a pure order-count trend without
  attribution/shipping detail, use orders on commerce_orders instead.
formula:
  human_readable: "Count of distinct orders (is_test = false), at order_records grain"
  authoritative_source: cube
cube_mapping:
  view: order_records
  measure: order_records.orders
aggregation: additive
unit: count
grain: order
supported_dimensions: [brand_id, order_date, order_id, order_name, order_status, return_status, payment_method, is_new_customer, shipping_city, shipping_region, shipping_country, lt_platform, lt_channel, lt_campaign_id, lt_campaign_name, lt_adset_name, lt_ad_name, attribution_method]
supported_filters: [date_range, brand_id, order_id, order_status, payment_method, is_new_customer, shipping_city, shipping_region, shipping_country, lt_campaign_id, lt_campaign_name, lt_adset_name, lt_ad_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
examples:
  - question: "List orders from campaign TH-383-SUSPENDER-20JUNE by city, last 7 days"
    request: {measures: [order_record_count], dimensions: [lt_campaign_name, shipping_city], time_range: {preset: last_7d}}
validation_tests:
  - "sum over a period <= orders (commerce_orders) for the same period and brand"
deprecated_aliases: []
