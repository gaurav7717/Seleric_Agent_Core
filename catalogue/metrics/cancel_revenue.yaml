id: cancel_revenue
display_name: Cancelled Revenue (Shopify-only, ex-GST)
category: commerce
status: certified
description: 'Revenue deducted by cancellation/void events in the period (ex-GST), on the cancel event
  date — FE §13 P&L Cancelled card. Period totals only (brand × day); for geo/payment/UTM breakdowns
  use event_cancel_revenue on commerce_orders with event_date. Not an order count (use cancelled_orders).
  Scope: Shopify-only (Historical Analytics / commerce oracle). Does not include Amazon SP marketplace
  sales or fees. For all-platform ad spend use total_ad_spend; for blended-ads net profit use net_profit_blended.'
formula:
  human_readable: SUM(cancel_revenue_excl_tax)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.cancel_revenue
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
examples:
- question: Cancelled revenue for June 2026
  request:
    measures:
    - cancel_revenue
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- June 2026 brand 20 ≈ ₹1,49,048.15
deprecated_aliases: []
