id: net_profit_blended
display_name: Net Profit (all-platform ads)
category: finance
status: certified
description: >
  Canonical P&L net profit using all-platform ad spend:
  Shopify net sales (ex-GST) − Shopify Net COGS − (Meta+Google+Amazon ad spend).
  This maps to `canonical_pnl.net_profit` and differs from `net_profit` (which
  uses Shopify-only ad spend).
formula:
  human_readable: net_sales - net_cogs - total_ad_spend
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.net_profit
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
supported_filters:
  - date_range
  - brand_id
data_owner: Finance
access_policy:
  roles_allowed: [exec, finance]
  scopes: [metrics:read]
examples:
  - question: Net Profit with all-platform ads for June 2026
    request:
      measures: [net_profit_blended]
      time_range: {start: "2026-06-01", end: "2026-06-30"}
validation_tests:
  - June 2026 brand 20 ≈ −₹2,87,231.67
deprecated_aliases: []
dashboard_alignment:
  status: drift_corrected
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: src/services/pnlService.js:207,227
  note: >
    Dashboard summary may report blended figures from a different integration
    path; this metric is aligned to canonical Cube semantic execution
    (`canonical_pnl.net_profit`) for agent consistency.
