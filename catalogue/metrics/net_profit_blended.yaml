id: net_profit_blended
display_name: Net Profit (all-platform ads)
category: finance
status: certified
description: >
  Net Profit using all-platform ad spend: Shopify Net Sales − Shopify Net COGS
  − Total Ad Spend (Meta+Google+Amazon). FE §13 P&L form. Commerce sales/COGS
  remain Shopify-only; only the ad-spend denominator is all-platform. For
  Historical Analytics Shopify-only Net Profit use net_profit.
formula:
  human_readable: net_sales - net_cogs - total_ad_spend
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.net_profit
aggregation: additive
unit: currency
currency_default: INR
grain: daily
supported_dimensions:
  - brand_id
  - report_date
supported_filters:
  - date_range
  - brand_id
data_owner: Finance
access_policy:
  roles_allowed: [exec, finance]
  scopes: [metrics:read]
examples:
  - question: Net Profit with all-platform ads for June 2026
    request:
      measures: [net_profit_blended]
      time_range: {start: "2026-06-01", end: "2026-06-30"}
validation_tests:
  - June 2026 brand 20 ≈ −₹2,87,231.67
deprecated_aliases: []
