id: mer
display_name: MER (Media Efficiency Ratio)
category: finance
status: certified
description: 'First-party net sales divided by blended (Meta+Google+Amazon) ad spend. NOT Net ROAS — Net ROAS is (Net Sales − Net COGS) / Shopify ad spend (catalogue id net_roas). Never answer "Net ROAS" with this metric.

  '
formula:
  human_readable: SUM(net_sales) / SUM(total_ad_spend)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.mer
aggregation: ratio
unit: ratio
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  scopes:
  - metrics:read
examples:
- question: MER for June 2026
  request:
    measures:
    - mer
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- mer equals sum(net_sales)/sum(total_ad_spend) for the same slice
deprecated_aliases: []
ratio_components:
  numerator: canonical_pnl.net_sales
  denominator: canonical_pnl.total_ad_spend
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: —
  note: No media-efficiency-ratio (MER) field anywhere in Node-Backend.
