id: google_cpa
display_name: Google CPA
category: marketing
status: approved
description: >
  Google Ads cost per conversion. A ratio — recompute from spend/conversions.
formula:
  human_readable: "Google spend / Google conversions"
  authoritative_source: cube
cube_mapping:
  view: google_ad_performance
  measure: google_ad_performance.cost_per_conversion
aggregation: ratio
ratio_components:
  numerator: google_ad_performance.spend
  denominator: google_ad_performance.conversions
unit: currency
currency_default: INR
grain: day
supported_dimensions: [brand_id, report_date, campaign_id, campaign_name, adset_name, ad_id, ad_name]
supported_filters: [date_range, brand_id, campaign_id, campaign_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Google CPA by campaign last 30 days"
    request: {measures: [google_cpa], dimensions: [campaign_name], time_range: {preset: last_30d}}
validation_tests:
  - "period CPA equals sum(spend)/sum(conversions) for the same slice"
deprecated_aliases: []
