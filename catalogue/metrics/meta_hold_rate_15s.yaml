id: meta_hold_rate_15s
display_name: Meta Hold Rate (15s)
category: paid_media
status: certified
description: Meta Hold Rate (15s) recomputed from aggregated components — never SUM/AVG of
  row ratios.
formula:
  human_readable: SUM(thruplays) / SUM(3s views) — approved gold formula
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.meta_hold_rate_15s
aggregation: ratio
unit: ratio
grain: daily ad grain (brand x account x day x campaign x adset x ad)
supported_dimensions:
- brand_id
- report_date
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
supported_filters:
- date_range
- brand_id
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- meta_hold_rate_15s equals meta_thruplays / meta_video_3s_views recomputed on any slice
ratio_components:
  numerator: meta_ad_performance.meta_thruplays
  denominator: meta_ad_performance.meta_video_3s_views
companion_measures:
- meta_thruplays
- meta_video_3s_views
