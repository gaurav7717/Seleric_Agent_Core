id: attributed_revenue
display_name: Attributed Revenue (ex-GST, last-touch)
category: marketing
status: approved
description: >
  Business-truth net revenue (ex-GST) assigned to the last marketing touch
  from gold.fct_order_attribution — NOT platform-reported conversion value.
  Counts active / partially refunded, non-test orders. Break down by
  lt_platform for platform-wise attribution or lt_campaign_name for
  campaign-level attribution. Do not use for company P&L totals — use
  net_revenue on canonical_pnl for that.
formula:
  human_readable: "Sum of order net revenue ex-GST, credited to the last-touch campaign/platform"
  authoritative_source: cube
cube_mapping:
  view: order_attribution
  measure: order_attribution.attributed_net_revenue_ex_gst
aggregation: additive
unit: currency
currency_default: INR
grain: day
supported_dimensions: [brand_id, order_date, lt_platform, lt_channel, lt_campaign_id, lt_campaign_name, lt_adset_name, lt_ad_name]
supported_filters: [date_range, brand_id, lt_platform, lt_channel, lt_campaign_id, lt_campaign_name, lt_adset_name, lt_ad_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Top campaigns by attributed revenue last 7 days"
    request: {measures: [attributed_revenue], dimensions: [lt_campaign_name], time_range: {preset: last_7d}}
  - question: "Attributed revenue by platform last 30 days"
    request: {measures: [attributed_revenue], dimensions: [lt_platform], time_range: {preset: last_30d}}
validation_tests:
  - "sum over a period <= canonical_pnl.net_revenue for the same period (not every order attributes)"
deprecated_aliases: [dw_meta_ads_attribution.attributed_revenue]
