id: refund_count
display_name: Refund Count (Shopify)
category: operations
status: certified
description: 'Count of Shopify refund transactions from serve.refund_events. Event axis is refund_date (not order_date). For
  return order counts use refunded_orders.

  '
formula:
  human_readable: COUNT(refund_id)
  authoritative_source: cube
cube_mapping:
  view: refund_events
  measure: refund_events.refund_count
  time_dimension: refund_events.refund_date
aggregation: additive
unit: count
grain: refund event
supported_dimensions:
- brand_id
- refund_date
- order_date
- pnl_refund_class
- return_status
- primary_return_status
- shopify_return_status
- order_status
- payment_status
- is_cod
- restock
- is_unprocessed
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- payment_method
- payment_gateway
- payment_bucket
- is_prepaid
supported_filters:
- date_range
- brand_id
- pnl_refund_class
- return_status
- payment_status
- is_cod
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- payment_method
- payment_gateway
- payment_bucket
- is_prepaid
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
examples:
- question: Refund count last 30 days by return status
  request:
    measures:
    - refund_count
    dimensions:
    - return_status
    time_range:
      preset: last_30d
validation_tests:
- refund_count >= 0 for any slice
deprecated_aliases: []
