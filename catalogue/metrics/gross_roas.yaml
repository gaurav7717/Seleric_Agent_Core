id: gross_roas
display_name: Gross ROAS (Shopify-only)
category: finance
status: certified
description: 'Canonical Gross ROAS: Shopify Gross Sales / Shopify ad spend (Meta + Google), computed as a
  ratio of aggregates. This maps to `canonical_pnl.gross_roas`.'
formula:
  human_readable: SUM(gross_sales) / SUM(shopify_ad_spend)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.gross_roas
aggregation: ratio
unit: ratio
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  scopes:
  - metrics:read
examples:
- question: Gross ROAS for June 2026
  request:
    measures:
    - gross_roas
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- June 2026 brand 20 ≈ dashboard 2.03x
deprecated_aliases: []
ratio_components:
  numerator: canonical_pnl.gross_sales
  denominator: canonical_pnl.shopify_ad_spend
dashboard_alignment:
  status: drift_corrected
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: src/services/dashboardService.js:142
  note: >
    Dashboard summary may use blended inputs. This metric is aligned to
    canonical Cube semantic execution (`canonical_pnl.gross_roas`), which uses
    Shopify gross sales over Shopify ad spend.
