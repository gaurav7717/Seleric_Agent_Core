id: checkout_sessions
display_name: Checkout Sessions
category: marketing
status: approved
description: >
  Sessions that reached checkout in the Snowplow funnel.
formula:
  human_readable: "Count of sessions that reached checkout"
  authoritative_source: cube
cube_mapping:
  view: session_funnel
  measure: session_funnel.checkout_sessions
aggregation: additive
unit: count
grain: session
supported_dimensions: [brand_id, session_date, channel, campaign_name, utm_source, utm_medium, landing_page]
supported_filters: [date_range, brand_id, channel, campaign_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Checkout sessions last 30 days"
    request: {measures: [checkout_sessions], time_range: {preset: last_30d}}
validation_tests: []
deprecated_aliases: []
