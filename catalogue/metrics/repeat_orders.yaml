id: repeat_orders
display_name: Repeat Orders
category: customer
status: draft
description: >
  Not implemented in the dashboard as of this audit — no order-grain
  "order_seq > 1" flag exists in Node-Backend. Count of orders that are not a
  customer's first (order_seq > 1).
formula:
  human_readable: COUNT(order_id) WHERE order_seq > 1
  authoritative_source: cube
cube_mapping:
  view: purchase_sequence
  measure: purchase_sequence.repeat_orders
aggregation: additive
unit: count
grain: order (eligible orders, per-customer sequenced)
supported_dimensions:
- brand_id
- order_date
- order_status
- is_cod
- order_seq
- order_seq_band
- is_first_order
- payment_method
- payment_bucket
- payment_gateway
- is_prepaid
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
supported_filters:
- date_range
- brand_id
- order_status
- is_cod
- order_seq
- order_seq_band
- is_first_order
- payment_method
- payment_bucket
- payment_gateway
- is_prepaid
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
data_owner: Growth / CRM
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Repeat Orders for June 2026
  request:
    measures:
    - repeat_orders
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests: []
deprecated_aliases: []
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    No order-grain "order_seq > 1" flag exists in Node-Backend. Part of the
    broader finding that there is no customer-master or lifetime-aggregation
    layer.
