id: repeat_orders
display_name: Repeat Orders
category: customer
status: certified
description: Count of orders that are not a customer's first (order_seq > 1).
formula:
  human_readable: COUNT(order_id) WHERE order_seq > 1
  authoritative_source: cube
cube_mapping:
  view: purchase_sequence
  measure: purchase_sequence.repeat_orders
aggregation: additive
unit: count
grain: order (eligible orders, per-customer sequenced)
supported_dimensions:
- brand_id
- order_date
- order_status
- is_cod
- order_seq
- order_seq_band
- is_first_order
- payment_method
- payment_bucket
- payment_gateway
- is_prepaid
supported_filters:
- date_range
- brand_id
- order_status
- is_cod
- order_seq
- order_seq_band
- is_first_order
- payment_method
- payment_bucket
- payment_gateway
- is_prepaid
data_owner: Growth / CRM
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  scopes:
  - metrics:read
examples:
- question: Repeat Orders for June 2026
  request:
    measures:
    - repeat_orders
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests: []
deprecated_aliases: []
