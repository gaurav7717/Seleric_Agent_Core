id: google_conversions
display_name: Google Conversions (platform-reported)
category: marketing
status: approved
description: >
  Google Ads platform-reported conversions — NOT backend attributed orders.
formula:
  human_readable: "Sum of Google-reported conversions"
  authoritative_source: cube
cube_mapping:
  view: google_ad_performance
  measure: google_ad_performance.conversions
aggregation: additive
unit: count
grain: day
supported_dimensions: [brand_id, report_date, campaign_id, campaign_name, adset_name, ad_id, ad_name]
supported_filters: [date_range, brand_id, campaign_id, campaign_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Google conversions by campaign last 30 days"
    request: {measures: [google_conversions, google_spend], dimensions: [campaign_name], time_range: {preset: last_30d}}
validation_tests: []
deprecated_aliases: []
