id: active_orders
display_name: Active Orders (Shopify-only)
category: commerce
status: approved
description: 'Orders in active/payment_pending status, excluding cancelled/revenue-adjustment orders and
  test orders. The "clean" order count used as the denominator for AOV and revenue-per-order metrics.
  Companion to orders (total placed, including cancelled/voided) on the same view. Scope: Shopify-only
  (Historical Analytics / commerce oracle). Does not include Amazon SP marketplace sales or fees. For
  all-platform ad spend use total_ad_spend; for blended-ads net profit use net_profit_blended.'
formula:
  human_readable: Count of orders with order_status IN (active, payment_pending), excl. revenue adjustments
    and test orders
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.active_orders
aggregation: additive
unit: count
grain: order
supported_dimensions:
- brand_id
- order_date
- order_created_at_ist
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- is_new_customer
- utm_source
- utm_medium
- utm_campaign
- source_name
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- order_status
- return_status
- fulfillment_status
- financial_status
supported_filters:
- date_range
- brand_id
- payment_method
- payment_bucket
- payment_gateway
- is_cod
- is_prepaid
- is_new_customer
- utm_source
- utm_medium
- utm_campaign
- source_name
- shipping_country
- shipping_region
- shipping_city
- shipping_pincode
- shipping_state_code
- order_status
- return_status
- fulfillment_status
- financial_status
data_owner: Commerce Ops
access_policy:
  roles_allowed:
  - exec
  - finance
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
examples:
- question: Active orders this month by payment method
  request:
    measures:
    - active_orders
    dimensions:
    - payment_method
    time_range:
      preset: this_month
validation_tests:
- active_orders <= orders for any slice
deprecated_aliases: []
