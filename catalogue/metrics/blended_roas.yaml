id: blended_roas
display_name: Blended ROAS
category: marketing
status: approved
description: >
  Blended return on ad spend across all platforms as computed by the canonical
  P&L. A ratio — never sum or average daily ROAS rows. Related measures on the
  same view: gross_roas, net_roas, be_roas, meta_roas, google_roas.
formula:
  human_readable: "Blended revenue basis / Total Ad Spend (exact basis defined in Cube)"
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.blended_roas
aggregation: ratio
unit: ratio
grain: day
supported_dimensions: [brand_id, report_date]
supported_filters: [date_range, brand_id]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Blended ROAS this month"
    request: {measures: [blended_roas], time_range: {preset: this_month}}
validation_tests:
  - "blended_roas > 0 for any period with spend and revenue"
deprecated_aliases: [daily_pnl.blended_roas]
