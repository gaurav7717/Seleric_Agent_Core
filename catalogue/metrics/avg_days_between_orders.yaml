id: avg_days_between_orders
display_name: Average Days Between Orders
category: customer
status: approved
description: >
  Average gap in days between a customer's consecutive orders (customer's
  first order is excluded — it has no prior order to measure a gap from).
  Filter to order_sequence_number = 2 for "days to second purchase"
  specifically. Derived from gold.fct_orders windowed per customer — no new
  source data. CAVEAT: this view (customer_purchase_sequence) is the first
  window-function cube in this model and has not been verified against a
  live ClickHouse instance — see the cube's own header comment.
formula:
  human_readable: "Sum of days-since-previous-order / count of orders with a previous order"
  authoritative_source: cube
cube_mapping:
  view: customer_purchase_sequence
  measure: customer_purchase_sequence.avg_days_between_orders
aggregation: ratio
ratio_components:
  numerator: customer_purchase_sequence.days_since_previous_order_sum
  denominator: customer_purchase_sequence.orders_with_previous_order
unit: number
grain: order
supported_dimensions: [brand_id, order_date, customer_id, order_id, order_sequence_number, is_first_order, is_repeat_order]
supported_filters: [date_range, brand_id, customer_id, order_sequence_number]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Average days to second purchase"
    request: {measures: [avg_days_between_orders], filters: [{dimension: order_sequence_number, operator: equals, values: ["2"]}], time_range: {preset: last_90d}}
validation_tests:
  - "avg_days_between_orders > 0 for any slice with repeat orders"
deprecated_aliases: []
