id: commerce_net_revenue
display_name: Commerce Net Revenue (ex-GST)
category: commerce
status: certified
description: >
  Per-order dashboard net sales (DASHBOARD_NET_SALES_O) summed on placement
  order_date. For full Net Sales card parity (with event-date return/cancel
  deductions) use commerce_performance.commerce_net_revenue once serve daily
  rollup is populated.
formula:
  human_readable: "Sum of per-order net sales ex-GST (placement axis)"
  authoritative_source: cube
cube_mapping:
  view: commerce_orders
  measure: commerce_orders.dashboard_net_sales_excl_tax
aggregation: additive
unit: currency
currency_default: INR
grain: order
supported_dimensions:
  - brand_id
  - order_date
  - payment_method
  - utm_source
  - shipping_country
  - shipping_region
  - shipping_city
supported_filters:
  - date_range
  - brand_id
  - payment_method
  - utm_source
  - shipping_country
  - shipping_region
  - shipping_city
data_owner: "Commerce Ops"
access_policy:
  roles_allowed: [exec, finance, growth_lead, analyst, ops]
  scopes: [metrics:read]
examples:
  - question: "Net revenue by city last 30 days"
    request:
      measures: [commerce_net_revenue]
      dimensions: [shipping_city]
      time_range: {preset: last_30d}
validation_tests:
  - "placement-axis total within tolerance of DASHBOARD_NET_SALES_O sum for closed periods"
deprecated_aliases: []
