id: add_to_cart_sessions
display_name: Add-to-Cart Sessions
category: marketing
status: approved
description: >
  Sessions that reached add-to-cart in the Snowplow funnel.
formula:
  human_readable: "Count of sessions with add-to-cart"
  authoritative_source: cube
cube_mapping:
  view: session_funnel
  measure: session_funnel.add_to_cart_sessions
aggregation: additive
unit: count
grain: session
supported_dimensions: [brand_id, session_date, channel, campaign_name, utm_source, utm_medium, landing_page]
supported_filters: [date_range, brand_id, channel, campaign_name]
data_owner: "Growth"
access_policy:
  roles_allowed: [exec, growth_lead, analyst]
  scopes: [metrics:read]
examples:
  - question: "Add to cart sessions last 30 days"
    request: {measures: [add_to_cart_sessions], time_range: {preset: last_30d}}
validation_tests: []
deprecated_aliases: []
