id: web_sessions
display_name: Website Sessions
category: web_analytics
status: certified
description: >
  Snowplow website sessions on the channel-day funnel
  (serve.funnel_daily, session-native counts).
formula:
  human_readable: SUM(sessions)
  authoritative_source: cube
cube_mapping:
  view: funnel_daily
  measure: funnel_daily.sessions
aggregation: additive
unit: count
grain: brand × day × fine channel
supported_dimensions:
  - brand_id
  - report_date
  - channel
supported_filters:
  - date_range
  - brand_id
  - channel
data_owner: Growth / Analytics
access_policy:
  roles_allowed: [exec, growth_lead, analyst, ops]
  scopes: [metrics:read]
examples:
  - question: Sessions by channel last 7 days
    request:
      measures: [web_sessions]
      dimensions: [channel]
      time_range: {preset: last_7_days}
validation_tests:
  - web_sessions >= 0
deprecated_aliases: []
