id: web_sessions
display_name: Web Sessions
category: web_analytics
status: certified
description: 'Snowplow website sessions from serve.session_funnel with funnel stage, UTM, geo, device, and landing-page breakdowns.

  '
formula:
  human_readable: COUNT(session)
  authoritative_source: cube
cube_mapping:
  view: session_funnel
  measure: session_funnel.sessions
  time_dimension: session_funnel.session_date
aggregation: additive
unit: count
grain: session
supported_dimensions:
- brand_id
- session_date
- channel
- funnel_stage
- utm_source
- utm_medium
- utm_campaign
- campaign_name
- geo_city
- geo_region
- geo_country
- device_type
- browser_family
- os_family
- landing_page_path
- exit_page_path
- funnel_web_platform
supported_filters:
- date_range
- brand_id
- channel
- funnel_stage
- utm_source
- utm_medium
- utm_campaign
- geo_city
- geo_region
- geo_country
- device_type
data_owner: Growth / Analytics
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
examples:
- question: Sessions by UTM source last 7 days
  request:
    measures:
    - web_sessions
    dimensions:
    - utm_source
    time_range:
      preset: last_7d
validation_tests:
- web_sessions >= 0 for any slice
deprecated_aliases: []
dashboard_alignment:
  status: drift_corrected
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: channelFunnel/sessionDrilldownClickhouse.js:96-132
  note: Core session count matches but catalogued dims (geo_city, browser_family, os_family, exit_page_path) have zero support in the live query.
