id: meta_hook_rate
display_name: Meta Hook Rate
category: paid_media
status: draft
description: >
  Not implemented in the Node-Backend dashboard as of 2026-07-21 — describes
  the intended Cube-layer design only. Meta Hook Rate recomputed from
  aggregated components — never SUM/AVG of row ratios.
formula:
  human_readable: SUM(3s views) / SUM(impressions) — approved gold formula
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.meta_hook_rate
aggregation: ratio
unit: ratio
grain: daily ad grain (brand x account x day x campaign x adset x ad)
supported_dimensions:
- brand_id
- report_date
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
supported_filters:
- date_range
- brand_id
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- meta_hook_rate equals meta_video_3s_views / meta_impressions recomputed on any slice
ratio_components:
  numerator: meta_ad_performance.meta_video_3s_views
  denominator: meta_ad_performance.meta_impressions
companion_measures:
- meta_video_3s_views
- meta_impressions
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  note: >
    No 3-second-view field is fetched anywhere in Node-Backend, so this
    metric's numerator does not exist and it is not computed on the dashboard.
