id: payment_method_net_profit
display_name: Net Profit by Payment Method
category: financial
status: approved
description: >
  Net profit split by normalized payment method (COD vs. UPI vs. gateway,
  etc.) = net revenue ex-GST − attributed COGS − shipping/packaging/gateway/
  RTO operating cost, from gold.fct_orders joined to gold.fct_order_items.
  Payment-method categorization here is derived independently from
  gold_fct_orders.payment_gateway/is_cod — it may not exactly match
  gold_fct_payments.payment_method (transaction-grain, gateway-reported);
  see CUBE_SEMANTIC_AUDIT.md §2.6.
formula:
  human_readable: "Net Revenue (ex-GST) - Attributed COGS - Total Operating Cost, by payment method"
  authoritative_source: cube
cube_mapping:
  view: payment_method_pnl
  measure: payment_method_pnl.net_profit
aggregation: additive
unit: currency
currency_default: INR
grain: day
supported_dimensions: [brand_id, report_date, payment_method]
supported_filters: [date_range, brand_id, payment_method]
data_owner: "Finance Analytics"
access_policy:
  roles_allowed: [exec, finance, growth_lead]
  scopes: [metrics:read]
examples:
  - question: "Net profit COD vs prepaid this month"
    request: {measures: [payment_method_net_profit], dimensions: [payment_method], time_range: {preset: this_month}}
validation_tests:
  - "payment_method_net_profit is defined for every payment_method present in payment_method_pnl for the period"
deprecated_aliases: []
