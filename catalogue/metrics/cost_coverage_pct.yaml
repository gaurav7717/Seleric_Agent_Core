id: cost_coverage_pct
display_name: Product Cost Coverage %
category: finance
status: draft
description: 'Revenue-weighted share of net sales for which a fully-loaded product cost was available (vs. estimated/missing). A weighted ratio, not a simple ratio-of-two-sums — never sum or average row-level values.


  DATA QUALITY CAVEAT: sourced from gold.fct_daily_pnl, whose cost/spend columns are flagged broken in the cube''s own header comment (mage-ai/infra/cube/model/cubes/serve_canonical_pnl.yml). Cross-checked against ClickHouse for June 2026/brand 20: net_cogs summed to ~90.6K vs. the dashboard''s Net COGS card of ~15.86L (17x off), and derived net_profit was positive (~11.9L) vs. the dashboard''s Net Profit card of -2.72L (wrong sign). Marked draft (not queryable) until the fct_daily_pnl cost columns are fixed upstream — do not certify or surface this value.'
formula:
  human_readable: SUM(product_cost_coverage_pct * net_sales) / SUM(net_sales)
  authoritative_source: cube
cube_mapping:
  view: canonical_pnl
  measure: canonical_pnl.cost_coverage_pct
aggregation: ratio
unit: percent
grain: daily
supported_dimensions:
- brand_id
- report_date
supported_filters:
- date_range
- brand_id
data_owner: Finance
access_policy:
  roles_allowed:
  - exec
  - finance
  scopes:
  - metrics:read
examples:
- question: Product Cost Coverage % for June 2026
  request:
    measures:
    - cost_coverage_pct
    time_range:
      start: '2026-06-01'
      end: '2026-06-30'
validation_tests:
- cost_coverage_pct is between 0 and 100 for any slice
deprecated_aliases: []
dashboard_alignment:
  status: not_implemented
  audited_on: '2026-07-21'
  source: Seleric_Dashboard/Node-Backend
  evidence: —
  note: No cost-coverage concept in the live dashboard; catalogue already marked draft.
