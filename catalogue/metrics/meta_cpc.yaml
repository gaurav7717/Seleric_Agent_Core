id: meta_cpc
display_name: Meta CPC
category: paid_media
status: certified
description: Meta CPC recomputed from aggregated components — never SUM/AVG of row ratios.
formula:
  human_readable: SUM(spend) / SUM(clicks)
  authoritative_source: cube
cube_mapping:
  view: meta_ad_performance
  measure: meta_ad_performance.meta_cpc
aggregation: ratio
unit: INR
grain: daily ad grain (brand x account x day x campaign x adset x ad)
supported_dimensions:
- brand_id
- report_date
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
supported_filters:
- date_range
- brand_id
- ad_account_id
- campaign_id
- campaign_name
- campaign_status
- campaign_objective
- adset_id
- adset_name
- ad_id
- ad_name
- creative_id
- creative_type
data_owner: Growth / Paid Media
access_policy:
  roles_allowed:
  - exec
  - growth_lead
  - analyst
  - ops
  scopes:
  - metrics:read
validation_tests:
- meta_cpc equals meta_spend / meta_clicks recomputed on any slice
ratio_components:
  numerator: meta_ad_performance.meta_spend
  denominator: meta_ad_performance.meta_clicks
companion_measures:
- meta_spend
- meta_clicks
currency_default: INR
