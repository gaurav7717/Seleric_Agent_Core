# Logical dimensions and their qualified Cube member per view.
dimensions:
  - id: brand_id
    display_name: Brand
    description: Brand identifier; filter when data spans multiple brands.
    views:
      commerce_orders: commerce_orders.brand_id
      commerce_performance: commerce_performance.brand_id
      canonical_pnl: canonical_pnl.brand_id
      amazon_daily_pnl: amazon_daily_pnl.brand_id
      orders_all_channels: orders_all_channels.brand_id
      sales_all_channels: sales_all_channels.brand_id
      order_attribution: order_attribution.brand_id
      meta_ad_attribution: meta_ad_attribution.brand_id
      customer_ltv: customer_ltv.brand_id
      purchase_sequence: purchase_sequence.brand_id
      product_performance: product_performance.brand_id
      meta_ad_performance: meta_ad_performance.brand_id
      meta_ad_breakdown_performance: meta_ad_breakdown_performance.brand_id
      google_ad_performance: google_ad_performance.brand_id
      amazon_ad_performance: amazon_ad_performance.brand_id
  - id: order_date
    display_name: Order Date
    description: IST order placement day.
    is_time: true
    views:
      commerce_orders: commerce_orders.order_date
      order_attribution: order_attribution.order_date
      purchase_sequence: purchase_sequence.order_date
      product_performance: product_performance.order_date
  - id: order_created_at_ist
    display_name: Order Created At (IST)
    description: >
      Order creation timestamp/day in Asia/Kolkata. Prefer this axis for
      payment-mix splits (COD vs prepaid) when matching dashboard SQL.
    is_time: true
    views:
      commerce_orders: commerce_orders.order_created_at_ist
  # ---- Attribution (2026-07-16): Attribution.MarketingAttribution ----
  - id: lt_platform
    display_name: Last-touch Platform
    description: Last-touch attributed platform (meta/google/organic/...). Resolved, not raw UTM.
    views:
      order_attribution: order_attribution.lt_platform
  - id: lt_channel
    display_name: Last-touch Channel
    description: Last-touch attributed channel (ig_feed/fb_feed/google_pmax/...). Resolved, not raw UTM.
    views:
      order_attribution: order_attribution.lt_channel
  - id: lt_utm_source
    display_name: Last-touch UTM Source
    description: Attribution-resolved UTM source. Distinct from utm_source (raw/unresolved).
    views:
      order_attribution: order_attribution.lt_utm_source
  - id: lt_utm_medium
    display_name: Last-touch UTM Medium
    views:
      order_attribution: order_attribution.lt_utm_medium
  - id: lt_utm_campaign
    display_name: Last-touch UTM Campaign
    description: Attribution-resolved UTM campaign string. Distinct from utm_campaign (raw/unresolved) and lt_campaign_name (ad-platform campaign name).
    views:
      order_attribution: order_attribution.lt_utm_campaign
  - id: lt_campaign_id
    display_name: Last-touch Campaign ID
    description: Attribution-resolved campaign ID. Distinct from utm_campaign (raw/unresolved).
    views:
      order_attribution: order_attribution.lt_campaign_id
  - id: lt_campaign_name
    display_name: Last-touch Campaign Name
    views:
      order_attribution: order_attribution.lt_campaign_name
  - id: lt_adset_name
    display_name: Last-touch Adset Name
    views:
      order_attribution: order_attribution.lt_adset_name
  - id: lt_ad_name
    display_name: Last-touch Ad Name
    views:
      order_attribution: order_attribution.lt_ad_name
  - id: attribution_method
    display_name: Attribution Method
    description: How the order's touchpoint was resolved (or 'unattributed').
    views:
      order_attribution: order_attribution.attribution_method
  - id: attribution_model
    display_name: Attribution Model
    description: Explicit attribution model applied (e.g. last-touch).
    views:
      order_attribution: order_attribution.attribution_model
      meta_ad_attribution: meta_ad_attribution.attribution_model
  - id: identity_resolution_method
    display_name: Identity Resolution Method
    views:
      order_attribution: order_attribution.identity_resolution_method
  - id: is_cod
    display_name: Is COD
    views:
      order_attribution: order_attribution.is_cod
      purchase_sequence: purchase_sequence.is_cod
  - id: source_name
    display_name: Order Source Name
    views:
      order_attribution: order_attribution.source_name
  # ---- Customer LTV (2026-07-16): Customer.CustomerIntelligence ----
  - id: acquisition_platform
    display_name: Acquisition Platform
    description: Platform that acquired the customer on their first order.
    views:
      customer_ltv: customer_ltv.acquisition_platform
  - id: acquisition_channel
    display_name: Acquisition Channel
    views:
      customer_ltv: customer_ltv.acquisition_channel
  - id: acquisition_campaign
    display_name: Acquisition Campaign
    views:
      customer_ltv: customer_ltv.acquisition_campaign
  - id: is_repeat_customer
    display_name: Is Repeat Customer
    views:
      customer_ltv: customer_ltv.is_repeat_customer
  - id: lifetime_order_count_band
    display_name: Lifetime Order Count Band
    allowed_values: ["1", "2", "3-5", "6+"]
    views:
      customer_ltv: customer_ltv.lifetime_order_count_band
  - id: customer_default_city
    display_name: Customer Default City
    description: Customer's default address city (distinct from shipping_city, which is per-order).
    views:
      customer_ltv: customer_ltv.default_city
  - id: customer_default_province
    display_name: Customer Default Province
    description: Customer's default address province/state (distinct from shipping_region, which is per-order).
    views:
      customer_ltv: customer_ltv.default_province
  # ---- Purchase Sequence (2026-07-16): Customer.CustomerIntelligence port #2 ----
  - id: order_status
    display_name: Order Status
    views:
      purchase_sequence: purchase_sequence.order_status
  - id: order_seq
    display_name: Order Sequence Number
    description: This order's 1-indexed position in the customer's purchase history.
    views:
      purchase_sequence: purchase_sequence.order_seq
  - id: order_seq_band
    display_name: Order Sequence Band
    allowed_values: ["1st", "2nd", "3rd", "4th+"]
    views:
      purchase_sequence: purchase_sequence.order_seq_band
  - id: is_first_order
    display_name: Is First Order
    views:
      purchase_sequence: purchase_sequence.is_first_order
  - id: event_date
    display_name: Event Date
    description: >
      IST calendar day of commerce order events (cancel/return). Use as the
      time axis for cancelled_orders and refunded_orders — not order_date.
    is_time: true
    views:
      commerce_orders: commerce_orders.event_date
  - id: payment_method
    display_name: Payment Method
    description: Payment method on the order (COD, prepaid gateways).
    views:
      commerce_orders: commerce_orders.payment_method
  - id: payment_bucket
    display_name: Payment Bucket
    description: >
      Coarse payment mix bucket used by the Commerce dashboard
      (cod, online/prepaid, paytm card machine, manual).
    allowed_values: [online, cod, paytm card machine, manual]
    views:
      commerce_orders: commerce_orders.payment_bucket
  - id: utm_source
    display_name: UTM Source
    description: Landing UTM source (order or session funnel).
    views:
      commerce_orders: commerce_orders.utm_source
  - id: utm_campaign
    display_name: UTM Campaign
    description: >
      Raw landing UTM campaign string recorded on the order (distinct from
      lt_campaign_name, which is the last-touch-resolved campaign from
      attribution — UTM is unresolved/free-text, may not match ad platform
      metadata 1:1).
    views:
      commerce_orders: commerce_orders.utm_campaign
  - id: shipping_country
    display_name: Shipping Country
    views:
      commerce_orders: commerce_orders.shipping_country
      product_performance: product_performance.shipping_country
  - id: shipping_region
    display_name: Shipping Region / State
    views:
      commerce_orders: commerce_orders.shipping_region
      product_performance: product_performance.shipping_region
  - id: shipping_city
    display_name: Shipping City
    views:
      commerce_orders: commerce_orders.shipping_city
      product_performance: product_performance.shipping_city
  - id: is_new_customer
    display_name: New Customer Flag
    description: Whether this was the customer's first order.
    views:
      commerce_orders: commerce_orders.is_new_customer
      order_attribution: order_attribution.is_new_customer
  - id: sku
    display_name: SKU
    views:
      product_performance: product_performance.sku
  - id: product_title
    display_name: Product Title
    views:
      product_performance: product_performance.product_title
  - id: variant_title
    display_name: Variant Title
    views:
      product_performance: product_performance.variant_title
  - id: product_type
    display_name: Product Type / Category
    views:
      product_performance: product_performance.product_type
  - id: vendor
    display_name: Vendor
    views:
      product_performance: product_performance.vendor
  # ---- Paid media (2026-07-15): PaidMedia.{Meta,Google,Amazon}AdsPerformance ----
  - id: report_date
    display_name: Report Date
    description: >
      Daily platform reporting day (platform account day; IST-aligned accounts).
      The ONLY time axis for paid-media products — no hourly axis exists.
    is_time: true
    views:
      commerce_performance: commerce_performance.report_date
      canonical_pnl: canonical_pnl.report_date
      amazon_daily_pnl: amazon_daily_pnl.report_date
      orders_all_channels: orders_all_channels.report_date
      sales_all_channels: sales_all_channels.report_date
      meta_ad_attribution: meta_ad_attribution.report_date
      meta_ad_performance: meta_ad_performance.report_date
      meta_ad_breakdown_performance: meta_ad_breakdown_performance.report_date
      google_ad_performance: google_ad_performance.report_date
      amazon_ad_performance: amazon_ad_performance.report_date
  - id: campaign_id
    display_name: Campaign ID
    description: Platform campaign identifier.
    views:
      meta_ad_performance: meta_ad_performance.campaign_id
      meta_ad_attribution: meta_ad_attribution.campaign_id
      google_ad_performance: google_ad_performance.campaign_id
      amazon_ad_performance: amazon_ad_performance.campaign_id
  - id: campaign_name
    display_name: Campaign Name
    description: Platform campaign name.
    views:
      meta_ad_performance: meta_ad_performance.campaign_name
      meta_ad_breakdown_performance: meta_ad_breakdown_performance.campaign_name
      meta_ad_attribution: meta_ad_attribution.campaign_name
      google_ad_performance: google_ad_performance.campaign_name
      amazon_ad_performance: amazon_ad_performance.campaign_name
  - id: campaign_status
    display_name: Campaign Status
    description: Platform campaign status (ACTIVE/PAUSED/... per platform).
    views:
      meta_ad_performance: meta_ad_performance.campaign_status
      amazon_ad_performance: amazon_ad_performance.campaign_status
  - id: campaign_objective
    display_name: Campaign Objective (Meta)
    allowed_values: [OUTCOME_SALES, LINK_CLICKS, OUTCOME_LEADS, OUTCOME_ENGAGEMENT, OUTCOME_AWARENESS]
    views:
      meta_ad_performance: meta_ad_performance.campaign_objective
  - id: campaign_type
    display_name: Campaign Type
    description: >
      Google channel (SEARCH/PERFORMANCE_MAX/DEMAND_GEN/SHOPPING/DISPLAY) or
      Amazon ads program (SP only — SB/SD not ingested).
    views:
      google_ad_performance: google_ad_performance.campaign_type
      amazon_ad_performance: amazon_ad_performance.campaign_type
  - id: adset_id
    display_name: Adset ID (Meta)
    views:
      meta_ad_performance: meta_ad_performance.adset_id
      meta_ad_attribution: meta_ad_attribution.adset_id
  - id: adset_name
    display_name: Adset Name (Meta)
    views:
      meta_ad_performance: meta_ad_performance.adset_name
      meta_ad_breakdown_performance: meta_ad_breakdown_performance.adset_name
      meta_ad_attribution: meta_ad_attribution.adset_name
  - id: ad_id
    display_name: Ad ID (Meta)
    views:
      meta_ad_performance: meta_ad_performance.ad_id
      meta_ad_attribution: meta_ad_attribution.ad_id
  - id: ad_name
    display_name: Ad Name (Meta)
    views:
      meta_ad_performance: meta_ad_performance.ad_name
      meta_ad_breakdown_performance: meta_ad_breakdown_performance.ad_name
      meta_ad_attribution: meta_ad_attribution.ad_name
  - id: creative_id
    display_name: Creative ID (Meta)
    views:
      meta_ad_performance: meta_ad_performance.creative_id
  - id: creative_type
    display_name: Creative Type (Meta)
    views:
      meta_ad_performance: meta_ad_performance.creative_type
  - id: ad_account_id
    display_name: Ad Account (Meta)
    views:
      meta_ad_performance: meta_ad_performance.ad_account_id
  - id: customer_account_id
    display_name: Customer Account (Google)
    views:
      google_ad_performance: google_ad_performance.customer_account_id
  - id: targeting_type
    display_name: Targeting Type (Amazon)
    allowed_values: [AUTO, MANUAL]
    views:
      amazon_ad_performance: amazon_ad_performance.targeting_type
  - id: is_final
    display_name: Is Final
    description: 1 when the report day is outside the mutable restatement window.
    views:
      meta_ad_performance: meta_ad_performance.is_final
      google_ad_performance: google_ad_performance.is_final
      amazon_ad_performance: amazon_ad_performance.is_final
  # ---- Meta breakdown port (2026-07-15): serve.meta_ads_breakdown_daily ----
  - id: breakdown_type
    display_name: Breakdown Type (Meta)
    description: >
      Which re-slice of the same Meta delivery to use. Queries MUST filter to
      exactly one value or spend/impressions count 5x.
    allowed_values: [age_and_gender, placement, platform_device, publisher_platform, region]
    views:
      meta_ad_breakdown_performance: meta_ad_breakdown_performance.breakdown_type
  - id: age
    display_name: Age Band (Meta)
    description: Populated only when breakdown_type = age_and_gender.
    views:
      meta_ad_breakdown_performance: meta_ad_breakdown_performance.age
  - id: gender
    display_name: Gender (Meta)
    description: Populated only when breakdown_type = age_and_gender.
    allowed_values: [female, male, unknown]
    views:
      meta_ad_breakdown_performance: meta_ad_breakdown_performance.gender
  - id: publisher_platform
    display_name: Publisher Platform (Meta)
    description: facebook/instagram/etc. Populated for placement + publisher_platform types.
    views:
      meta_ad_breakdown_performance: meta_ad_breakdown_performance.publisher_platform
  - id: platform_position
    display_name: Placement Position (Meta)
    description: feed/reels/stories/etc. Populated only when breakdown_type = placement.
    views:
      meta_ad_breakdown_performance: meta_ad_breakdown_performance.platform_position
  - id: region
    display_name: Region (Meta delivery)
    description: Delivery region. Populated only when breakdown_type = region.
    views:
      meta_ad_breakdown_performance: meta_ad_breakdown_performance.region
